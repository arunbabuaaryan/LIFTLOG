      <label style="display:inline-flex; align-items:center; gap:5px; margin-right:14px; font-size:13px;"><input type="checkbox" id="editExProgressSets" ${progressesSets(ex) ? 'checked' : ''}> Sets</label>
      <label style="display:inline-flex; align-items:center; gap:5px; font-size:13px;"><input type="checkbox" id="editExProgressWeight" ${progressesWeight(ex) ? 'checked' : ''}> Weight</label>
    </div>
  ` : ex.mode === 'bodyweight' ? `
    <div class="row" style="gap:10px;">
      <label style="${lbl}">Sets — min<input type="number" id="editExSetsMin" value="${getSetsMin(ex)}"></label>
      <label style="${lbl}">Sets — max<input type="number" id="editExSetsMax" value="${getSetsMax(ex)}"></label>
    </div>
    <div class="row" style="gap:10px;">
      <label style="${lbl}">Starting reps<input type="number" id="editExStartReps" value="${ex.startReps}"></label>
      <label style="${lbl}">Rep ceiling (blank = uncapped)<input type="number" id="editExRepHigh" placeholder="uncapped" value="${ex.repHigh ?? ''}"></label>
    </div>
    <label style="${lbl}">Rep increment (blank = auto, +1/session)<input type="number" id="editExRepIncrement" placeholder="auto" value="${ex.repIncrement ?? ''}"></label>
    <div class="meta" style="margin:0;">Leave rep ceiling blank to keep reps climbing forever (classic mode). Set it to have reps cap out and sets take over instead — set a Sets max above 1 for that to do anything.</div>
    <div>
      <div class="meta" style="margin:0 0 4px;">What progresses? (pick at least one)</div>
      <label style="display:inline-flex; align-items:center; gap:5px; margin-right:14px; font-size:13px;"><input type="checkbox" id="editExProgressReps" ${progressesReps(ex) ? 'checked' : ''}> Reps</label>
      <label style="display:inline-flex; align-items:center; gap:5px; font-size:13px;"><input type="checkbox" id="editExProgressSets" ${progressesSets(ex) ? 'checked' : ''}> Sets</label>
    </div>
  ` : `
    <label style="${lbl}">Default starting hold time (seconds)<input type="number" id="editExStartSeconds" value="${ex.startSeconds}"></label>
    <label style="${lbl}">Time increment per progression/deload (sec)<input type="number" id="editExTimeIncrement" min="1" value="${getTimeIncrement(ex)}"></label>
  `;

  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-modal" style="max-width:400px; max-height:85vh; overflow-y:auto;">
      <h3>Edit exercise</h3>
      <div style="display:flex; flex-direction:column; gap:12px; margin-top:10px;">
        <label style="${lbl}">Name<input type="text" id="editExName" value="${escapeHtml(ex.name)}"></label>
        ${fieldsHtml}
        <div class="row" style="gap:10px;">
          <label style="${lbl}">Rest between sets (s)<input type="number" id="editExRestBetween" value="${ex.rest}"></label>

      <div class="row" style="margin-top:16px; gap:8px;">

      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#editExCancelBtn').onclick = close;
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#editExSaveBtn').onclick = () => {
    const name = overlay.querySelector('#editExName').value.trim();
    if (name && name !== ex.name) {
      // Same cascade renameExercise() does — history/PRs are matched by name,
      // so a rename that doesn't cascade would silently orphan past sessions.
      const oldName = ex.name;
      ex.name = name;
      state.history.forEach(h => { if (h.exercise === oldName) h.exercise = name; });
      if (state.prs) state.prs.forEach(p => { if (p.exercise === oldName) p.exercise = name; });
    }

    if (isWeighted) {
      const progressReps = overlay.querySelector('#editExProgressReps').checked;
      const progressSets = overlay.querySelector('#editExProgressSets').checked;
      const progressWeight = overlay.querySelector('#editExProgressWeight').checked;
      if (!progressReps && !progressSets && !progressWeight) {
        alert('Pick at least one thing to progress (reps, sets, or weight). Nothing was saved.');
        return;
      }
      ex.progressReps = progressReps;
      ex.progressSets = progressSets;
      ex.progressWeight = progressWeight;

      const repIncEl = overlay.querySelector('#editExRepIncrement');
      const repIncV = parseInt(repIncEl.value);
      if (repIncEl.value.trim() === '') delete ex.repIncrement;
      else if (!isNaN(repIncV) && repIncV >= 1) ex.repIncrement = repIncV;

      const beltIncEl = overlay.querySelector('#editExBeltIncrement');
      if (beltIncEl) {
        const beltIncV = parseInt(beltIncEl.value);
        if (!isNaN(beltIncV) && beltIncV >= 1) ex.beltIncrement = beltIncV;
      }

      const newMin = parseInt(overlay.querySelector('#editExSetsMin').value);
      const newMaxRaw = parseInt(overlay.querySelector('#editExSetsMax').value);
      if (!isNaN(newMin) && newMin >= 1) {
        const newMax = Math.max(newMin, isNaN(newMaxRaw) ? newMin : newMaxRaw);
        ex.setsMin = newMin; ex.setsMax = newMax;
        const s = getExState(ex);
        s.sets = Math.min(Math.max(s.sets, newMin), newMax);
      }
      const lowV = parseInt(overlay.querySelector('#editExRepLow').value);
      const highV = parseInt(overlay.querySelector('#editExRepHigh').value);
      if (!isNaN(lowV)) ex.repLow = Math.max(1, lowV);
      if (!isNaN(highV)) ex.repHigh = Math.max(ex.repLow, highV);
      const s2 = getExState(ex);
      s2.targetReps = Math.min(Math.max(s2.targetReps, ex.repLow), ex.repHigh);
    } else if (ex.mode === 'bodyweight') {
      const progressReps = overlay.querySelector('#editExProgressReps').checked;
      const progressSets = overlay.querySelector('#editExProgressSets').checked;
      if (!progressReps && !progressSets) {
        alert('Pick at least one thing to progress (reps or sets). Nothing was saved.');
        return;
      }
      ex.progressReps = progressReps;
      ex.progressSets = progressSets;

      const newMin = parseInt(overlay.querySelector('#editExSetsMin').value);
      const newMaxRaw = parseInt(overlay.querySelector('#editExSetsMax').value);
      if (!isNaN(newMin) && newMin >= 1) {
        const newMax = Math.max(newMin, isNaN(newMaxRaw) ? newMin : newMaxRaw);
        ex.setsMin = newMin; ex.setsMax = newMax; ex.sets = newMin;
        const s = getExState(ex);
        s.sets = Math.min(Math.max(s.sets, newMin), newMax);
      }

      const repsV = parseInt(overlay.querySelector('#editExStartReps').value);
      if (!isNaN(repsV) && repsV >= 1) ex.startReps = repsV;

      const repHighEl = overlay.querySelector('#editExRepHigh');
      if (repHighEl.value.trim() === '') delete ex.repHigh;
      else {
        const repHighV = parseInt(repHighEl.value);
        if (!isNaN(repHighV)) ex.repHigh = Math.max(ex.startReps, repHighV);
      }

      const repIncEl = overlay.querySelector('#editExRepIncrement');
      const repIncV = parseInt(repIncEl.value);
      if (repIncEl.value.trim() === '') delete ex.repIncrement;
      else if (!isNaN(repIncV) && repIncV >= 1) ex.repIncrement = repIncV;

      const s2 = getExState(ex);
      if (ex.repHigh != null) s2.targetReps = Math.min(Math.max(s2.targetReps, ex.startReps), ex.repHigh);
    } else if (ex.mode === 'timed') {
      const secV = parseInt(overlay.querySelector('#editExStartSeconds').value);
      if (!isNaN(secV) && secV >= 1) ex.startSeconds = secV;
      const timeIncV = parseInt(overlay.querySelector('#editExTimeIncrement').value);
      if (!isNaN(timeIncV) && timeIncV >= 1) ex.timeIncrement = timeIncV;
    }

    const restBetweenV = parseInt(overlay.querySelector('#editExRestBetween').value);
    const restAfterV = parseInt(overlay.querySelector('#editExRestAfter').value);
    if (!isNaN(restBetweenV) && restBetweenV > 0) ex.rest = restBetweenV;
    if (!isNaN(restAfterV) && restAfterV >= 0) ex.transitionRest = restAfterV;

    const threshV = parseInt(overlay.querySelector('#editExFailThreshold').value);
    if (!isNaN(threshV) && threshV >= 1) ex.failThreshold = threshV;

    ex.notes = overlay.querySelector('#editExNotes').value.trim();

    propagateLinkedExerciseConfig(ex);
    delete liveSets[exId]; // force re-generation with any new set count/targets
    persistDays();
    saveState();
    close();
    render();
  };
}

function editExerciseConfig(exId) {
  const ex = getExerciseById(exId);
  if (!ex) return;

  const s = getExState(ex);

  if (ex.mode === 'weighted' || ex.mode === 'weighted_bw') {
    const curMin = getSetsMin(ex), curMax = getSetsMax(ex);
    const minInput = prompt(`Sets — MIN (your starting point, and where it resets after a weight increase). Current: ${curMin}`, curMin);
    if (minInput === null) return;
    const newMin = parseInt(minInput);
    if (isNaN(newMin) || newMin < 1) { alert('Enter a valid number of sets (1 or more).'); return; }

    const maxInput = prompt(`Sets — MAX (ceiling before weight increases). Current: ${curMax}`, curMax);
    if (maxInput === null) return;
    const newMax = Math.max(newMin, parseInt(maxInput) || newMin);

    ex.setsMin = newMin;
    ex.setsMax = newMax;
    s.sets = Math.min(Math.max(s.sets, newMin), newMax); // keep current live sets within new range

    const lowInput = prompt(`Custom rep range — LOW end. Current: ${ex.repLow}\n(Increment auto-adjusts: 2 reps/session if low end is 8+, 1 rep/session if 7 or below)`, ex.repLow);
    if (lowInput !== null && !isNaN(parseInt(lowInput))) ex.repLow = Math.max(1, parseInt(lowInput));
    const highInput = prompt(`Custom rep range — HIGH end (sets/weight increases once you hit this). Current: ${ex.repHigh}`, ex.repHigh);
    if (highInput !== null && !isNaN(parseInt(highInput))) ex.repHigh = Math.max(ex.repLow, parseInt(highInput));

    // Keep current live target within the new valid range
    s.targetReps = Math.min(Math.max(s.targetReps, ex.repLow), ex.repHigh);
  } else if (ex.mode === 'bodyweight') {
    const setsInput = prompt(`Number of sets for "${ex.name}". Current: ${ex.sets}`, ex.sets);
    if (setsInput === null) return;
    const newSets = parseInt(setsInput);
    if (isNaN(newSets) || newSets < 1) { alert('Enter a valid number of sets (1 or more).'); return; }
    ex.sets = newSets;
    const repsInput = prompt(`Default starting reps. Current: ${ex.startReps}`, ex.startReps);
    if (repsInput !== null && !isNaN(parseInt(repsInput))) ex.startReps = Math.max(1, parseInt(repsInput));
  } else if (ex.mode === 'timed') {
    const secInput = prompt(`Default starting hold time (seconds). Current: ${ex.startSeconds}`, ex.startSeconds);
    if (secInput !== null && !isNaN(parseInt(secInput))) ex.startSeconds = Math.max(1, parseInt(secInput));
  }

  delete liveSets[exId]; // force re-generation with new set count/targets next render
  propagateLinkedExerciseConfig(ex);
  persistDays();
  saveState();
  alert(`Updated setup for "${ex.name}".`);
  render();
}

function editRestTime(exId) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const input = prompt(`Rest BETWEEN SETS (seconds). Current: ${ex.rest}s`, ex.rest);
  if (input === null) return;
  const n = parseInt(input);
  if (isNaN(n) || n <= 0) { alert('Enter a valid number of seconds.'); return; }
  ex.rest = n;

  const currentTransition = ex.transitionRest ?? TRANSITION_REST_SECONDS;
  const input2 = prompt(`Rest AFTER finishing this exercise, before the next one (seconds). Current: ${currentTransition}s`, currentTransition);
  if (input2 !== null) {
    const n2 = parseInt(input2);
    if (!isNaN(n2) && n2 >= 0) ex.transitionRest = n2;
  }

  persistDays();
  alert(`Updated rest times for "${ex.name}": ${ex.rest}s between sets, ${ex.transitionRest ?? TRANSITION_REST_SECONDS}s before next exercise.`);
  render();
}

function editExerciseProgress(exId) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const s = getExState(ex);

  if (ex.mode === 'weighted') {
    const current = WEIGHTS[s.tier];
    const input = prompt(`Current dumbbell weight: ${current} lb.\nEnter new weight (one of ${WEIGHTS.join(', ')}):`, current);
    if (input === null) return;
    const n = parseInt(input);
    const idx = WEIGHTS.indexOf(n);
    if (idx === -1) { alert(`Must be one of: ${WEIGHTS.join(', ')}`); return; }
    s.tier = idx;
    const reps = prompt(`Target reps to start at this weight (usually ${ex.repLow}):`, ex.repLow);
    if (reps !== null && !isNaN(parseInt(reps))) s.targetReps = Math.max(1, parseInt(reps));
    s.failStreak = 0;
  } else if (ex.mode === 'weighted_bw') {
    const input = prompt(`Current belt weight: ${s.addedWeight} lb.\nEnter new belt weight (multiple of ${getBeltIncrement(ex)}):`, s.addedWeight);
    if (input === null) return;
    const n = parseInt(input);
    if (isNaN(n) || n < 0) { alert('Enter a valid non-negative number.'); return; }
    s.addedWeight = n;
    const reps = prompt(`Target reps to start at this belt weight (usually ${ex.repLow}):`, ex.repLow);
    if (reps !== null && !isNaN(parseInt(reps))) s.targetReps = Math.max(1, parseInt(reps));
    s.failStreak = 0;
  } else if (ex.mode === 'bodyweight') {
    const input = prompt(`Current target reps: ${s.targetReps}.\nEnter new target reps:`, s.targetReps);
    if (input === null) return;
    const n = parseInt(input);
    if (isNaN(n) || n < 1) { alert('Enter a valid number.'); return; }
    s.targetReps = n;
    s.failStreak = 0;
  } else if (ex.mode === 'timed') {
    const input = prompt(`Current target hold: ${s.targetSeconds}s.\nEnter new target seconds:`, s.targetSeconds);
    if (input === null) return;
    const n = parseInt(input);
    if (isNaN(n) || n < 1) { alert('Enter a valid number.'); return; }
    s.targetSeconds = n;
    s.failStreak = 0;
  }
  saveState();
  alert(`Updated. All future sessions for "${ex.name}" will project from this new baseline.`);
  render();
}

function onManageModeChange() {
  const mode = document.getElementById('newExMode').value;
  const isWeighted = (mode === 'weighted' || mode === 'weighted_bw');
  const isBodyweight = (mode === 'bodyweight');
  document.getElementById('grpRepRange').style.display = isWeighted ? 'block' : 'none';
  document.getElementById('grpProgressOptions').style.display = (isWeighted || isBodyweight) ? 'block' : 'none';
  document.getElementById('progressWeightWrap').style.display = isWeighted ? 'inline-flex' : 'none';
  document.getElementById('grpBeltIncrement').style.display = (mode === 'weighted_bw') ? 'block' : 'none';
  document.getElementById('grpStartReps').style.display = isBodyweight ? 'block' : 'none';
  document.getElementById('grpStartSeconds').style.display = (mode === 'timed') ? 'block' : 'none';
}

// Clones an existing exercise's config into another day, sharing its id —
// which is all that's needed for progression state (keyed by id) and
// history/PRs (keyed by name) to automatically stay unified across both
// days. Rest times start copied from the source but are independently
// editable per day afterward.
function linkExerciseToDay(sourceExId, targetDayIdx) {
  const source = getExerciseById(sourceExId);
  const targetDay = DAYS[targetDayIdx];
  if (!source || !targetDay) return;
  if (targetDay.exercises.some(e => e.id === sourceExId)) { alert(`"${source.name}" is already on ${targetDay.label}.`); return; }
  const clone = JSON.parse(JSON.stringify(source));
  targetDay.exercises.push(clone);
  persistDays();
  document.getElementById('linkExOverlay')?.remove();
  render();
  alert(`Linked "${source.name}" to ${targetDay.label} — it'll share progress with every day it's linked to.`);
}

// Picker overlay: every unique exercise (deduped by id) not already on this
// day, with a name filter since a well-used app can easily have 25+ exercises
// across its day rotation.
function openLinkExercisePicker(dayIdx) {
  const day = DAYS[dayIdx];
  const seen = new Set();
  const candidates = [];
  DAYS.forEach(d => d.exercises.forEach(ex => {
    if (seen.has(ex.id) || ex.id === undefined) return;
    if (d.exercises === day.exercises) return; // will still be excluded below, but skip dup work
    seen.add(ex.id);
    candidates.push(ex);
  }));
  const available = candidates.filter(ex => !day.exercises.some(e => e.id === ex.id));

  const rowHtml = (ex) => {
    const onDays = getLinkedCopies(ex.id).map(c => `${c.day.icon} ${c.day.label}`).join(', ');
    return `<div class="histitem row" data-exname="${escapeHtml(ex.name.toLowerCase())}">
      <span>${escapeHtml(ex.name)} <span class="badge">${ex.mode}</span><br><span style="font-size:11px; color:var(--text-faint);">on: ${onDays}</span></span>
      <button class="btn small" onclick="linkExerciseToDay('${ex.id}', ${dayIdx})">+ Add</button>
    </div>`;
  };

  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.id = 'linkExOverlay';
  overlay.innerHTML = `
    <div class="confirm-modal" style="max-width:400px; max-height:85vh; overflow-y:auto;">
      <h3>🔗 Link an exercise to ${escapeHtml(day.label)}</h3>
      <div class="meta">Adds an exercise already used elsewhere so it shares the same progression (weight/reps/sets) and history across every day it's linked to — one shared exercise, trained from multiple muscle-group days.</div>
      <input type="text" id="linkExFilter" placeholder="Search exercises..." style="width:100%; margin-bottom:10px; box-sizing:border-box;" oninput="filterLinkExerciseList()">
      <div id="linkExList">${available.length ? available.map(rowHtml).join('') : `<div class="empty">No other exercises to link yet — add one to another day first.</div>`}</div>
      <div class="row" style="margin-top:16px;">
        <button class="btn secondary" style="width:100%;" onclick="document.getElementById('linkExOverlay').remove()">Close</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}
function filterLinkExerciseList() {
  const q = document.getElementById('linkExFilter').value.trim().toLowerCase();
  document.querySelectorAll('#linkExList [data-exname]').forEach(row => {
    row.style.display = row.dataset.exname.includes(q) ? '' : 'none';
  });
}

function addExercise(dayIdx) {
  const name = document.getElementById('newExName').value.trim();
  const mode = document.getElementById('newExMode').value;
  const sets = parseInt(document.getElementById('newExSets').value) || 3;
  const rest = parseInt(document.getElementById('newExRest').value) || 90;
  if (!name) { alert('Enter an exercise name.'); return; }

  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').slice(0,30) + '_' + Date.now().toString(36).slice(-4);
  const ex = { id, name, mode, sets, rest };

  if (mode === 'weighted' || mode === 'weighted_bw') {
    ex.repLow = parseInt(document.getElementById('newExRepLow').value) || DEFAULT_REP_LOW;
    ex.repHigh = parseInt(document.getElementById('newExRepHigh').value) || DEFAULT_REP_HIGH;
    ex.setsMin = sets;
    ex.setsMax = sets + 2; // default headroom; editable anytime via 🔧 Sets/Reps

    const progressReps = document.getElementById('newExProgressReps').checked;
    const progressSets = document.getElementById('newExProgressSets').checked;
    const progressWeight = document.getElementById('newExProgressWeight').checked;
    if (!progressReps && !progressSets && !progressWeight) {
      alert('Pick at least one thing to progress (reps, sets, or weight).');
      return;
    }
    ex.progressReps = progressReps;
    ex.progressSets = progressSets;
    ex.progressWeight = progressWeight;

    const repIncRaw = parseInt(document.getElementById('newExRepIncrement').value);
    if (!isNaN(repIncRaw) && repIncRaw >= 1) ex.repIncrement = repIncRaw;

    if (mode === 'weighted_bw') {
      const beltIncRaw = parseInt(document.getElementById('newExBeltIncrement').value);
      ex.beltIncrement = (!isNaN(beltIncRaw) && beltIncRaw >= 1) ? beltIncRaw : BELT_INCREMENT;
    }
  } else if (mode === 'bodyweight') {
    ex.startReps = parseInt(document.getElementById('newExStartReps').value) || 5;
    ex.setsMin = sets;
    ex.setsMax = sets + 2; // default headroom; editable anytime via ✏️ Edit

    const progressReps = document.getElementById('newExProgressReps').checked;
    const progressSets = document.getElementById('newExProgressSets').checked;
    if (!progressReps && !progressSets) {
      alert('Pick at least one thing to progress (reps or sets).');
      return;
    }
    ex.progressReps = progressReps;
    ex.progressSets = progressSets;

    const repHighRaw = parseInt(document.getElementById('newExBwRepHigh').value);
    if (!isNaN(repHighRaw) && repHighRaw >= ex.startReps) ex.repHigh = repHighRaw;

    const repIncRaw = parseInt(document.getElementById('newExRepIncrementBw').value);
    if (!isNaN(repIncRaw) && repIncRaw >= 1) ex.repIncrement = repIncRaw;
  } else if (mode === 'timed') {
    ex.startSeconds = parseInt(document.getElementById('newExStartSeconds').value) || 30;
    const timeIncRaw = parseInt(document.getElementById('newExTimeIncrement').value);

}

// ---------- GOOGLE DRIVE SYNC ----------
// Uses Google Identity Services (client-side token flow) + the Drive API's
// narrow 'drive.file' scope — the app can only ever see files it creates
// itself, nothing else in your Drive. Because this is a pure browser app
// with no backend server, Google does not issue a long-lived refresh token
// here (that's a deliberate security limitation of client-side apps, not
// something any app can work around). Instead, every sync attempts a SILENT
// token request first — if your phone's browser is still signed into the
// Google account you connected, this succeeds with no visible prompt at
// all. You'd only see Google's consent screen again if that browser signs
// out of Google entirely, which is uncommon on a personal phone.
const GOOGLE_CLIENT_ID = '160168494561-93iqlvtqmtntdm2vudcgs6cvtddd3vgq.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_BACKUP_FILENAME = 'liftlog-backup.json';

let driveTokenClient = null;
let driveAccessToken = null; // in-memory only, never persisted — re-acquired each session

function getDriveSyncState() {
  state.driveSync = state.driveSync || { connected: false, email: null, fileId: null, lastSync: null };
  return state.driveSync;
}

function initDriveTokenClient(callback) {
  if (!window.google || !google.accounts || !google.accounts.oauth2) {
    alert('Google sign-in is still loading — try again in a second.');
    return null;
  }
  return google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: callback
  });
}

// First-time connect: shows Google's account picker + consent screen. This
// is the one moment you pick which Google account backups go to.
function connectGoogleDrive() {
  const client = initDriveTokenClient(async (resp) => {
    if (resp.error) { alert('Google Drive connection failed or was cancelled.'); return; }
    driveAccessToken = resp.access_token;
    await onDriveTokenAcquired();
  });
  if (client) client.requestAccessToken({ prompt: 'consent' });
}

// Attempts to get a fresh access token without showing any UI. Used for
// every sync after the first one. Resolves to true/false rather than
// throwing, so callers can decide what to do on failure.
function silentDriveAuth() {
  return new Promise((resolve) => {
    const client = initDriveTokenClient((resp) => {
      if (resp.error) { resolve(false); return; }
      driveAccessToken = resp.access_token;
      resolve(true);
    });
    if (!client) { resolve(false); return; }
    try { client.requestAccessToken({ prompt: '' }); }
    catch (e) { resolve(false); }
  });
}

async function onDriveTokenAcquired() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${driveAccessToken}` }
    });
    const info = await res.json();
    const ds = getDriveSyncState();
    ds.connected = true;
    ds.email = info.email || null;
    saveState();
  } catch (e) { /* email is cosmetic only, don't block sync on this */ }
  await driveSyncNow();
  render();
}

function disconnectGoogleDrive() {
  showConfirm({
    title: 'Disconnect Google Drive?',
    message: 'Local backups (Downloads folder) will keep working as before.',
    confirmLabel: 'Disconnect',
    danger: true,
    onConfirm: () => {
      const ds = getDriveSyncState();
      ds.connected = false;
      ds.email = null;
      ds.fileId = null;
      driveAccessToken = null;
      saveState();
      render();
    }
  });
}

// Finds the existing backup file (by its stored Drive file ID, or by
// searching by name as a fallback for a fresh session) so every sync
// overwrites the SAME file — zero accumulation, unlike local downloads.
async function findOrCreateDriveFileId() {
  const ds = getDriveSyncState();
  if (ds.fileId) return ds.fileId;

  const query = encodeURIComponent(`name='${DRIVE_BACKUP_FILENAME}' and trashed=false`);
  const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&spaces=drive&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${driveAccessToken}` }
  });
  const listData = await listRes.json();
  if (listData.files && listData.files.length > 0) {
    ds.fileId = listData.files[0].id;
    saveState();
    return ds.fileId;
  }
  return null; // doesn't exist yet — driveSyncNow() will create it
}

async function driveSyncNow(silent) {
  const ds = getDriveSyncState();
  if (!ds.connected) return false;

  if (!driveAccessToken) {
    const ok = await silentDriveAuth();
    if (!ok) {
      // Silent refresh failed — the Google session itself likely needs a
      // fresh sign-in. Only interrupt with a visible prompt if this sync
      // was manually triggered; never during a silent background backup.
      if (!silent) connectGoogleDrive();
      return false;
    }
  }

  try {
    const json = JSON.stringify(state, null, 2);
    const fileId = await findOrCreateDriveFileId();
    const metadata = { name: DRIVE_BACKUP_FILENAME, mimeType: 'application/json' };
    const boundary = 'liftlog_boundary';
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${json}\r\n--${boundary}--`;

    const url = fileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const method = fileId ? 'PATCH' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { Authorization: `Bearer ${driveAccessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
      body
    });
    if (!res.ok) throw new Error('Drive API error ' + res.status);
    const data = await res.json();
    if (!fileId && data.id) { ds.fileId = data.id; }
    ds.lastSync = new Date().toISOString();
    saveState();
    return true;
  } catch (e) {
    return false; // fail silently for background syncs; manual button shows its own alert below
  }
}

async function manualDriveSyncNow() {
  const ok = await driveSyncNow(false);
  render();
  if (ok) alert('✅ Synced to Google Drive.');
  else alert('Sync failed or needs re-connection — try "Connect Google Drive" again.');
}

// Pulls the single Drive backup file down and replaces local data with it —
// the counterpart to driveSyncNow() (which only ever pushes local → Drive).
async function restoreFromDriveNow() {
  const ds = getDriveSyncState();
  if (!ds.connected) { alert('Connect Google Drive first.'); return; }
  showConfirm({
    title: 'Restore from Google Drive?',
    message: 'This replaces ALL data on this device with whatever is currently saved in your Drive backup. This cannot be undone.',
    confirmLabel: 'Restore',
    danger: true,
    onConfirm: async () => {
      if (!driveAccessToken) {
        const ok = await silentDriveAuth();
        if (!ok) { connectGoogleDrive(); return; } // re-prompts sign-in; re-tap Restore once reconnected
      }

      try {
        const fileId = await findOrCreateDriveFileId();
        if (!fileId) { alert('No backup found in Google Drive yet — nothing to restore.'); return; }
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
          headers: { Authorization: `Bearer ${driveAccessToken}` }
        });
        if (!res.ok) throw new Error('Drive API error ' + res.status);
        const imported = await res.json();
        if (!imported.exercises || !imported.history) throw new Error('bad format');
        const keepDriveSync = ds; // this device's Drive connection isn't part of the portable backup itself
        state = imported;
        state.driveSync = keepDriveSync;
        state.driveSync.lastSync = new Date().toISOString();
        hydrateDaysFromState(); // runs any migrations this backup needs and refreshes DAYS to match
        saveState();
        render();
        alert('✅ Restored from Google Drive.');
      } catch (e) {
        alert('Restore failed — check your connection and try again.');
      }
    }
  });
}

       <div class="meta" style="margin:4px 0 0; font-weight:700; color:${driveDaysSince !== null && driveDaysSince >= 7 ? 'var(--danger)' : 'var(--text-dim)'};">🕐 ${driveAgeLabel}</div>

  const backupAgeLabel = daysSince === null ? 'No backup yet'
    : daysSince === 0 ? 'Last backup: today'

    : `Last backup: ${daysSince} days ago`;

  const backupBar = `<div class="card">
    <div class="row">
      <button class="btn small secondary" onclick="shareBackup()">📤 Share file</button>
      <button class="btn small secondary" onclick="exportBackup()">⬇ Download</button>

    </div>
    <div class="meta" style="margin:8px 0 0; font-weight:700; color:${daysSince !== null && daysSince >= 7 ? 'var(--danger)' : 'var(--text-dim)'};">🕐 ${backupAgeLabel}</div>
    <label class="row" style="margin-top:8px; align-items:center; gap:8px; cursor:pointer;">
      <input type="checkbox" ${getAutoBackupOnComplete() ? 'checked' : ''} onchange="setAutoBackupOnComplete(this.checked)">
      <span class="meta" style="margin:0;">Auto-backup (download) after finishing a full workout</span>
    </label>
    <div class="meta" style="margin:2px 0 0;">${getAutoBackupOnComplete() ? 'A local backup file downloads automatically each time you finish every exercise in a workout group.' : 'Auto-backup is off — backups only happen when you tap Share, Download, or Sync now above.'}</div>
    ${driveSection}
  </div>`;
  if (state.history.length === 0) return `<main>${backupBar}${renderCalendar()}<div class="empty">No workouts logged yet.</div></main>`;
  const items = [...state.history].reverse().slice(0,100).map(h => {
    const date = new Date(h.date).toLocaleString();
    const setsStr = h.sets.join(', ');
    return `<div class="histitem">
      <strong>${escapeHtml(h.exercise)}</strong> <span class="badge">${escapeHtml(h.day)}</span><br>
      ${h.weight ? h.weight+' lb · ' : ''}sets: ${setsStr}<br>
      <span style="color:var(--text-faint)">${date}</span>
    </div>`;
  }).join('');
  const seenSessions = new Map();
  state.history.forEach(h => {
    const dk = getEntryDateKey(h);

    if (!seenSessions.has(key)) seenSessions.set(key, { dateKey: dk, dayLabel: h.day, sessionNum: num });

  const durationsHtml = recentSessions.map(({dateKey, dayLabel, sessionNum}) => {

      <span style="opacity:.55; font-size:11px;">✏️</span>

  return `<main>${backupBar}
    ${renderCalendar()}

    <div class="card">${items}</div>
  </main>`;

function getBackupFolderName() {
  return (state.meta && state.meta.backupFolder) || 'LiftLog';
}

function editBackupFolder() {
  const current = getBackupFolderName();
  const input = prompt(`Backup folder path (inside your phone's Downloads folder). Use / for nested folders, e.g. "Fitness/LiftLog".\nCurrent: Downloads/${current}/`, current);
  if (input === null) return;
  const clean = input.trim()
    .replace(/\.\./g, '')       // block path traversal
    .replace(/[\\:*?"<>|]/g, '') // strip characters invalid in folder names (slash is allowed, for nesting)
    .replace(/^\/+|\/+$/g, '')  // trim leading/trailing slashes
    .replace(/\/+/g, '/');      // collapse repeated slashes
  if (!clean) { alert('Enter a valid folder name.'); return; }
  state.meta = state.meta || {};
  state.meta.backupFolder = clean;
  saveState();
  alert(`Backups will now attempt to save to Downloads/${clean}/\nNote: on some Chrome versions, nested subfolders may not be created automatically — if that happens, the file will just land directly in Downloads instead. Worth checking once on your phone after changing this.`);
}

function makeBackupFile() {
  const stamp = new Date().toISOString().slice(0,10);
  const json = JSON.stringify(state, null, 2);
  return new File([json], `${getBackupFolderName()}/liftlog-backup-${stamp}.json`, { type: 'application/json' });
}

function exportBackup() {
  const file = makeBackupFile();
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url; a.download = file.name;
  a.click();
  URL.revokeObjectURL(url);
  state.meta = state.meta || {};
  state.meta.lastBackup = new Date().toISOString();
  saveState();
}

async function shareBackup() {
  const file = makeBackupFile();
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'LiftLog Backup' });
      state.meta = state.meta || {};
      state.meta.lastBackup = new Date().toISOString();
      saveState();
      return;
    } catch (e) { /* user cancelled or share failed, fall back below */ }
  }
  alert('Direct share not supported on this browser — using download instead. Open the file and use "Save to Drive" from there.');
  exportBackup();
}

// Returns whole days since the most recent backup (local export/share OR
// Drive sync, whichever is more recent), or null if no backup has ever
// been made. Used to show the "Last backup: N days ago" indicator in
// Manage — this is what tells the person it's time to tap one of the
// backup buttons (or, now, that the auto-backup-on-completion toggle is off).
function daysSinceLastBackup() {
  state.meta = state.meta || {};
  const ds = getDriveSyncState();
  const candidates = [state.meta.lastBackup, ds.lastSync].filter(Boolean).map(d => new Date(d).getTime());
  if (candidates.length === 0) return null;
  const mostRecent = Math.max(...candidates);
  return Math.floor((Date.now() - mostRecent) / 86400000);
}

// Returns whole days since the most recent Google Drive sync specifically
// (not local backups), or null if this device has never synced to Drive.
// Shown next to the Drive section so "days since Drive backup" is visible
// on its own, separate from the combined local-or-Drive figure above.
function daysSinceLastDriveSync() {
  const ds = getDriveSyncState();
  if (!ds.lastSync) return null;
  return Math.floor((Date.now() - new Date(ds.lastSync).getTime()) / 86400000);
}

// Fires automatically the moment every exercise in a workout group is
// finished (see finishExerciseConfirmed), unless the user has turned the
// toggle off in Manage. Deliberately reuses exportBackup() itself — the
// exact same file-writing path as the manual Download button — so there's
// only one place that ever writes a backup file, and auto/manual backups
// are provably identical in format.
function autoBackupOnWorkoutComplete() {
  if (!getAutoBackupOnComplete()) return false;
  try {
    exportBackup();
    return true;
  } catch (e) {
    return false; // fail silently — the manual backup buttons are still there as a fallback
  }
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!imported.exercises || !imported.history) throw new Error('bad format');
      showConfirm({
        title: 'Import backup?',
        message: 'Import will replace all current data on this device. This cannot be undone.',
        confirmLabel: 'Import',
        danger: true,
        onConfirm: () => {
          const keepDriveSync = state.driveSync; // this device's Drive connection isn't part of the portable backup
          state = imported;
          state.driveSync = keepDriveSync;
          hydrateDaysFromState(); // runs any migrations this backup needs and refreshes DAYS to match
          saveState();
          render();
          alert('Backup restored.');
        }
      });
    } catch (e) {
      alert('Invalid backup file.');
    }
  };
  reader.readAsText(file);
}

// ---------- INIT ----------
applyTheme(getTheme());
if (isTestMode()) {
  const banner = document.getElementById('testModeBanner');
  banner.style.display = 'block';
  banner.textContent = '🧪 TEST MODE — changes here do NOT affect your real data';
}
render();
requestWakeLock();

// Extra safety net: closing the tab/PWA mid-set with unfinished progress is
// an easy accident. Most mobile browsers won't show a custom dialog here,
// but desktop/Android Chrome will prompt — free protection where it works,
// harmless no-op where it doesn't.
window.addEventListener('beforeunload', (e) => {
  if (hasUnsavedFocusProgress(currentDayIdx)) {
    e.preventDefault();
    e.returnValue = '';
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
