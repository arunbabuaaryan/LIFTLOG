        ${ex.mode === 'weighted'
          ? `<div class="exp-field"><label>Current weight (lb)</label><select id="f-curweight-${ex.id}">${WEIGHTS.map(w => `<option value="${w}" ${WEIGHTS[s.tier] === w ? 'selected' : ''}>${w}</option>`).join('')}</select></div>`
          : `<div class="exp-field"><label>Current belt weight (lb)</label><input id="f-curbelt-${ex.id}" type="number" step="${BELT_INCREMENT}" value="${s.addedWeight}"></div>`}
        <div class="exp-field"><label>Current target reps</label><input id="f-curtargetreps-${ex.id}" type="number" value="${s.targetReps}"></div>
      </div>`;
  } else if (ex.mode === 'bodyweight') {
    modeFields = `
      <div class="exp-grid2">
        <div class="exp-field"><label>Sets</label><input id="f-sets-${ex.id}" type="number" value="${ex.sets}"></div>
        <div class="exp-field"><label>Starting reps (baseline)</label><input id="f-startreps-${ex.id}" type="number" value="${ex.startReps}"></div>
      </div>
      <div class="exp-section-label">Current Progress</div>
      <div class="exp-field"><label>Current target reps</label><input id="f-curtargetreps-${ex.id}" type="number" value="${s.targetReps}"></div>`;
  } else if (ex.mode === 'timed') {
    modeFields = `
      <div class="exp-field"><label>Starting hold (seconds, baseline)</label><input id="f-startsec-${ex.id}" type="number" value="${ex.startSeconds}"></div>
      <div class="exp-section-label">Current Progress</div>
      <div class="exp-field"><label>Current target hold (seconds)</label><input id="f-curtargetsec-${ex.id}" type="number" value="${s.targetSeconds}"></div>`;
  }

  return `
    <div class="exp-body" data-no-swipe onclick="event.stopPropagation()">
      <div class="exp-field"><label>Name</label><input id="f-name-${ex.id}" type="text" value="${escapeHtml(ex.name)}"></div>
      <div class="exp-grid2">
        <div class="exp-field"><label>Rest between sets (sec)</label><input id="f-rest-${ex.id}" type="number" value="${ex.rest}"></div>
        <div class="exp-field"><label>Rest before next exercise (sec)</label><input id="f-transrest-${ex.id}" type="number" value="${ex.transitionRest ?? TRANSITION_REST_SECONDS}"></div>
      </div>
      <div class="exp-field"><label>Misses before deload</label><input id="f-failthresh-${ex.id}" type="number" min="1" value="${getFailThreshold(ex)}"></div>
      ${modeFields}
      <div class="exp-field"><label>Notes (optional)</label><textarea id="f-notes-${ex.id}" rows="2" placeholder="Form cues, machine number, anything worth remembering...">${escapeHtml(ex.notes || '')}</textarea></div>
      <div class="row" style="margin-top:4px;">
        <button class="btn small secondary" onclick="removeExercise(${currentDayIdx}, '${ex.id}')">🗑 Remove Exercise</button>
        <button class="btn small" onclick="saveExerciseSettings('${ex.id}')">Save Changes</button>
      </div>
    </div>`;
}

// Reads every field from the expanded card and applies it in one pass — the
// consolidated replacement for the old Rename / Sets-Reps / Rest / Progress
// popup chain.
function saveExerciseSettings(exId) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const s = getExState(ex);
  const field = (suffix) => document.getElementById(`f-${suffix}-${exId}`);

  const nameEl = field('name');
  if (nameEl) {
    const cleanName = nameEl.value.trim();
    if (cleanName && cleanName !== ex.name) {
      const oldName = ex.name;
      ex.name = cleanName;
      state.history.forEach(h => { if (h.exercise === oldName) h.exercise = cleanName; });
      if (state.prs) state.prs.forEach(p => { if (p.exercise === oldName) p.exercise = cleanName; });
    }
  }

  const restEl = field('rest');
  if (restEl) { const n = parseInt(restEl.value); if (!isNaN(n) && n > 0) ex.rest = n; }
  const transEl = field('transrest');
  if (transEl) { const n = parseInt(transEl.value); if (!isNaN(n) && n >= 0) ex.transitionRest = n; }
  const threshEl = field('failthresh');
  if (threshEl) { const n = parseInt(threshEl.value); if (!isNaN(n) && n >= 1) ex.failThreshold = n; }
  const notesEl = field('notes');
  if (notesEl) ex.notes = notesEl.value.trim();

  if (ex.mode === 'weighted' || ex.mode === 'weighted_bw') {
    const minEl = field('setsmin'), maxEl = field('setsmax');
    if (minEl && maxEl) {
      const newMin = parseInt(minEl.value);
      let newMax = parseInt(maxEl.value);
      if (!isNaN(newMin) && newMin >= 1) {
        if (isNaN(newMax) || newMax < newMin) newMax = newMin;
        ex.setsMin = newMin; ex.setsMax = newMax;
        s.sets = Math.min(Math.max(s.sets, newMin), newMax);
      }
    }
    const lowEl = field('replow'), highEl = field('rephigh');
    if (lowEl && !isNaN(parseInt(lowEl.value))) ex.repLow = Math.max(1, parseInt(lowEl.value));
    if (highEl && !isNaN(parseInt(highEl.value))) ex.repHigh = Math.max(ex.repLow, parseInt(highEl.value));
    s.targetReps = Math.min(Math.max(s.targetReps, ex.repLow), ex.repHigh);

    if (ex.mode === 'weighted') {
      const wEl = field('curweight');
      if (wEl) { const idx = WEIGHTS.indexOf(parseInt(wEl.value)); if (idx !== -1) s.tier = idx; }
    } else {
      const beltEl = field('curbelt');
      if (beltEl) { const n = parseInt(beltEl.value); if (!isNaN(n) && n >= 0) s.addedWeight = n; }
    }
    const curRepsEl = field('curtargetreps');
    if (curRepsEl) { const n = parseInt(curRepsEl.value); if (!isNaN(n) && n >= 1) s.targetReps = n; }
  } else if (ex.mode === 'bodyweight') {
    const setsEl = field('sets');
    if (setsEl) { const n = parseInt(setsEl.value); if (!isNaN(n) && n >= 1) ex.sets = n; }
    const startRepsEl = field('startreps');
    if (startRepsEl) { const n = parseInt(startRepsEl.value); if (!isNaN(n) && n >= 1) ex.startReps = n; }
    const curRepsEl = field('curtargetreps');
    if (curRepsEl) { const n = parseInt(curRepsEl.value); if (!isNaN(n) && n >= 1) s.targetReps = n; }
  } else if (ex.mode === 'timed') {
    const startSecEl = field('startsec');
    if (startSecEl) { const n = parseInt(startSecEl.value); if (!isNaN(n) && n >= 1) ex.startSeconds = n; }
    const curSecEl = field('curtargetsec');
    if (curSecEl) { const n = parseInt(curSecEl.value); if (!isNaN(n) && n >= 1) s.targetSeconds = n; }
  }

  delete liveSets[exId]; // force re-generation with new set count/targets next render
  persistDays();
  saveState();
  const savedName = ex.name;
  expandedExerciseId = null;
  render();
  showToast(`Saved "${savedName}".`);
}

function onManageModeChange() {
  const mode = document.getElementById('newExMode').value;
  document.getElementById('grpRepRange').style.display = (mode === 'weighted' || mode === 'weighted_bw') ? 'block' : 'none';
  document.getElementById('grpStartReps').style.display = (mode === 'bodyweight') ? 'block' : 'none';
  document.getElementById('grpStartSeconds').style.display = (mode === 'timed') ? 'block' : 'none';
}

function addExercise(dayIdx) {
  const name = document.getElementById('newExName').value.trim();
  const mode = document.getElementById('newExMode').value;
  const sets = parseInt(document.getElementById('newExSets').value) || 3;
  const rest = parseInt(document.getElementById('newExRest').value) || 90;
  if (!name) { alert('Enter an exercise name.'); return; }

  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').slice(0,30) + '_' + Date.now().toString(36).slice(-4);
  const ex = { id, name, mode, sets, rest };

  if (mode === 'weighted' || mode === 'weighted_bw') {
    ex.repLow = parseInt(document.getElementById('newExRepLow').value) || DEFAULT_REP_LOW;
    ex.repHigh = parseInt(document.getElementById('newExRepHigh').value) || DEFAULT_REP_HIGH;
    ex.setsMin = sets;
    ex.setsMax = sets + 2; // default headroom; editable anytime via 🔧 Sets/Reps
  } else if (mode === 'bodyweight') {
    ex.startReps = parseInt(document.getElementById('newExStartReps').value) || 5;
  } else if (mode === 'timed') {
    ex.startSeconds = parseInt(document.getElementById('newExStartSeconds').value) || 30;
  }

  DAYS[dayIdx].exercises.push(ex);
  persistDays();
  document.getElementById('newExName').value = '';
  render();
  alert(`Added "${name}" to ${DAYS[dayIdx].label}.`);
}

// ---------- GOOGLE DRIVE SYNC ----------
// Uses Google Identity Services (client-side token flow) + the Drive API's
// narrow 'drive.file' scope — the app can only ever see files it creates
// itself, nothing else in your Drive. Because this is a pure browser app
// with no backend server, Google does not issue a long-lived refresh token
// here (that's a deliberate security limitation of client-side apps, not
// something any app can work around). Instead, every sync attempts a SILENT
// token request first — if your phone's browser is still signed into the
// Google account you connected, this succeeds with no visible prompt at
// all. You'd only see Google's consent screen again if that browser signs
// out of Google entirely, which is uncommon on a personal phone.
const GOOGLE_CLIENT_ID = '160168494561-93iqlvtqmtntdm2vudcgs6cvtddd3vgq.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_BACKUP_FILENAME = 'liftlog-backup.json';

let driveTokenClient = null;
let driveAccessToken = null; // in-memory only, never persisted — re-acquired each session

function getDriveSyncState() {
  state.driveSync = state.driveSync || { connected: false, email: null, fileId: null, lastSync: null };
  return state.driveSync;
}

function initDriveTokenClient(callback) {
  if (!window.google || !google.accounts || !google.accounts.oauth2) {
    alert('Google sign-in is still loading — try again in a second.');
    return null;
  }
  return google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: callback
  });
}

// First-time connect: shows Google's account picker + consent screen. This
// is the one moment you pick which Google account backups go to.
function connectGoogleDrive() {
  const client = initDriveTokenClient(async (resp) => {
    if (resp.error) { alert('Google Drive connection failed or was cancelled.'); return; }
    driveAccessToken = resp.access_token;
    await onDriveTokenAcquired();
  });
  if (client) client.requestAccessToken({ prompt: 'consent' });
}

// Attempts to get a fresh access token without showing any UI. Used for
// every sync after the first one. Resolves to true/false rather than
// throwing, so callers can decide what to do on failure.
function silentDriveAuth() {
  return new Promise((resolve) => {
    const client = initDriveTokenClient((resp) => {
      if (resp.error) { resolve(false); return; }
      driveAccessToken = resp.access_token;
      resolve(true);
    });
    if (!client) { resolve(false); return; }
    try { client.requestAccessToken({ prompt: '' }); }
    catch (e) { resolve(false); }
  });
}

async function onDriveTokenAcquired() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${driveAccessToken}` }
    });
    const info = await res.json();
    const ds = getDriveSyncState();
    ds.connected = true;
    ds.email = info.email || null;
    saveState();
  } catch (e) { /* email is cosmetic only, don't block sync on this */ }
  await driveSyncNow();
  render();
}

async function disconnectGoogleDrive() {
  const ok = await showConfirmModal('Disconnect Google Drive? Local backups (Downloads folder) will keep working as before.', { confirmLabel: 'Disconnect' });
  if (!ok) return;
  const ds = getDriveSyncState();
  ds.connected = false;
  ds.email = null;
  ds.fileId = null;
  driveAccessToken = null;
  saveState();
  render();
}

// Finds the existing backup file (by its stored Drive file ID, or by
// searching by name as a fallback for a fresh session) so every sync
// overwrites the SAME file — zero accumulation, unlike local downloads.
async function findOrCreateDriveFileId() {
  const ds = getDriveSyncState();
  if (ds.fileId) return ds.fileId;

  const query = encodeURIComponent(`name='${DRIVE_BACKUP_FILENAME}' and trashed=false`);
  const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&spaces=drive&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${driveAccessToken}` }
  });
  const listData = await listRes.json();
  if (listData.files && listData.files.length > 0) {
    ds.fileId = listData.files[0].id;
    saveState();
    return ds.fileId;
  }
  return null; // doesn't exist yet — driveSyncNow() will create it
}

async function driveSyncNow(silent) {
  const ds = getDriveSyncState();
  if (!ds.connected) return false;

  if (!driveAccessToken) {
    const ok = await silentDriveAuth();
    if (!ok) {
      // Silent refresh failed — the Google session itself likely needs a
      // fresh sign-in. Only interrupt with a visible prompt if this sync
      // was manually triggered; never during a silent background backup.
      if (!silent) connectGoogleDrive();
      return false;
    }
  }

  try {
    const json = JSON.stringify(state, null, 2);
    const fileId = await findOrCreateDriveFileId();
    const metadata = { name: DRIVE_BACKUP_FILENAME, mimeType: 'application/json' };
    const boundary = 'liftlog_boundary';
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${json}\r\n--${boundary}--`;

    const url = fileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const method = fileId ? 'PATCH' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { Authorization: `Bearer ${driveAccessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
      body
    });
    if (!res.ok) throw new Error('Drive API error ' + res.status);
    const data = await res.json();
    if (!fileId && data.id) { ds.fileId = data.id; }
    ds.lastSync = new Date().toISOString();
    saveState();
    return true;
  } catch (e) {
    return false; // fail silently for background syncs; manual button shows its own alert below
  }
}

async function manualDriveSyncNow() {
  const ok = await driveSyncNow(false);
  render();
  if (ok) alert('✅ Synced to Google Drive.');
  else alert('Sync failed or needs re-connection — try "Connect Google Drive" again.');
}

// Pulls the single Drive backup file down and replaces local data with it —
// the counterpart to driveSyncNow() (which only ever pushes local → Drive).
async function restoreFromDriveNow() {
  const ds = getDriveSyncState();
  if (!ds.connected) { alert('Connect Google Drive first.'); return; }
  const ok = await showConfirmModal('Restore from Google Drive?\n\nThis replaces ALL data on this device with whatever is currently saved in your Drive backup. This cannot be undone.', { danger: true, confirmLabel: 'Restore' });
  if (!ok) return;

  if (!driveAccessToken) {
    const ok = await silentDriveAuth();
    if (!ok) { connectGoogleDrive(); return; } // re-prompts sign-in; re-tap Restore once reconnected
  }

  try {
    const fileId = await findOrCreateDriveFileId();
    if (!fileId) { alert('No backup found in Google Drive yet — nothing to restore.'); return; }
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${driveAccessToken}` }
    });
    if (!res.ok) throw new Error('Drive API error ' + res.status);
    const imported = await res.json();
    if (!imported.exercises || !imported.history) throw new Error('bad format');
    const keepDriveSync = ds; // this device's Drive connection isn't part of the portable backup itself
    state = imported;
    state.driveSync = keepDriveSync;
    state.driveSync.lastSync = new Date().toISOString();
    saveState();
    render();
    alert('✅ Restored from Google Drive.');
  } catch (e) {
    alert('Restore failed — check your connection and try again.');
  }
}

  const driveSection = ds.connected

  const backupBar = `<div class="card">

  if (state.history.length === 0) return `<main>${backupBar}${renderCalendar()}<div class="empty">No workouts logged yet.</div></main>`;

  const seenSessions = new Map();
  state.history.forEach(h => {
    const dk = getEntryDateKey(h);
    const num = getEntrySessionNum(h);
    const key = sessionKey(dk, h.day, num);
    if (!seenSessions.has(key)) seenSessions.set(key, { dateKey: dk, dayLabel: h.day, sessionNum: num });
  });
  const recentSessions = [...seenSessions.values()].slice(-5).reverse();
  const durationsHtml = recentSessions.map(({dateKey, dayLabel, sessionNum}) => {
    const mins = getSessionDuration(dateKey, dayLabel, sessionNum);
    const label = sessionNum > 1 ? `${dayLabel} (session ${sessionNum})` : dayLabel;
    return `<div class="histitem">${dateKey} · ${label}: ${mins != null ? mins+' min' : 'single log, no duration'}</div>`;
  }).join('');
  return `<main>${backupBar}
    ${renderCalendar()}
    <div class="card"><h3>⏱ Recent Session Lengths</h3>${durationsHtml}</div>
    <div class="card">${items}</div>
  </main>`;
}

function getBackupFolderName() {
  return (state.meta && state.meta.backupFolder) || 'LiftLog';
}

function editBackupFolder() {
  const current = getBackupFolderName();
  const input = prompt(`Backup folder path (inside your phone's Downloads folder). Use / for nested folders, e.g. "Fitness/LiftLog".\nCurrent: Downloads/${current}/`, current);
  if (input === null) return;
  const clean = input.trim()
    .replace(/\.\./g, '')       // block path traversal
    .replace(/[\\:*?"<>|]/g, '') // strip characters invalid in folder names (slash is allowed, for nesting)
    .replace(/^\/+|\/+$/g, '')  // trim leading/trailing slashes
    .replace(/\/+/g, '/');      // collapse repeated slashes
  if (!clean) { alert('Enter a valid folder name.'); return; }
  state.meta = state.meta || {};
  state.meta.backupFolder = clean;
  saveState();
  alert(`Backups will now attempt to save to Downloads/${clean}/\nNote: on some Chrome versions, nested subfolders may not be created automatically — if that happens, the file will just land directly in Downloads instead. Worth checking once on your phone after changing this.`);
}

function makeBackupFile() {
  const stamp = new Date().toISOString().slice(0,10);
  const json = JSON.stringify(state, null, 2);
  return new File([json], `${getBackupFolderName()}/liftlog-backup-${stamp}.json`, { type: 'application/json' });
}

function exportBackup() {
  const file = makeBackupFile();
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url; a.download = file.name;
  a.click();
  URL.revokeObjectURL(url);
  state.meta = state.meta || {};
  state.meta.lastBackup = new Date().toISOString();
  saveState();
}

async function shareBackup() {
  const file = makeBackupFile();
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'LiftLog Backup' });
      state.meta = state.meta || {};
      state.meta.lastBackup = new Date().toISOString();
      saveState();
      return;
    } catch (e) { /* user cancelled or share failed, fall back below */ }
  }
  alert('Direct share not supported on this browser — using download instead. Open the file and use "Save to Drive" from there.');
  exportBackup();
}

function silentAutoBackup() {
  try {
    const file = makeBackupFile();
    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url; a.download = file.name;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    state.meta = state.meta || {};
    state.meta.lastBackup = new Date().toISOString();
    saveState();
  } catch (e) { /* fail silently, don't interrupt the workout */ }
}

function maybePromptBackup() {
  state.meta = state.meta || {};
  const last = state.meta.lastBackup ? new Date(state.meta.lastBackup) : null;
  const hoursSince = last ? (Date.now() - last) / 3600000 : Infinity;
  if (hoursSince >= 20) {
    const ds = getDriveSyncState();
    if (ds.connected) {
      // Drive sync overwrites one single cloud file, so it never clutters your
      // phone. Once connected, rely on it for the automatic backup and skip
      // the local Downloads-folder download entirely (that one DOES accumulate
      // a new dated file each time, since browsers can't truly overwrite a
      // downloaded file on Android/iOS).
      driveSyncNow(true).then(() => render());
      state.meta.lastBackup = new Date().toISOString();
      saveState();
    } else {
      silentAutoBackup(); // no Drive connected — fall back to a local download so at least one backup exists
    }
  }
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!imported.exercises || !imported.history) throw new Error('bad format');
      const ok = await showConfirmModal('Import will replace all current data. Continue?', { danger: true, confirmLabel: 'Import' });
      if (ok) {
        const keepDriveSync = state.driveSync; // this device's Drive connection isn't part of the portable backup
        state = imported;
        state.driveSync = keepDriveSync;
        if (state.version == null) state.version = STATE_VERSION;
        saveState();
        expandedExerciseId = null;
        render();
        showToast('Backup restored.');
      }
    } catch (e) {
      alert('Invalid backup file.');
    }
  };
  reader.readAsText(file);
}

applyTheme(getTheme());
if (isTestMode()) {
  const banner = document.getElementById('testModeBanner');
  banner.style.display = 'block';
  banner.textContent = '🧪 TEST MODE — changes here do NOT affect your real data';
}
render();
requestWakeLock();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
