<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
  // Applied before first paint so a saved "light" preference doesn't flash dark first.
  // No stored preference (or "dark") leaves the <html> element as-is, which is the
  // default dark theme defined in :root below.
  try {
    if (localStorage.getItem('liftlog_theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  } catch (e) {}
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LiftLog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<!-- iOS only: Safari lets the home-screen icon and the launch/splash image differ.
     Android/Chrome cannot split these — it always uses the manifest.json icons for both. -->
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-startup-image" href="icon-512-splash.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0a0b10;
    --surface: #15171f;
    --surface-raised: #1c1f29;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --text: #f2f3f6;
    --text-dim: #8b90a3;
    --text-faint: #565b6c;
    --accent: #5b7fff;
    --success: #34d399;
    --success-bg: #132a20;
    --success-glow: rgba(52,211,153,.55);
    --success-border: rgba(52,211,153,.4);
    --danger: #f2555a;
    --danger-bg: #2a1518;
    --header-grad-a: #171922;
    --header-grad-b: #121319;
    --control-bg: #262a36;
    --control-bg-active: #2d3240;
    --done-bg: #2c5b41;
    --card-shadow: 0 1px 2px rgba(0,0,0,.2), 0 4px 14px rgba(0,0,0,.18);
    --streak-color: #ffa361;
    --ring-track: #2a2d3a;
    color-scheme: dark;
  }
  /* Light ("Normal") mode — opt-in via data-theme, dark stays the default look.
     Clean white palette: true white throughout, elevation done via soft shadow/border
     rather than background-color shifts, so it reads crisp rather than tinted. */
  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-raised: #f6f6f8;
    --border: rgba(20,20,25,0.09);
    --border-strong: rgba(20,20,25,0.15);
    --text: #1a1a1e;
    --text-dim: #6b6b74;
    --text-faint: #a3a3ac;
    --accent: #2f3f75;
    --success: #2f7a52;
    --success-bg: #eef7f1;
    --success-glow: rgba(47,122,82,.28);
    --success-border: rgba(47,122,82,.4);
    --danger: #b23b3b;
    --danger-bg: #fbeeec;
    --header-grad-a: #ffffff;
    --header-grad-b: #fafafb;
    --control-bg: #f6f6f8;
    --control-bg-active: #ececef;
    --done-bg: #2f7a52;
    --card-shadow: 0 1px 2px rgba(20,20,25,.04), 0 8px 20px rgba(20,20,25,.06);
    --streak-color: #a8712e;
    --ring-track: #ececef;
    color-scheme: light;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); padding-bottom: 92px;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 18px 16px 15px; background: linear-gradient(180deg, var(--header-grad-a) 0%, var(--header-grad-b) 100%);
    position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border);
  }
  header::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
    background: linear-gradient(90deg, #4f7cff, #ff6b4a, #3ecf6e, #b06bff, #ffcb4a);
    opacity: .75;
  }
  header h1 {
    margin: 0; font-size: 21px; font-weight: 800; letter-spacing: -0.02em;
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px 10px;
  }
  #streakBadge { font-size: 12.5px; color: var(--streak-color); font-weight: 600; letter-spacing: -0.01em; }
  .gearbtn {
    float: right; background: var(--surface-raised); color: var(--text); border: 1px solid var(--border);
    border-radius: 9px; width: 34px; height: 34px; font-size: 15px; transition: transform .12s ease, background .15s ease;
  }
  .gearbtn:active { transform: scale(.92); background: var(--control-bg); }
  .ring {
    width: 20px; height: 20px; border-radius: 50%; margin-left: 6px;
    display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
  }
  .ring-inner { width: 12px; height: 12px; border-radius: 50%; background: var(--surface-raised); font-size: 8px; display: flex; align-items: center; justify-content: center; color: var(--success); font-weight: 900; }
  .tabs { display: flex; gap: 7px; padding: 12px; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab {
    flex: 0 0 auto; padding: 9px 15px; border-radius: 22px; background: var(--surface-raised);
    color: var(--text-dim); font-size: 13px; font-weight: 600; white-space: nowrap; letter-spacing: -0.01em;
    display: flex; align-items: center; border: 1px solid var(--border);
    transition: background .25s ease, color .25s ease, border-color .25s ease;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: transparent; }
  @keyframes levelUpPulse {
    0% { box-shadow: 0 0 0 0 var(--success-glow); }
    70% { box-shadow: 0 0 0 16px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }
  .card.done-today { background: var(--success-bg); border-color: var(--success-border); border-width: 1.5px; }
  .card.done-today h3 { color: var(--success); }
  .card.levelup { animation: levelUpPulse 1s ease-out; }
  .complete-banner {
    text-align: center; font-size: 15.5px; font-weight: 700; color: var(--success); letter-spacing: -0.01em;
    background: var(--success-bg); border: 1px solid var(--success-border);
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeSlide .3s cubic-bezier(.2,.7,.3,1); }

  /* ---- Focus Mode ---- */
  .focus-toggle {
    display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700;
    color: var(--text-dim); background: var(--surface-raised); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 20px; margin-bottom: 12px; letter-spacing: -0.01em;
    transition: background .15s ease, color .15s ease;
  }
  .focus-toggle:active { transform: scale(.96); background: var(--control-bg); }
  .card-focus {
    border-width: 1.5px; border-color: var(--accent); box-shadow: 0 2px 4px rgba(0,0,0,.15), 0 10px 32px rgba(91,127,255,.16);
    position: relative;
  }
  .focus-eyebrow {
    font-size: 10.5px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  .progress-rail {
    display: flex; gap: 6px; padding: 2px 2px 14px; overflow-x: auto;
  }
  .railstop {
    width: 26px; height: 26px; min-width: 26px; border-radius: 50%; background: var(--surface-raised);
    border: 1.5px solid var(--border-strong); color: var(--text-faint); font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; transition: all .2s ease;
  }
  .railstop.done { background: var(--success-bg); border-color: var(--success-border); color: var(--success); }
  .railstop.active {
    background: var(--rail-color, var(--accent)); border-color: var(--rail-color, var(--accent));
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--rail-color, var(--accent)) 25%, transparent);
    transform: scale(1.15);
  }
  .upnext-row {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px; margin-top: -2px; margin-bottom: 12px;
    background: var(--surface); border: 1px dashed var(--border-strong); border-radius: 13px;
    opacity: .72; font-size: 13px; transition: opacity .15s ease;
  }
  .upnext-row:active { opacity: 1; }
  .upnext-label { font-size: 10.5px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--text-faint); }
  .upnext-name { flex: 1; font-weight: 600; color: var(--text-dim); }
  .upnext-arrow { color: var(--text-faint); }
  .completed-collapse {
    background: var(--surface); border: 1px solid var(--border); border-radius: 13px;
    padding: 10px 14px; margin-bottom: 12px; font-size: 13px;
  }
  .completed-collapse summary {
    font-weight: 700; color: var(--success); cursor: pointer; list-style: none;
  }
  .completed-collapse summary::-webkit-details-marker { display: none; }
  .completed-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0 0; color: var(--text-dim); font-size: 12.5px;
  }

  /* ---- Workout complete modal ---- */
  .win-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 220;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    animation: confirmFadeIn .2s ease;
  }
  .win-modal {
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 22px;
    padding: 28px 24px 24px; max-width: 340px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.4); animation: winPop .35s cubic-bezier(.2,.9,.3,1.2);
    max-height: 88vh; overflow-y: auto; position: relative;
  }
  @keyframes winPop { from { opacity: 0; transform: scale(.85) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .win-emoji { font-size: 46px; line-height: 1; margin-bottom: 6px; }
  .win-title { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; margin: 0 0 4px; }
  .win-sub { font-size: 13.5px; color: var(--text-dim); margin-bottom: 18px; }
  .win-stats { display: flex; gap: 10px; margin-bottom: 20px; }
  .win-stat {
    flex: 1; background: var(--surface-raised); border-radius: 14px; padding: 12px 6px;
    border: 1px solid var(--border);
  }
  .win-stat-val { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
  .win-stat-label { font-size: 10.5px; color: var(--text-faint); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--surface);
    border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .navbtn {
    flex: 1; padding: 13px 0 11px; text-align: center; font-size: 11.5px; font-weight: 600;
    color: var(--text-faint); position: relative; transition: color .2s ease; letter-spacing: -0.01em;
  }
  .navbtn.active { color: var(--accent); }
  .navbtn.active::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 28px; height: 2.5px; border-radius: 0 0 3px 3px; background: var(--accent);
  }
  main { padding: 16px; }
  .card {
    background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px;
    border: 1px solid var(--border); box-shadow: var(--card-shadow);
  }
  .card h3 { margin: 0 0 6px 0; font-size: 15.5px; font-weight: 700; letter-spacing: -0.01em; }
  .meta { font-size: 12.5px; color: var(--text-dim); margin-bottom: 10px; }
  .livectrl { display: flex; align-items: center; gap: 6px; }
  .livectrl-label { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .5px; }
  .livectrl-val { font-size: 14px; font-weight: 700; min-width: 44px; text-align: center; color: var(--text); }
  .sets { display: flex; gap: 8px; flex-wrap: wrap; }
  .setbox {
    min-width: 156px; height: 56px; border-radius: 13px; background: var(--surface-raised);
    display: flex; align-items: center; justify-content: space-between; padding: 0 4px;
    border: 1.5px solid var(--border-strong); gap: 2px; transition: border-color .25s ease, background .25s ease;
  }
  .setbox.done { background: var(--success-bg); border-color: var(--success-border); }
  .stepbtn {
    width: 40px; height: 46px; border-radius: 9px; background: var(--control-bg); color: var(--text);
    border: none; font-size: 20px; line-height: 1; flex: 0 0 auto; font-weight: 500;
    transition: transform .1s ease, background .15s ease;
  }
  .stepbtn:active { transform: scale(.9); background: var(--control-bg-active); }
  .setval {
    flex: 1; text-align: center; font-size: 18px; font-weight: 700; color: var(--text);
    min-width: 26px; letter-spacing: -0.01em;
  }
  .donebtn {
    height: 46px; padding: 0 12px; border-radius: 9px; background: var(--done-bg); color: #fff;
    border: none; font-size: 12.5px; font-weight: 700; flex: 0 0 auto; letter-spacing: -0.01em;
    transition: transform .1s ease, background .15s ease;
  }
  .donebtn:active { transform: scale(.93); }
  .setbox.done .donebtn { background: var(--success); color: #06120c; }
  .holdbtn { background: var(--accent); color: #fff; }
  .holdbtn:active { background: var(--accent); }
  input, select {
    padding: 10px; border-radius: 8px; background: var(--surface-raised);
    border: 1px solid var(--border-strong); color: var(--text); font-size: 14px; font-family: inherit;
  }
  .btn {
    padding: 10px 16px; border-radius: 11px; background: var(--accent); color: #fff; border: none;
    font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em;
    transition: transform .1s ease, filter .15s ease;
  }
  .btn:active { transform: scale(.96); filter: brightness(.92); }
  .btn.secondary { background: var(--surface-raised); color: var(--text); border: 1px solid var(--border-strong); }
  .btn.small { padding: 7px 11px; font-size: 12px; }
  .row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .timer-fab {
    position: fixed; right: 16px; bottom: 100px; width: 92px; height: 92px; border-radius: 46px;
    background: linear-gradient(155deg, #ff8058, #ff5f4a);
    color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 25px; font-weight: 800; box-shadow: 0 8px 24px rgba(255,95,74,.4); z-index: 20;
    border: 2.5px solid rgba(255,255,255,.25);
  }
  .timer-fab .fablabel { font-size: 10.5px; font-weight: 700; letter-spacing: 1.5px; opacity: .9; margin-bottom: 2px; }
  @keyframes urgentPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .timer-fab.urgent {
    background: linear-gradient(155deg, #ff3b3b, #d81f1f);
    animation: urgentPulse 0.5s ease-in-out infinite;
    box-shadow: 0 8px 28px rgba(255,40,40,.65);
  }
  .badge {
    font-size: 10.5px; font-weight: 700; letter-spacing: -0.01em; padding: 3px 9px;
    border-radius: 10px; background: var(--surface-raised); color: var(--text-dim);
  }
  .badge.up { background: var(--success-bg); color: var(--success); }
  .badge.deload { background: var(--danger-bg); color: var(--danger); }
  .badge.linked { background: rgba(91,127,255,.15); color: var(--accent); }
  .histitem { padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .histitem:last-child { border-bottom: none; }
  #testModeBanner {
    background: repeating-linear-gradient(45deg, #7a2e00, #7a2e00 10px, #8f3800 10px, #8f3800 20px);
    color: #fff; text-align: center; font-size: 12.5px; font-weight: 700; letter-spacing: .02em;
    padding: 8px; position: sticky; top: 0; z-index: 9;
  }
  .empty { text-align: center; color: var(--text-faint); padding: 40px 10px; font-size: 13px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 5px; margin-top: 10px; width: 100%; }
  .cal-dow { text-align: center; font-size: 10.5px; font-weight: 600; color: var(--text-faint); padding-bottom: 4px; min-width: 0; }
  .cal-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 9px; background: var(--surface-raised); font-size: 12px; color: var(--text-dim); min-width: 0;
  }
  .cal-cell.empty { background: transparent; }
  .cal-cell.worked { background: var(--success-bg); color: var(--success); font-weight: 700; }
  .cal-cell.today { border: 2px solid var(--accent); }
  select {
    background: var(--surface-raised); color: var(--text); border: 1px solid var(--border-strong);
    border-radius: 9px; padding: 7px 8px; font-size: 13px;
  }
  canvas { max-height: 220px; }

  /* In-app confirm modal — replaces browser confirm() so destructive actions
     look like part of the app instead of a jarring native popup. */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: confirmFadeIn .15s ease;
  }
  @keyframes confirmFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .confirm-modal {
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 16px;
    padding: 20px; max-width: 340px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  .confirm-modal h3 { margin: 0 0 8px; font-size: 16px; }
  .confirm-input {
    width: 100%; padding: 10px 12px; border-radius: 9px; background: var(--surface-raised);
    border: 1.5px solid var(--border-strong); color: var(--text); font-size: 14px; margin-top: 10px;
    box-sizing: border-box;
  }
  .btn.danger { background: var(--danger); }

  /* Brief highlight when a set's value is adjusted, so rapid tapping gets visual feedback. */
  @keyframes setChanged {
    0% { box-shadow: 0 0 0 0 var(--accent); }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .setbox.changed { border-color: var(--accent); animation: setChanged .35s ease; }

  /* Undo toast after finishing an exercise */
  .undo-toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 12px;
    padding: 10px 14px; box-shadow: 0 8px 24px rgba(0,0,0,.3); z-index: 150;
    display: flex; align-items: center; gap: 12px; font-size: 13.5px; white-space: nowrap;
    animation: confirmFadeIn .15s ease;
  }
  .undo-toast button {
    background: none; border: none; color: var(--accent); font-weight: 700; font-size: 13.5px;
    cursor: pointer; padding: 4px 6px;
  }
  /* ---- Today-at-a-Glance dashboard header ---- */
  .dash-header { background: linear-gradient(165deg, var(--header-grad-a), var(--surface)); }
  .dash-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .dash-eyebrow { font-size: 10.5px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 4px; }
  .dash-summary { font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.35; max-width: 230px; }
  .dash-score { flex: 0 0 auto; }
  .dash-score-ring {
    width: 54px; height: 54px; border-radius: 50%; flex: 0 0 auto;
    background: conic-gradient(var(--accent) var(--score-pct), var(--ring-track) 0);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.6s ease;
  }
  .dash-score-inner {
    width: 42px; height: 42px; border-radius: 50%; background: var(--surface);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .dash-score-val { font-size: 14px; font-weight: 800; line-height: 1; }
  .dash-score-grade { font-size: 8.5px; font-weight: 700; color: var(--text-faint); margin-top: 1px; }
  .dash-progress-track { height: 6px; background: var(--surface-raised); border-radius: 3px; overflow: hidden; margin: 14px 0 14px; }
  .dash-progress-fill { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.2,.8,.3,1); }
  .dash-metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 8px; }
  .dash-metric-label { font-size: 9.5px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 2px; }
  .dash-metric-val { font-size: 13.5px; font-weight: 800; letter-spacing: -0.01em; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

  /* ---- Prediction settings mini-panel ---- */
  .pred-settings { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .pred-toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 13px; color: var(--text-dim); }
  .pred-switch { width: 38px; height: 22px; border-radius: 11px; background: var(--surface-raised); border: 1px solid var(--border-strong); position: relative; transition: background .2s ease; flex: 0 0 auto; }
  .pred-switch.on { background: var(--accent); border-color: transparent; }
  .pred-switch-knob { width: 16px; height: 16px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: transform .2s cubic-bezier(.3,.8,.4,1); box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .pred-switch.on .pred-switch-knob { transform: translateX(16px); }

  /* ---- Future prediction projection cards ---- */
  .proj-cards-label { font-size: 12px; font-weight: 700; color: var(--text-dim); margin: 16px 0 8px; }
  .proj-cards-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .proj-card { background: var(--surface-raised); border: 1px solid var(--border); border-radius: 12px; padding: 10px 11px; }
  .proj-card-h { font-size: 10px; font-weight: 800; letter-spacing: .4px; text-transform: uppercase; color: var(--text-faint); }
  .proj-card-primary { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; margin-top: 3px; }

</style>

<div id="testModeBanner" style="display:none;"></div>

<div id="app"></div>

<div class="nav">

  <div class="navbtn" data-view="progress" onclick="setView('progress')">📈 Progress</div>

</div>

<div class="timer-fab" id="timerFab" style="display:none;" onclick="skipTimer()"></div>

<script>
// ---------- DATA ----------
const DAY_PALETTE = ['#4f7cff', '#ff6b4a', '#3ecf6e', '#b06bff', '#ffcb4a', '#ff5c93', '#5ce1e6', '#f2a65a'];

const WEIGHTS = [11, 22, 33, 44, 55]; // lb per dumbbell
const BELT_INCREMENT = 5; // lb, weighted pull-up/chin-up belt, open-ended

const DEFAULT_DAYS = [
  { id:'shoulders', label:'Shoulders', icon:'💪', color:'#4f7cff', exercises:[
    {id:'db_press', name:'DB Shoulder Press', mode:'weighted', sets:5, repLow:5, repHigh:8, rest:120},
    {id:'lat_raise', name:'Lateral Raise (side delt priority)', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'lat_raise_2', name:'Bent-Over Lateral Raise', mode:'weighted', sets:2, repLow:10, repHigh:15, rest:60},
    {id:'rear_delt', name:'Rear Delt Fly', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'shrug', name:'DB Shrug', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
  ]},
  { id:'chest', label:'Chest', icon:'🎽', color:'#ff6b4a', exercises:[
    {id:'db_bench', name:'DB Bench Press', mode:'weighted', sets:5, repLow:5, repHigh:8, rest:150},
    {id:'incline_press', name:'Incline DB Press', mode:'weighted', sets:4, repLow:6, repHigh:10, rest:120},
    {id:'flyes', name:'DB Flyes', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'close_grip', name:'Close-Grip Press', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:90},
    {id:'pullover', name:'DB Pullover', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
  ]},
  { id:'back', label:'Back', icon:'🔺', color:'#3ecf6e', exercises:[
    {id:'pullups', name:'Wide-Grip Pull-ups (width priority)', mode:'weighted_bw', sets:6, repLow:5, repHigh:10, rest:150},
    {id:'db_row', name:'DB Row', mode:'weighted', sets:5, repLow:6, repHigh:10, rest:90},
    {id:'chinups', name:'Chin-ups', mode:'weighted_bw', sets:3, repLow:5, repHigh:10, rest:120},
    {id:'reverse_fly', name:'Reverse Flyes', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'db_deadlift', name:'DB Deadlift', mode:'weighted', sets:5, repLow:5, repHigh:8, rest:150},
  ]},
  { id:'legs', label:'Legs', icon:'🦵', color:'#b06bff', exercises:[
    {id:'goblet_squat', name:'DB Goblet Squat', mode:'weighted', sets:5, repLow:5, repHigh:10, rest:150},
    {id:'sumo_squat', name:'DB Sumo Squat (width priority)', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:120},
    {id:'lunges', name:'DB Lunges', mode:'weighted', sets:4, repLow:8, repHigh:12, rest:90},
    {id:'rdl', name:'DB Romanian Deadlift', mode:'weighted', sets:4, repLow:6, repHigh:10, rest:120},
    {id:'calf_raise', name:'Calf Raises (priority)', mode:'weighted', sets:5, repLow:10, repHigh:15, rest:45},
    {id:'calf_raise_single', name:'Single-Leg Calf Raise', mode:'bodyweight', sets:2, startReps:12, rest:45},
  ]},
  { id:'abs', label:'Abs', icon:'🔥', color:'#ffcb4a', exercises:[
    {id:'weighted_crunch', name:'Weighted Crunch', mode:'weighted', sets:4, repLow:10, repHigh:15, rest:45},
    {id:'russian_twist', name:'Russian Twists', mode:'weighted', sets:3, repLow:12, repHigh:20, rest:45},
    {id:'leg_raise', name:'Leg Raises', mode:'bodyweight', sets:4, startReps:8, rest:45},
    {id:'plank', name:'Plank', mode:'timed', sets:3, startSeconds:30, rest:45},
    {id:'side_bend', name:'Side Bends', mode:'weighted', sets:3, repLow:12, repHigh:20, rest:45},
  ]},
];

const DEFAULT_SETS_MIN = 3;
const DEFAULT_SETS_MAX = 5;
const DEFAULT_REP_LOW = 8;
const DEFAULT_REP_HIGH = 12;
const DEFAULT_REP_INCREMENT = 2;
DEFAULT_DAYS.forEach(day => day.exercises.forEach(ex => {
  if (ex.mode === 'weighted' || ex.mode === 'weighted_bw') {
    ex.setsMin = DEFAULT_SETS_MIN;
    ex.setsMax = DEFAULT_SETS_MAX;
    ex.repLow = DEFAULT_REP_LOW;
    ex.repHigh = DEFAULT_REP_HIGH;
    ex._repDefaultApplied = true;
  }
}));

// ---------- STORAGE ----------
const STORE_KEY = 'liftlog_v1';
const TEST_STORE_KEY = 'liftlog_v1_test';
const TEST_MODE_FLAG = 'liftlog_test_mode_active';
const THEME_KEY = 'liftlog_theme';

// ---------- SCHEMA MIGRATIONS ----------
// The current shape of saved state. Bump this by 1 and add a matching entry
// to MIGRATIONS below whenever a future change needs to transform old saved
// data (or the DAYS config layered on top of it) into a new shape.
const SCHEMA_VERSION = 2;

// Each entry runs exactly once, the first time a state older than its
// version is loaded — never on every load. They run in ascending order, and
// each is handed both `state` and the live `days` config array so a
// migration can touch either. Deliberately self-contained: a migration
// checks exercise.mode against the literal mode strings that existed at
// that point in time rather than going through the current EXERCISE_MODES
// registry, so a migration written today still does the right thing even
// if a future registry entry changes shape or a mode gets renamed — it's a
// historical snapshot, not a live dependency.
//
// IMPORTANT: never edit a migration that's already shipped — anyone who's
// already run it has `state.version` past it, so a later edit would only
// apply to *new* old-data imports, silently diverging from what already ran
// for existing users. Add a new migration instead.
const MIGRATIONS = [
  {
    version: 2,
    description: 'Give weighted / weighted-bodyweight exercises a default sets range (3-5) and rep range (8-12) if they predate that config.',
    migrate(state, days) {
      days.forEach(day => day.exercises.forEach(ex => {
        if (ex.mode !== 'weighted' && ex.mode !== 'weighted_bw') return;
        if (ex.setsMin == null && ex.setsMax == null) {
          ex.setsMin = DEFAULT_SETS_MIN;
          ex.setsMax = DEFAULT_SETS_MAX;
          const live = state.exercises[ex.id];
          if (live && live.sets != null) live.sets = Math.min(Math.max(live.sets, ex.setsMin), ex.setsMax);
        }
        if (!ex._repDefaultApplied) {
          ex.repLow = DEFAULT_REP_LOW;
          ex.repHigh = DEFAULT_REP_HIGH;
          ex._repDefaultApplied = true;
          const live = state.exercises[ex.id];
          if (live && live.targetReps != null) live.targetReps = Math.min(Math.max(live.targetReps, ex.repLow), ex.repHigh);
        }
      }));
    }
  },
];

// Runs every migration newer than the saved state's version, in order, then
// stamps the state so they never run again. Safe to call on a brand-new
// (version-less) state too — it'll just fast-forward straight to current.
function runMigrations(state, days) {
  const from = state.version || 1;
  MIGRATIONS
    .filter(m => m.version > from)
    .sort((a, b) => a.version - b.version)
    .forEach(m => { m.migrate(state, days); state.version = m.version; });
  if (!state.version) state.version = SCHEMA_VERSION;
}

function isTestMode() { return localStorage.getItem(TEST_MODE_FLAG) === '1'; }
function activeStoreKey() { return isTestMode() ? TEST_STORE_KEY : STORE_KEY; }

// ---------- APPEARANCE (dark default, light opt-in) ----------
function getTheme() { return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; }
function applyTheme(t) {
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.setAttribute('content', t === 'light' ? '#ffffff' : '#111827');
}
function setTheme(t) {
  localStorage.setItem(THEME_KEY, t);
  applyTheme(t);
  render();
}

// ---------- WORKOUT FLOW CONFIG ----------
// Central place to tune the guided-workout experience without hunting through
// render logic. Nothing below reads exercise-specific data — it only shapes
// timing/behavior, so it stays valid no matter how DAYS/exercises change.
const WORKOUT_FLOW = {
  autoAdvanceDelayMs: 550,   // pause after an exercise turns green before the view advances
  upNextPreviewCount: 1,     // how many upcoming exercises to preview under the active card
  showCompletionModal: true, // show the full-screen summary when a workout group is finished
};

// ---------- PREDICTION SETTINGS ----------
// User-configurable knobs for the Future Progress Prediction feature. Stored
// per-device (like theme/focus mode) rather than in the synced workout
// state — predictions are a display preference, not workout data.
const PREDICTION_SETTINGS_KEY = 'liftlog_prediction_settings';
const PREDICTION_MODE_MULTIPLIERS = { conservative: 0.65, normal: 1, aggressive: 1.4 };
const DEFAULT_PREDICTION_SETTINGS = {
  enabled: true,
  mode: 'normal',        // 'conservative' | 'normal' | 'aggressive'
  showConfidence: true,
  showMilestones: true,
  showFutureLine: true,
};
function getPredictionSettings() {
  try {
    const raw = localStorage.getItem(PREDICTION_SETTINGS_KEY);
    if (!raw) return { ...DEFAULT_PREDICTION_SETTINGS };
    return { ...DEFAULT_PREDICTION_SETTINGS, ...JSON.parse(raw) };
  } catch (e) { return { ...DEFAULT_PREDICTION_SETTINGS }; }
}
function setPredictionSetting(key, value) {
  const s = getPredictionSettings();
  s[key] = value;
  localStorage.setItem(PREDICTION_SETTINGS_KEY, JSON.stringify(s));
  predictionCache.clear(); // settings change invalidates any cached projection
  renderPreservingScroll();
}

// Focus Mode: guided, one-exercise-at-a-time flow (default). List Mode shows
// the classic full scrolling list. Stored per-device like the theme preference.
function getFocusMode() {
  const v = localStorage.getItem('liftlog_focus_mode');
  return v === null ? true : v === '1';
}
function setFocusMode(on) {
  localStorage.setItem('liftlog_focus_mode', on ? '1' : '0');
  render();
}

// Whether finishing every exercise in a workout group should also trigger a
// local backup download automatically (in addition to the manual Share/
// Download/Sync buttons in Manage). Stored per-device, like theme/focus
// mode, since it's a device behavior preference rather than portable
// workout data. Defaults on.
function getAutoBackupOnComplete() {
  const v = localStorage.getItem('liftlog_auto_backup_complete');
  return v === null ? true : v === '1';
}
function setAutoBackupOnComplete(on) {
  localStorage.setItem('liftlog_auto_backup_complete', on ? '1' : '0');
  render();
}

function loadState() {
  try {
    const raw = localStorage.getItem(activeStoreKey());
    if (!raw) return { exercises: {}, history: [], version: SCHEMA_VERSION }; // brand-new install — nothing to migrate
    const loaded = JSON.parse(raw) || { exercises: {}, history: [] };
    if (!loaded.version) loaded.version = 1; // existing data that predates the migrations system — oldest known shape
    return loaded;
  }
  catch(e){ return { exercises:{}, history:[], version: SCHEMA_VERSION }; }
}
function saveState() {
  try {
    localStorage.setItem(activeStoreKey(), JSON.stringify(state));
  } catch (e) {
    // Most likely a full storage quota. Silently failing here would mean a
    // "Finish Exercise" tap looks like it worked but never actually persists.
    alert('⚠️ Could not save — your device storage may be full. Your last action may not be saved. Try freeing up space or exporting/clearing old backups.');
  }
}
let state = loadState();

function enableTestMode() {
  if (isTestMode()) return;
  showConfirm({
    title: 'Enable Test Mode?',
    message: 'This switches to a separate copy of your data (starting from what you have now) so you can try anything — logging sets, editing exercises, resetting data — without touching your real progress. Exit anytime to go back.',
    confirmLabel: 'Enable',
    onConfirm: () => {
      if (!localStorage.getItem(TEST_STORE_KEY)) {
        // First time entering test mode: seed it with a copy of real data, not a blank slate
        localStorage.setItem(TEST_STORE_KEY, localStorage.getItem(STORE_KEY) || JSON.stringify({ exercises:{}, history:[], prs:[], meta:{}, sessionStarts:{} }));
      }
      localStorage.setItem(TEST_MODE_FLAG, '1');
      location.reload();
    }
  });
}

function disableTestMode() {
  if (!isTestMode()) return;
  localStorage.setItem(TEST_MODE_FLAG, '0');
  location.reload();
}

function resetTestData() {
  if (!isTestMode()) return;
  showConfirm({
    title: 'Reset test data?',
    message: 'Reset test data back to a fresh copy of your real data? Your current test progress will be lost.',
    confirmLabel: 'Reset',
    danger: true,
    onConfirm: () => {
      localStorage.setItem(TEST_STORE_KEY, localStorage.getItem(STORE_KEY) || JSON.stringify({ exercises:{}, history:[], prs:[], meta:{}, sessionStarts:{} }));
      location.reload();
    }
  });
}

// Derives the live DAYS config from state.customDays (or the built-in
// defaults for a first run), defaults any missing cosmetic fields, and runs
// migrations. This is the single place that turns "whatever state object we
// currently have" into a consistent, current-shape DAYS array — called at
// boot, and again any time `state` gets wholesale-replaced (backup import,
// Drive restore) so those paths can't drift out of sync with boot-time logic.
function hydrateDaysFromState() {
  DAYS = state.customDays || JSON.parse(JSON.stringify(DEFAULT_DAYS));
  DAYS.forEach((d, i) => {
    if (!d.icon) d.icon = (DEFAULT_DAYS.find(dd => dd.id === d.id) || {}).icon || '⭐';
    if (!d.color) d.color = (DEFAULT_DAYS.find(dd => dd.id === d.id) || {}).color || DAY_PALETTE[i % DAY_PALETTE.length];
  });
  runMigrations(state, DAYS);
  state.customDays = DAYS;
}

let DAYS;
hydrateDaysFromState();
saveState();

function persistDays() {
  state.customDays = DAYS;
  saveState();
}

function getSetsMin(ex) { return ex.setsMin ?? ex.sets; }
function getSetsMax(ex) { return ex.setsMax ?? (ex.sets + 2); }
function getRepIncrement(ex) { return ex.repIncrement ?? ((ex.repLow ?? 0) >= 8 ? 2 : 1); }
function getBeltIncrement(ex) { return ex.beltIncrement ?? BELT_INCREMENT; }
function getTimeIncrement(ex) { return ex.timeIncrement ?? 10; }

// Double-progression dimension toggles ("what" progresses). Each defaults to
// true (undefined behaves as enabled) so exercises created before this option
// existed keep their exact old behavior with no migration needed — only an
// explicit `false` opts a dimension out.
function progressesReps(ex) { return ex.progressReps !== false; }
function progressesSets(ex) { return ex.progressSets !== false; }
function progressesWeight(ex) { return ex.progressWeight !== false; }

// ---------- EXERCISE MODE REGISTRY (plugin architecture) ----------
// This is the one place that knows how each *kind* of exercise behaves.
// Every other function in the app — state init, target display, the live
// weight control, the finish/progression engine, PR tracking — reads from
// here instead of hardcoding its own copy of "if weighted... else if
// bodyweight...". To add a brand-new exercise type (say, a distance-based
// "cardio" mode), write one more entry below implementing this interface;
// nothing else in the app needs to change:
//
//   initState(ex)                 -> starting per-exercise progress record, stored in state.exercises[id]
//   getTargetValue(s)             -> the number a fresh set input defaults to
//   usesProgressiveSets           -> true if set count lives in state (auto-progresses),
//                                    false if it's a fixed field on the exercise config itself
//   label(ex, s)                  -> human-readable "what to do" line shown on the card
//   hasWeightControl              -> does the live view show a +/- weight control?
//   weightLabel(ex, s)            -> text inside that control, if hasWeightControl
//   adjustWeight(ex, s, dir)      -> mutate s for a live +/- weight tap; return {ok, reason}
//   successCheck(s, arr)          -> did every logged set hit the target?
//   onSuccess(ex, s)              -> mutate s after a fully-hit session; return {message, leveledUp?}
//   onFail(ex, s)                 -> mutate s after a missed session; return {message}
//   sessionBestValue(ex, s, arr)  -> the "how good was this session" number, used for PR checks
//   historyWeight(ex, s)          -> value written to history.weight (or null if not weight-based)
//   unit                          -> unit label used in PR records ('lb' | 'sec' | 'reps')
//   usesWeightAsBest              -> true if historical-best comparisons should use .weight, not .sets
//
// Two small shared helpers factor out the identical "reps, then sets" ramp
// that both weighted modes go through before their mode-specific top tier
// (a heavier dumbbell vs. more belt weight) — keeping that shared behavior
// impossible to accidentally let drift apart between the two.
function progressRepsAndSets(ex, s, repInc) {
  if (progressesReps(ex) && s.targetReps < ex.repHigh) {
    s.targetReps = Math.min(s.targetReps + repInc, ex.repHigh);
    return { done: true, message: `Progress: +${repInc} rep(s) next time` };
  }
  if (progressesSets(ex)) {
    const setsMax = getSetsMax(ex);
    if (s.sets < setsMax) {
      s.sets++;
      if (progressesReps(ex)) s.targetReps = ex.repLow;
      return { done: true, message: `Added a set! Now ${s.sets} sets next time` };
    }
  }
  return { done: false };
}
function deloadRepsOrSets(ex, s, repInc) {
  if (progressesReps(ex) && s.targetReps > ex.repLow) {
    s.targetReps = Math.max(ex.repLow, s.targetReps - repInc);
    return { done: true, message: `Deload: -${repInc} rep(s)` };
  }
  if (progressesSets(ex)) {
    const setsMin = getSetsMin(ex);
    if (s.sets > setsMin) {
      s.sets--;
      if (progressesReps(ex)) s.targetReps = ex.repLow;
      return { done: true, message: 'Deload: removed a set' };
    }
  }
  return { done: false };
}

const EXERCISE_MODES = {
  weighted: {
    initState: ex => ({ tier: 0, targetReps: ex.repLow, sets: getSetsMin(ex), failStreak: 0 }),
    getTargetValue: s => s.targetReps,
    usesProgressiveSets: true,
    label: (ex, s) => `${WEIGHTS[s.tier]} lb x ${s.targetReps} reps x ${s.sets} sets`,
    hasWeightControl: true,
    weightLabel: (ex, s) => `${WEIGHTS[s.tier]} lb`,
    adjustWeight: (ex, s, dir) => {
      const newTier = Math.min(Math.max(s.tier + dir, 0), WEIGHTS.length - 1);
      if (newTier === s.tier) return { ok: false, reason: dir > 0 ? 'Already at your heaviest dumbbell.' : 'Already at your lightest dumbbell.' };
      s.tier = newTier;
      return { ok: true };
    },
    successCheck: (s, arr) => arr.every(x => x.value >= s.targetReps),
    onSuccess: (ex, s) => {
      s.failStreak = 0;
      const repSet = progressRepsAndSets(ex, s, getRepIncrement(ex));
      if (repSet.done) return { message: repSet.message };
      if (progressesWeight(ex) && s.tier < WEIGHTS.length - 1) {
        s.tier++; s.sets = getSetsMin(ex); if (progressesReps(ex)) s.targetReps = ex.repLow;
        return { message: `Weight up! Next: ${WEIGHTS[s.tier]} lb, back to ${getSetsMin(ex)} sets`, leveledUp: true };
      }
      return { message: 'Maxed out your enabled progression — try slower tempo instead.' };
    },
    onFail: (ex, s) => {
      s.failStreak++;
      const threshold = getFailThreshold(ex);
      if (s.failStreak < threshold) return { message: `Missed target (${s.failStreak}/${threshold} before deload)` };
      s.failStreak = 0;
      const deload = deloadRepsOrSets(ex, s, getRepIncrement(ex));
      if (deload.done) return { message: deload.message };
      if (progressesWeight(ex) && s.tier > 0) { s.tier--; s.sets = getSetsMin(ex); if (progressesReps(ex)) s.targetReps = ex.repLow; return { message: 'Deload: dropped a weight tier' }; }
      return { message: '' };
    },
    sessionBestValue: (ex, s) => WEIGHTS[s.tier],
    historyWeight: (ex, s) => WEIGHTS[s.tier],
    unit: 'lb',
    usesWeightAsBest: true,
  },
  weighted_bw: {
    initState: ex => ({ addedWeight: 0, targetReps: ex.repLow, sets: getSetsMin(ex), failStreak: 0 }),
    getTargetValue: s => s.targetReps,
    usesProgressiveSets: true,
    label: (ex, s) => (s.addedWeight > 0 ? `Bodyweight +${s.addedWeight} lb` : `Bodyweight`) + ` x ${s.targetReps} reps x ${s.sets} sets`,
    hasWeightControl: true,
    weightLabel: (ex, s) => s.addedWeight > 0 ? `+${s.addedWeight} lb` : 'BW',
    adjustWeight: (ex, s, dir) => {
      const newWeight = Math.max(0, s.addedWeight + dir * getBeltIncrement(ex));
      if (newWeight === s.addedWeight) return { ok: false, reason: 'Already at bodyweight (0 lb belt).' };
      s.addedWeight = newWeight;
      return { ok: true };
    },
    successCheck: (s, arr) => arr.every(x => x.value >= s.targetReps),
    onSuccess: (ex, s) => {
      s.failStreak = 0;
      const repSet = progressRepsAndSets(ex, s, getRepIncrement(ex));
      if (repSet.done) return { message: repSet.message };
      if (progressesWeight(ex)) {
        s.addedWeight += getBeltIncrement(ex); s.sets = getSetsMin(ex); if (progressesReps(ex)) s.targetReps = ex.repLow;
        return { message: `Belt up! Add ${s.addedWeight} lb next time, back to ${getSetsMin(ex)} sets`, leveledUp: true };
      }
      return { message: 'Maxed out your enabled progression — try slower tempo instead.' };
    },
    onFail: (ex, s) => {
      s.failStreak++;
      const threshold = getFailThreshold(ex);
      if (s.failStreak < threshold) return { message: `Missed target (${s.failStreak}/${threshold} before deload)` };
      s.failStreak = 0;
      const deload = deloadRepsOrSets(ex, s, getRepIncrement(ex));
      if (deload.done) return { message: deload.message };
      if (progressesWeight(ex) && s.addedWeight > 0) { s.addedWeight = Math.max(0, s.addedWeight - getBeltIncrement(ex)); s.sets = getSetsMin(ex); if (progressesReps(ex)) s.targetReps = ex.repLow; return { message: 'Deload: removed belt weight' }; }
      return { message: '' };
    },
    sessionBestValue: (ex, s) => s.addedWeight,
    historyWeight: (ex, s) => s.addedWeight,
    unit: 'lb',
    usesWeightAsBest: true,
  },
  bodyweight: {
    initState: ex => ({ targetReps: ex.startReps, sets: getSetsMin(ex), failStreak: 0 }),
    getTargetValue: s => s.targetReps,
    usesProgressiveSets: true,
    label: (ex, s) => `Bodyweight x ${s.targetReps} reps x ${s.sets} sets`,
    hasWeightControl: false,
    successCheck: (s, arr) => arr.every(x => x.value >= s.targetReps),
    onSuccess: (ex, s) => {
      s.failStreak = 0;
      // repHigh is optional for bodyweight — if unset, reps climb forever
      // (the original behavior). Setting it turns on the same "reps, then
      // add a set" ramp weighted exercises use.
      const repHigh = ex.repHigh ?? Infinity;
      if (progressesReps(ex) && s.targetReps < repHigh) {
        const repInc = getRepIncrement(ex);
        s.targetReps = isFinite(repHigh) ? Math.min(s.targetReps + repInc, repHigh) : s.targetReps + repInc;
        return { message: `Progress: +${repInc} rep(s) next time` };
      }
      if (progressesSets(ex)) {
        const setsMax = getSetsMax(ex);
        if (s.sets < setsMax) {
          s.sets++;
          if (progressesReps(ex) && isFinite(repHigh)) s.targetReps = ex.startReps;
          return { message: `Added a set! Now ${s.sets} sets next time` };
        }
      }
      return { message: 'Maxed out your enabled progression — nice work!' };
    },
    onFail: (ex, s) => {
      s.failStreak++;
      const threshold = getFailThreshold(ex);
      if (s.failStreak < threshold) return { message: `Missed target (${s.failStreak}/${threshold} before deload)` };
      s.failStreak = 0;
      if (progressesReps(ex) && s.targetReps > 1) {
        s.targetReps = Math.max(1, s.targetReps - 2);
        return { message: 'Deload: -2 reps' };
      }
      if (progressesSets(ex)) {
        const setsMin = getSetsMin(ex);
        if (s.sets > setsMin) {
          s.sets--;
          return { message: 'Deload: removed a set' };
        }
      }
      return { message: '' };
    },
    sessionBestValue: (ex, s, arr) => Math.max(...arr.map(x => x.value)),
    historyWeight: () => null,
    unit: 'reps',
    usesWeightAsBest: false,
  },
  timed: {
    initState: ex => ({ targetSeconds: ex.startSeconds, failStreak: 0 }),
    getTargetValue: s => s.targetSeconds,
    usesProgressiveSets: false,
    label: (ex, s) => `Hold ${s.targetSeconds}s`,
    hasWeightControl: false,
    successCheck: (s, arr) => arr.every(x => x.value >= s.targetSeconds),
    stepSize: 5, // +/- taps move 5 seconds at a time instead of 1
    onSuccess: (ex, s) => { s.failStreak = 0; const inc = getTimeIncrement(ex); s.targetSeconds += inc; return { message: `Progress: +${inc} sec next time` }; },
    onFail: (ex, s) => {
      s.failStreak++;
      const threshold = getFailThreshold(ex);
      if (s.failStreak >= threshold) { s.failStreak = 0; const inc = getTimeIncrement(ex); s.targetSeconds = Math.max(15, s.targetSeconds - inc); return { message: `Deload: -${inc} sec` }; }
      return { message: `Missed target (${s.failStreak}/${threshold} before deload)` };
    },
    sessionBestValue: (ex, s, arr) => Math.max(...arr.map(x => x.value)),
    historyWeight: () => null,
    unit: 'sec',
    usesWeightAsBest: false,
  },
};

// Looks up a mode by exercise object or raw mode string. Throws loudly on an
// unknown mode rather than silently doing nothing — a missing/typo'd mode is
// a bug worth surfacing immediately, not masking.
function getExerciseMode(ex) {
  const key = typeof ex === 'string' ? ex : ex.mode;
  const def = EXERCISE_MODES[key];
  if (!def) throw new Error(`Unknown exercise mode "${key}" — add it to EXERCISE_MODES.`);
  return def;
}

function getExState(ex) {
  if (!state.exercises[ex.id]) {
    state.exercises[ex.id] = getExerciseMode(ex).initState(ex);
  }
  const s = state.exercises[ex.id];
  // Backward compatibility: exercises created before sets-progression existed won't have s.sets yet
  if (getExerciseMode(ex).usesProgressiveSets && s.sets == null) {
    s.sets = getSetsMin(ex);
  }
  return s;
}

function dateStr(d) {
  const date = new Date(d);
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Escapes user-entered text (exercise/day names, notes) before it's inserted into
// rendered HTML, so characters like <, >, &, quotes display literally instead of
// being interpreted as markup.
function getFailThreshold(ex) { return ex.failThreshold ?? 3; }

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Themed replacement for the browser's confirm(). Optionally requires the
// user to type an exact phrase (requireText) before the confirm button works —
// used for the most destructive actions like Reset All Data.
function showConfirm({ title, message, confirmLabel = 'Confirm', danger = false, requireText = null, onConfirm }) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-modal">
      <h3>${escapeHtml(title)}</h3>
      <div class="meta" style="margin-bottom:0; white-space:pre-line;">${escapeHtml(message)}</div>
      ${requireText ? `<input type="text" class="confirm-input" id="confirmInputField" placeholder="Type ${escapeHtml(requireText)} to confirm">` : ''}
      <div class="row" style="margin-top:16px; gap:8px;">
        <button class="btn secondary" id="confirmCancelBtn" style="flex:1;">Cancel</button>
        <button class="btn ${danger ? 'danger' : ''}" id="confirmOkBtn" style="flex:1;">${escapeHtml(confirmLabel)}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#confirmCancelBtn').onclick = close;
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#confirmOkBtn').onclick = () => {
    if (requireText) {
      const field = overlay.querySelector('#confirmInputField');
      if (field.value.trim() !== requireText) {
        field.style.borderColor = 'var(--danger)';
        field.focus();
        return;
      }
    }
    close();
    onConfirm();
  };
  if (requireText) setTimeout(() => overlay.querySelector('#confirmInputField')?.focus(), 50);
}

// Lets the user manually set (or clear) today's logged workout duration, overriding
// the timestamp-derived estimate. Opened by tapping the ✏️ next to the Duration
// metric on the Today card.
function openDurationEditModal(dateKey, dayLabel, sessionNum, currentMins) {
  const hasOverride = getDurationOverride(dateKey, dayLabel, sessionNum) != null;
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-modal">
      <h3>Edit Duration</h3>
      <div class="meta" style="margin-bottom:0;">Set how long today's ${escapeHtml(dayLabel)} session actually took.</div>
      <div class="row" style="align-items:center; gap:8px; margin-top:12px;">
        <input type="number" inputmode="numeric" min="1" max="600" class="confirm-input" id="durationInputField"
          placeholder="Minutes" value="${currentMins != null ? currentMins : ''}" style="flex:1;">
        <span class="meta" style="margin:0;">min</span>
      </div>
      <div class="row" style="margin-top:16px; gap:8px;">
        <button class="btn secondary" id="durationCancelBtn" style="flex:1;">Cancel</button>
        ${hasOverride ? '<button class="btn secondary" id="durationClearBtn" style="flex:1;">Reset to Auto</button>' : ''}
        <button class="btn" id="durationSaveBtn" style="flex:1;">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#durationCancelBtn').onclick = close;
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  const field = overlay.querySelector('#durationInputField');
  overlay.querySelector('#durationClearBtn')?.addEventListener('click', () => {
    setDurationOverride(dateKey, dayLabel, sessionNum, null);
    close();
    renderPreservingScroll();
  });
  overlay.querySelector('#durationSaveBtn').onclick = () => {
    const mins = Math.round(Number(field.value));
    if (!mins || mins <= 0 || mins > 600) {
      field.style.borderColor = 'var(--danger)';
      field.focus();
      return;
    }
    setDurationOverride(dateKey, dayLabel, sessionNum, mins);
    close();
    renderPreservingScroll();
  };
  setTimeout(() => { field.focus(); field.select(); }, 50);
}

// Session starts are scoped per (calendar date + workout day label + session number),
// so doing two different workouts on the same date - or the SAME workout twice in one
// day - each get their own independent start time. Session 1 keeps the plain old key
// format for backward compatibility with existing saved data.
function sessionKey(dateKey, dayLabel, sessionNum = 1) {
  return sessionNum > 1 ? `${dateKey}__${dayLabel}__s${sessionNum}` : `${dateKey}__${dayLabel}`;
}

// How many times a given (date, workout) has been started. Used to know which
// session is "current" when the same workout is done more than once in a day.
function getSessionCount(dateKey, dayLabel) {
  state.sessionCount = state.sessionCount || {};
  return state.sessionCount[`${dateKey}__${dayLabel}`] || 0;
}

// If a workout starts shortly before midnight and continues past it, sets logged
// after midnight should still belong to the session that was already in progress,
// not silently start counting toward a brand-new "day" for streaks/duration/completion.
const SESSION_CARRYOVER_HOURS = 6;

function getActiveSessionDateKey(dayLabel) {
  const now = new Date();
  const todayKey = dateStr(now);
  state.sessionStarts = state.sessionStarts || {};
  const todayNum = getSessionCount(todayKey, dayLabel) || 1;
  if (state.sessionStarts[sessionKey(todayKey, dayLabel, todayNum)]) return todayKey;

  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayKey = dateStr(yesterday);
  const yesterdayNum = getSessionCount(yesterdayKey, dayLabel) || 1;
  const yesterdayStart = state.sessionStarts[sessionKey(yesterdayKey, dayLabel, yesterdayNum)];
  if (yesterdayStart && (now - new Date(yesterdayStart)) < SESSION_CARRYOVER_HOURS * 3600000) {
    return yesterdayKey; // still within the same overnight session
  }
  return todayKey;
}

// Full identity of the session currently relevant to this workout day: which calendar
// date it's anchored to, and which session-of-the-day it is (1 unless done again already).
function getActiveSession(dayLabel) {
  const anchorDate = getActiveSessionDateKey(dayLabel);
  const sessionNum = getSessionCount(anchorDate, dayLabel) || 1;
  return { anchorDate, sessionNum, key: sessionKey(anchorDate, dayLabel, sessionNum) };
}

// History entries store the real timestamp (for accurate ordering/history display) plus
// a separate sessionDate/sessionNum marking which session they were logged under. Older
// entries (from before this existed) fall back to their raw calendar date and session 1.
function getEntryDateKey(h) {
  return h.sessionDate || dateStr(h.date);
}
function getEntrySessionNum(h) {
  return h.sessionNum || 1;
}

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay()); // back to Sunday
  return dateStr(d);
}

const WEEKLY_MIN_GROUPS = 3;

// Counts distinct (calendar date, muscle group) pairs logged in the given
// week — i.e. how many muscle-group workouts got done, not how many separate
// calendar days you happened to train on. Doing two different groups back to
// back on one day counts as 2 here, same as doing them on two separate days
// would; doing the same group twice in one day (an extra session) still only
// counts once, since it's still just one muscle group worked that day.
function getWeekWorkoutGroupCount(weekKey) {
  const groupsInWeek = new Set(
    state.history
      .filter(h => getWeekKey(h.date) === weekKey)
      .map(h => `${getEntryDateKey(h)}::${h.day}`)
  );
  return groupsInWeek.size;
}

function computeStreak() {
  let cursorWeek = getWeekKey(new Date());
  if (getWeekWorkoutGroupCount(cursorWeek) < WEEKLY_MIN_GROUPS) {
    const d = new Date(cursorWeek);
    d.setDate(d.getDate() - 7);
    cursorWeek = getWeekKey(d); // grace: this week isn't over yet, don't count it as a break
  }
  let count = 0;
  while (getWeekWorkoutGroupCount(cursorWeek) >= WEEKLY_MIN_GROUPS) {
    count++;
    const d = new Date(cursorWeek);
    d.setDate(d.getDate() - 7);
    cursorWeek = getWeekKey(d);
  }
  return count;
}

function getHistoricalMax(exName, mode) {
  const entries = state.history.filter(h => h.exercise === exName);
  if (entries.length === 0) return null;
  if (getExerciseMode(mode).usesWeightAsBest) {
    return Math.max(...entries.map(h => h.weight ?? 0));
  }
  return Math.max(...entries.map(h => Math.max(...h.sets)));
}

// Epley estimated 1-rep-max: folds the weight actually used together with the best
// reps hit that session, so progress still shows up between equipment weight increases
// (reps climb for a while before the weight tier does). For weighted_bw exercises this
// is based on the added belt weight only — bodyweight itself isn't tracked, so it's a
// relative-progress number rather than a true 1RM.
function estimate1RM(weight, reps) {
  if (!weight || !reps) return 0;
  return Math.round(weight * (1 + reps / 30));
}

// ---------- PREDICTION ENGINE ----------
// Reusable forecasting layer built entirely on top of data the app already
// tracks (state.history, EXERCISE_MODES, WEIGHTS). Nothing here duplicates
// the live progression algorithm in EXERCISE_MODES — it observes the
// *outcomes* of that algorithm over time (weight/e1rm/volume per logged
// session) and projects them forward. Every prediction is cached and only
// recomputed when history/settings actually change (see predictionCache).
const predictionCache = new Map();

// How many real-world days a given exercise's sessions have actually
// averaged, based on this specific exercise's own log — the true cadence,
// not an assumption about the day rotation. Falls back to 7 (weekly) if
// there isn't enough history to measure yet.
function getExerciseCadenceDays(exName) {
  const dates = state.history
    .filter(h => h.exercise === exName && !h.skipped)
    .map(h => new Date(getEntryDateKey(h)).getTime())
    .sort((a,b) => a-b);
  const uniq = [...new Set(dates)];
  if (uniq.length < 2) return 7;
  const gaps = [];
  for (let i = 1; i < uniq.length; i++) gaps.push((uniq[i]-uniq[i-1]) / 86400000);
  gaps.sort((a,b)=>a-b);
  const mid = Math.floor(gaps.length/2);
  const median = gaps.length % 2 ? gaps[mid] : (gaps[mid-1]+gaps[mid])/2; // median resists one long injury/vacation gap skewing the average
  return Math.min(Math.max(median, 3), 21); // clamp to a sane 3-21 day range
}

// Consistency: fraction of the last 60 days where this exercise was actually
// trained on roughly the cadence it's supposed to be, vs. how many sessions
// *should* have happened at that cadence. 1.0 = right on pace, lower = missed
// sessions are dragging on the trend.
function getExerciseConsistency(exName) {
  const cadence = getExerciseCadenceDays(exName);
  const cutoff = Date.now() - 60 * 86400000;
  const recentSessions = new Set(
    state.history.filter(h => h.exercise === exName && !h.skipped && new Date(getEntryDateKey(h)).getTime() >= cutoff)
      .map(h => getEntryDateKey(h))
  ).size;
  const expected = Math.max(1, Math.round(60 / cadence));
  return Math.min(1, recentSessions / expected);
}

// Recency-weighted linear regression: recent sessions influence the slope
// more than old ones, so a plateau in the last month pulls the trend down
// even if early progress was fast. Returns null if there's not enough
// signal to trust a trend yet.
function weightedTrend(values) {
  const n = values.length;
  if (n < 3) return null;
  const weights = values.map((_, i) => 0.5 + (i / (n - 1)) * 1.5); // oldest=0.5x, newest=2x
  const wSum = weights.reduce((a,b)=>a+b, 0);
  const xMean = values.reduce((s,_,i) => s + i * weights[i], 0) / wSum;
  const yMean = values.reduce((s,v,i) => s + v * weights[i], 0) / wSum;
  let num = 0, den = 0;
  for (let i = 0; i < n; i++) {
    num += weights[i] * (i - xMean) * (values[i] - yMean);
    den += weights[i] * (i - xMean) ** 2;
  }
  const slope = den !== 0 ? num / den : 0;
  const intercept = yMean - slope * xMean;
  // R^2 (weighted) — how well a straight line actually explains the data,
  // used to temper confidence when the trend is noisy.
  let ssRes = 0, ssTot = 0;
  for (let i = 0; i < n; i++) {
    const pred = intercept + slope * i;
    ssRes += weights[i] * (values[i] - pred) ** 2;
    ssTot += weights[i] * (values[i] - yMean) ** 2;
  }
  const r2 = ssTot > 0 ? Math.max(0, 1 - ssRes / ssTot) : (slope === 0 ? 1 : 0);
  return { slope, intercept, r2, n };
}

// The core forecast for one exercise. Projects estimated-1RM (and derives
// working weight / volume / confidence from it) at each horizon in
// `horizonsMonths`. Growth is asymptotic, not linear — it slows the further
// out it goes, the way real strength adaptation does — and is scaled by how
// consistently the person actually trains this exercise and by the
// Conservative/Normal/Aggressive setting. Equipment ceilings are respected
// for fixed-dumbbell 'weighted' exercises.
function predictExercise(ex, horizonsMonths = [3, 6, 12, 24]) {
  const settings = getPredictionSettings();
  const cacheKey = `${ex.id}::${horizonsMonths.join(',')}::${settings.mode}::${state.history.length}`;
  if (predictionCache.has(cacheKey)) return predictionCache.get(cacheKey);

  const mode = getExerciseMode(ex);
  const supportsWeight = ex.mode === 'weighted' || ex.mode === 'weighted_bw';
  const points = state.history
    .filter(h => h.exercise === ex.name && !h.skipped)
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  if (points.length < 3) { predictionCache.set(cacheKey, null); return null; }

  const e1rmSeries = points.map(p => supportsWeight ? estimate1RM(p.weight || 0, Math.max(...p.sets)) : Math.max(...p.sets));
  const trend = weightedTrend(e1rmSeries);
  if (!trend) { predictionCache.set(cacheKey, null); return null; }

  const currentE1rm = e1rmSeries[e1rmSeries.length - 1];
  const cadenceDays = getExerciseCadenceDays(ex.name);
  const sessionsPerMonth = 30 / cadenceDays;
  const consistency = getExerciseConsistency(ex.name);
  const modeMult = PREDICTION_MODE_MULTIPLIERS[settings.mode] ?? 1;

  // Per-calendar-month growth rate implied by the per-session slope, damped
  // by how consistently sessions are actually happening (miss workouts,
  // growth slows) and by the aggressiveness setting.
  const monthlyGrowth = Math.max(0, trend.slope) * sessionsPerMonth * consistency * modeMult;

  // Training-age proxy: more logged sessions for this exercise = a more
  // mature trend = growth saturates a bit slower (longer tau). Ranges
  // roughly 6 (brand new trend) to 18 (long track record) months.
  const tau = Math.min(18, 6 + points.length * 0.35);

  const equipCeiling = ex.mode === 'weighted' ? estimate1RM(WEIGHTS[WEIGHTS.length-1], ex.repHigh || 12) : null;

  const projections = horizonsMonths.map(t => {
    // Asymptotic (diminishing-returns) growth curve: fast early, naturally
    // flattening — never a straight line extrapolated forever.
    const growthPotential = monthlyGrowth * tau;
    let predictedE1rm = currentE1rm + growthPotential * (1 - Math.exp(-t / tau));
    if (equipCeiling) predictedE1rm = Math.min(predictedE1rm, equipCeiling);
    predictedE1rm = Math.round(Math.max(predictedE1rm, currentE1rm));

    // Confidence: starts high, decays with horizon, and is scaled down by
    // trend noise (r^2), how little data backs the trend, and inconsistent
    // training. Floors at 25% so it's never presented as a false certainty.
    const horizonDecay = Math.exp(-t / 30); // ~95% at 3mo, ~82% at 12mo, ~70% at 21mo-ish shape
    const dataQuality = Math.min(1, points.length / 12) * (0.55 + 0.45 * trend.r2);
    const confidence = Math.round(Math.max(25, Math.min(97, 100 * horizonDecay * (0.5 + 0.5 * dataQuality) * (0.6 + 0.4 * consistency))));

    // Derive the mode-specific "working weight" from the predicted e1rm
    // using the inverse of the same Epley formula the rest of the app uses,
    // assuming reps stay near the exercise's target rep ceiling.
    const targetReps = ex.repHigh || (points[points.length-1].sets ? Math.max(...points[points.length-1].sets) : 10);
    let predictedWorkingWeight = supportsWeight ? Math.round(predictedE1rm / (1 + targetReps / 30)) : null;
    if (ex.mode === 'weighted') predictedWorkingWeight = WEIGHTS.reduce((best,w) => Math.abs(w-predictedWorkingWeight) < Math.abs(best-predictedWorkingWeight) ? w : best, WEIGHTS[0]);

    const currentWorkingWeight = supportsWeight ? (points[points.length-1].weight || 0) : null;

    return {
      months: t,
      predictedE1rm,
      predictedWorkingWeight,
      currentWorkingWeight,
      deltaWorkingWeight: predictedWorkingWeight != null && currentWorkingWeight != null ? predictedWorkingWeight - currentWorkingWeight : null,
      progressPct: currentE1rm > 0 ? Math.round(((predictedE1rm - currentE1rm) / currentE1rm) * 100) : 0,
      confidence,
      atCeiling: equipCeiling != null && predictedE1rm >= equipCeiling,
    };
  });

  const result = { exId: ex.id, exName: ex.name, unit: mode.unit, currentE1rm, trend, consistency, cadenceDays, sessionsPerMonth, projections };
  predictionCache.set(cacheKey, result);
  return result;
}

// Plain-language, data-grounded observations. Every sentence here is derived
// directly from predictExercise()/consistency data — nothing is invented if
// the underlying numbers aren't available.
function generatePredictionInsights(ex) {
  const p = predictExercise(ex);
  const insights = [];
  if (!p) return insights;
  const settings = getPredictionSettings();

  const twelveMo = p.projections.find(x => x.months === 12);
  const threeMo = p.projections.find(x => x.months === 3);
  if (twelveMo && twelveMo.progressPct > 0) {
    insights.push(`At your current consistency, ${ex.name} is projected to gain ~${twelveMo.progressPct}% estimated strength over the next year.`);
  }
  if (p.consistency < 0.8 && p.consistency > 0) {
    const missedPenaltyMonths = Math.round((1 - p.consistency) * 8);
    if (missedPenaltyMonths >= 1) {
      insights.push(`Training this ${Math.round(p.consistency*100)}% as often as your usual pace is likely delaying milestones by roughly ${missedPenaltyMonths} month${missedPenaltyMonths===1?'':'s'} — closing that gap would speed things up.`);
    }
  } else if (p.consistency >= 0.95) {
    insights.push(`You're training ${ex.name} right on pace — that consistency is a bigger driver of this projection than the growth rate itself.`);
  }
  if (ex.mode === 'weighted' && threeMo && threeMo.atCeiling) {
    insights.push(`${ex.name} is projected to hit your equipment ceiling (${WEIGHTS[WEIGHTS.length-1]} lb) within 3 months — future gains there will need higher reps or slower tempo, not heavier dumbbells.`);
  }
  if (p.trend.r2 < 0.35 && p.trend.n >= 5) {
    insights.push(`${ex.name}'s recent numbers are fairly noisy session-to-session, so treat these projections as a rough direction rather than a precise date.`);
  }
  return insights.slice(0, 3);
}

// How long ago the current all-time best for this exercise was last hit (not
// necessarily the first time — the most recent time you touched that ceiling).
function getDaysSinceLastPR(exName, mode) {
  const entries = state.history.filter(h => h.exercise === exName && !h.skipped);
  if (!entries.length) return null;
  const valueOf = h => getExerciseMode(mode).usesWeightAsBest ? (h.weight ?? 0) : Math.max(...h.sets);
  const best = Math.max(...entries.map(valueOf));
  const bestTimes = entries.filter(h => valueOf(h) === best).map(h => new Date(h.date).getTime());
  return Math.floor((Date.now() - Math.max(...bestTimes)) / 86400000);
}

function formatDaysAgo(days) {
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  return `${days}d ago`;
}

function formatDuration(mins) {
  if (!mins) return '0 min';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}

// Every distinct workout session ever logged (date + day-type + session-of-day number),
// deduplicated the same way the History tab does.
function getAllUniqueSessions() {
  const seen = new Map();
  state.history.forEach(h => {
    const dk = getEntryDateKey(h);
    const num = getEntrySessionNum(h);
    const key = sessionKey(dk, h.day, num);
    if (!seen.has(key)) seen.set(key, { dateKey: dk, dayLabel: h.day, sessionNum: num });
  });
  return [...seen.values()];
}

function getMonthlySessionCounts(monthsBack = 6) {
  const counts = {};
  getAllUniqueSessions().forEach(({ dateKey }) => {
    const monthKey = dateKey.slice(0, 7);
    counts[monthKey] = (counts[monthKey] || 0) + 1;
  });
  const result = [];
  const now = new Date();
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    result.push({ key, label: d.toLocaleString('default', { month: 'short' }), count: counts[key] || 0 });
  }
  return result;
}

// Sessions per workout day-type in the last N days — flags a day/muscle-group that's
// quietly been skipped while a rotation keeps moving forward.
function getRecentDayFrequency(daysBack = 30) {
  const cutoff = Date.now() - daysBack * 86400000;
  const sessions = getAllUniqueSessions().filter(s => new Date(s.dateKey).getTime() >= cutoff);
  return DAYS.map(d => ({
    label: d.label,
    icon: d.icon,
    color: d.color,
    count: sessions.filter(s => s.dayLabel === d.label).length
  }));
}

function recordPR(exName, value, unit) {
  state.prs = state.prs || [];
  const entry = { date: new Date().toISOString(), exercise: exName, value, unit };
  state.prs.unshift(entry);
  state.prs = state.prs.slice(0, 20);
  return entry;
}

// A manually-entered duration always wins over the timestamp-derived estimate —
// lets the user correct a session where the auto-calculated time was thrown off
// (e.g. a paused/interrupted workout, or logging sets well after actually finishing).
function getDurationOverride(dateKey, dayLabel, sessionNum = 1) {
  const key = sessionKey(dateKey, dayLabel, sessionNum);
  const val = state.durationOverrides && state.durationOverrides[key];
  return (typeof val === 'number' && val > 0) ? val : null;
}

function setDurationOverride(dateKey, dayLabel, sessionNum, mins) {
  state.durationOverrides = state.durationOverrides || {};
  const key = sessionKey(dateKey, dayLabel, sessionNum);
  if (mins == null) {
    delete state.durationOverrides[key]; // revert to auto-calculated
  } else {
    state.durationOverrides[key] = mins;
  }
  saveState();
}

function getSessionDuration(dateKey, dayLabel, sessionNum = 1) {
  const override = getDurationOverride(dateKey, dayLabel, sessionNum);
  if (override != null) return override;

  const entries = state.history.filter(h => getEntryDateKey(h) === dateKey && h.day === dayLabel && getEntrySessionNum(h) === sessionNum);
  const sessionStart = state.sessionStarts && state.sessionStarts[sessionKey(dateKey, dayLabel, sessionNum)];

  if (entries.length === 0) return null;
  if (entries.length < 2 && !sessionStart) return null; // not enough data to estimate at all

  const times = entries.map(h => new Date(h.date).getTime());
  let startTime = Math.min(...times);
  const endTime = Math.max(...times);

  if (sessionStart) {
    const capturedStart = new Date(sessionStart).getTime();
    startTime = Math.min(startTime, capturedStart); // use whichever is earlier
  }

  const mins = Math.round((endTime - startTime) / 60000);
  return mins > 0 ? mins : null;
}

function getTodayCompletionPct(day) {
  if (!day.exercises.length) return 0;
  const { anchorDate, sessionNum } = getActiveSession(day.label);
  const doneToday = new Set(
    state.history.filter(h => getEntryDateKey(h) === anchorDate && h.day === day.label && getEntrySessionNum(h) === sessionNum).map(h => h.exercise)
  );
  return Math.round((doneToday.size / day.exercises.length) * 100);
}

// ---------- VIEW STATE ----------
function computeDefaultDayIdx() {
  if (state.history.length === 0 || DAYS.length === 0) return 0;
  const last = state.history[state.history.length - 1];
  const lastDayIdx = DAYS.findIndex(d => d.label === last.day);
  if (lastDayIdx === -1) return 0;
  const loggedToday = getEntryDateKey(last) === dateStr(new Date());
  if (loggedToday) {
    // Still mid-session (something left to do today) — stay put so the app
    // opens right back where the workout was left off.
    if (getTodayCompletionPct(DAYS[lastDayIdx]) < 100) return lastDayIdx;
  }
  // Otherwise the last group is done (or wasn't today) — advance to whichever
  // group comes next in rotation order, so the app always opens on the next
  // workout that's due rather than repeating one already finished.
  return (lastDayIdx + 1) % DAYS.length;
}
let currentDayIdx = computeDefaultDayIdx();
let progressDayIdx = 0;
let progressExerciseId = null;
let chartMetric = 'e1rm'; // 'e1rm' | 'weight' | 'volume'
let chartRange = '90'; // 'all' | '90' | '30' (days) — defaults to most recent 90 days

// Content-anchored scroll preservation: instead of remembering a raw pixel
// offset (which breaks when switching to a day with more/fewer exercises and
// therefore a different page length), we remember WHICH card was at the top
// of the viewport and how far scrolled into it we were, then restore relative
// to that same card after the switch. This keeps you looking at the same
// section (e.g. the chart) even if everything above it changed height.
const PROGRESS_SCROLL_ANCHORS = ['pcard-overview','pcard-prs','pcard-balance','pcard-bests','pcard-duration','pcard-progression'];

function captureScrollAnchor() {
  const HEADER_BUFFER = 90; // roughly the height of the sticky header/tab bar
  let best = null;
  for (const id of PROGRESS_SCROLL_ANCHORS) {
    const el = document.getElementById(id);
    if (!el) continue;
    const top = el.getBoundingClientRect().top;
    if (top <= HEADER_BUFFER) {
      best = { id, offsetFromTop: top }; // keep overwriting; last match = closest to top
    } else if (best === null) {
      // Nothing has scrolled past the header yet — anchor to the first card we can find
      best = { id, offsetFromTop: top };
      break;
    }
  }
  return best;
}

function restoreScrollAnchor(anchor) {
  if (!anchor) return;
  const el = document.getElementById(anchor.id);
  if (!el) return;
  const newTop = el.getBoundingClientRect().top;
  const delta = newTop - anchor.offsetFromTop;
  window.scrollTo(0, window.scrollY + delta);
}

function renderPreservingScroll() {
  const anchor = captureScrollAnchor();
  render();
  restoreScrollAnchor(anchor);
}

function setChartMetric(m) {
  chartMetric = m;
  renderCharts();
  // Only the chart/toggle need refreshing, but the toggle pills' active state
  // lives in the full view markup, so a light re-render keeps them in sync.
  renderPreservingScroll();
}

function setChartRange(r) {
  chartRange = r;
  renderCharts();
  renderPreservingScroll();
}

function selectProgressDay(i) {
  progressDayIdx = i;
  progressExerciseId = null; // reset so it defaults to the first exercise of the new day
  renderPreservingScroll();
}

function selectProgressExercise(exId) {
  progressExerciseId = exId;
  renderPreservingScroll();
}
let view = 'workout';
let liveSets = {}; // exerciseId -> array of {reps or seconds, done}
let recentlyChangedSet = null; // {exId, setIdx} — briefly highlights a set box after its value changes
let changedFlashTimer = null;
function flashSetChanged(exId, setIdx) {
  recentlyChangedSet = { exId, setIdx };
  clearTimeout(changedFlashTimer);
  changedFlashTimer = setTimeout(() => { recentlyChangedSet = null; render(); }, 350);
}
let lastFinishUndo = null; // snapshot of the most recent Finish Exercise, so it can be undone
let undoToastTimer = null;

function showUndoToast(message) {
  const existing = document.getElementById('undoToast');
  if (existing) existing.remove();
  if (undoToastTimer) clearTimeout(undoToastTimer);

  const toast = document.createElement('div');
  toast.className = 'undo-toast';
  toast.id = 'undoToast';
  toast.innerHTML = `<span>${escapeHtml(message)}</span><button id="undoToastBtn">UNDO</button>`;
  document.body.appendChild(toast);
  toast.querySelector('#undoToastBtn').onclick = () => {
    clearTimeout(undoToastTimer);
    toast.remove();
    undoFinishExercise();
  };
  undoToastTimer = setTimeout(() => {
    toast.remove();
    lastFinishUndo = null; // undo window has passed
  }, 6000);
}

function undoFinishExercise() {
  if (!lastFinishUndo) return;
  const { exId, prevExState, arr, pushedEntry, prEntry } = lastFinishUndo;
  // Remove the exact history entry that was pushed (by reference, so it's precise
  // even if other entries were added since — e.g. syncing doesn't touch this array).
  const histIdx = state.history.indexOf(pushedEntry);
  if (histIdx > -1) state.history.splice(histIdx, 1);
  if (prEntry && state.prs) state.prs = state.prs.filter(p => p !== prEntry);
  if (state.exercises) state.exercises[exId] = prevExState;
  liveSets[exId] = arr; // bring the tapped-in values back so nothing is lost
  lastFinishUndo = null;
  saveState();
  render();
}
let timerInterval = null;

const TRANSITION_REST_SECONDS = 60; // rest between finishing one exercise and starting the next

// ---------- WAKE LOCK ----------
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) { /* not supported or denied, fail silently */ }
}
function releaseWakeLock() {

}
document.addEventListener('visibilitychange', () => {

function setView(v) {
