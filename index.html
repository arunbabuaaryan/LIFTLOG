// ---------- MISTAKE-PROOFING ----------
// True if the given day has any exercise with real, unsaved input on it right
// now — a set checked off, or a value nudged away from the default target.
// Used to stop a stray tap/swipe from silently wiping work-in-progress.
function hasUnsavedFocusProgress(dayIdx) {
  const day = DAYS[dayIdx];
  if (!day) return false;
  return day.exercises.some(ex => {
    const arr = liveSets[ex.id];
    if (!arr) return false;
    const target = getTargetValue(ex);
    return arr.some(set => set.doneMark || set.value !== target);
  });
}

function selectDay(i, afterSwitch) {
  if (i === currentDayIdx) { if (afterSwitch) afterSwitch(); return; }
  const doSwitch = () => { currentDayIdx = i; liveSets = {}; focusOverrideId = null; redoUnlocked = new Set(); render(); if (afterSwitch) afterSwitch(); };
  if (hasUnsavedFocusProgress(currentDayIdx)) {
    showConfirm({
      title: 'Switch workout group?',
      message: `You've checked off or adjusted sets on ${DAYS[currentDayIdx].label} that haven't been finished yet. Switching now discards that — it won't be saved.`,
      confirmLabel: 'Switch anyway',
      danger: true,
      onConfirm: doSwitch
    });
  } else {
    doSwitch();
  }
}

// ---------- SWIPE NAVIGATION (switch day/group by swiping left/right) ----------
let swipeStartX = null, swipeStartY = null, swipeStartTime = 0;
const SWIPE_MIN_DX = 45;       // minimum horizontal travel to count as a deliberate swipe
const SWIPE_MAX_DY = 70;       // more vertical travel than this means it's a scroll, not a swipe
const SWIPE_TIME_LIMIT = 700;  // ms — ignore slow drags

function handleSwipeStart(e) {
  if (e.touches.length !== 1) { swipeStartX = null; return; }
  // Don't hijack swipes that start on the horizontally-scrollable tab strip itself,
  // or inside any text input/textarea/select — e.g. the "Add Exercise" form in
  // Settings, where swiping to change days would otherwise re-render the screen
  // and silently discard whatever was being typed.
  if (e.target.closest('.tabs') || e.target.closest('input, textarea, select')) { swipeStartX = null; return; }
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeStartTime = Date.now();
}

function handleSwipeEnd(e) {
  if (swipeStartX === null) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStartX;
  const dy = t.clientY - swipeStartY;
  const dt = Date.now() - swipeStartTime;
  swipeStartX = null;
  if (dt > SWIPE_TIME_LIMIT) return;
  if (Math.abs(dx) < SWIPE_MIN_DX) return;
  if (Math.abs(dy) > SWIPE_MAX_DY) return;
  if (Math.abs(dx) < Math.abs(dy)) return; // predominantly vertical -> treat as scroll

  const direction = dx < 0 ? 1 : -1; // swipe left = next day, swipe right = previous day
  if (view === 'workout' || view === 'manage') {
    const next = (currentDayIdx + direction + DAYS.length) % DAYS.length; // wrap around at both ends
    selectDay(next);
  } else if (view === 'progress') {
    const next = (progressDayIdx + direction + DAYS.length) % DAYS.length; // wrap around at both ends
    selectProgressDay(next);
  }
}

// Attach once to the stable #app container (its innerHTML is replaced on render,
// but the element itself persists, so the listeners keep working).
document.getElementById('app').addEventListener('touchstart', handleSwipeStart, { passive: true });
document.getElementById('app').addEventListener('touchend', handleSwipeEnd, { passive: true });

// ---------- LOGGING ----------
function getLastValueForSet(ex, setIdx) {
  for (let i = state.history.length - 1; i >= 0; i--) {
    const h = state.history[i];
    if (h.exercise === ex.name && h.sets[setIdx] != null) return h.sets[setIdx];
  }
  return null;
}

function getTargetValue(ex) {
  return getExerciseMode(ex).getTargetValue(getExState(ex));
}

function ensureLive(ex) {
  if (!liveSets[ex.id]) {
    const target = getTargetValue(ex);
    const s = getExState(ex);
    const setCount = getExerciseMode(ex).usesProgressiveSets ? s.sets : ex.sets;
    liveSets[ex.id] = Array.from({length: setCount}, () => ({ value: target, doneMark: false }));
  }
  return liveSets[ex.id];
}

function isDoneToday(exName, dayLabel) {
  const { anchorDate, sessionNum } = getActiveSession(dayLabel);
  return state.history.some(h => getEntryDateKey(h) === anchorDate && h.day === dayLabel && h.exercise === exName && getEntrySessionNum(h) === sessionNum);
}

function scrollToNextIncomplete() {
  const day = DAYS[currentDayIdx];
  const next = day.exercises.find(ex => !isDoneToday(ex.name, day.label));
  if (next) {
    const el = document.getElementById(`card-${next.id}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    const banner = document.querySelector('.complete-banner');
    if (banner) banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function getExerciseById(exId) {
  for (const day of DAYS) {
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) return ex;
  }
  return null;
}

// ---------- LINKED EXERCISES (one exercise, multiple muscle-group days) ----------
// A "linked" exercise is one that appears in more than one day's exercises[]
// array *with the same id*. Progression state (state.exercises[id]) is keyed
// purely by id, and history/PRs are keyed purely by exercise name — both
// already live outside the per-day DAYS array — so a shared id automatically
// gets shared progression across every day it's linked to, with zero changes
// needed to the progression engine itself. The only thing this layer has to
// actively maintain is keeping each day's *copy* of the exercise's config
// (name, mode, rep/set range, notes, fail threshold) in sync, since those are
// duplicated objects for rendering/ordering purposes. Rest times are
// deliberately left per-day — resting longer between sets on a heavier day is
// a legitimate difference, not drift.
const LINKED_SYNC_FIELDS = ['name', 'mode', 'repLow', 'repHigh', 'setsMin', 'setsMax', 'sets', 'startReps', 'startSeconds', 'failThreshold', 'notes', 'progressReps', 'progressSets', 'progressWeight', 'repIncrement', 'beltIncrement', 'timeIncrement'];

function getLinkedCopies(exId) {
  const copies = [];
  DAYS.forEach((day, dayIdx) => {
    const ex = day.exercises.find(e => e.id === exId);
    if (ex) copies.push({ day, dayIdx, ex });
  });
  return copies;
}

function isExerciseLinked(exId) {
  return getLinkedCopies(exId).length > 1;
}

// Human-readable "also trained on: Back, Legs" list, excluding the day passed in.
function getLinkedDayLabel(exId, excludeDayIdx) {
  const others = getLinkedCopies(exId).filter(c => c.dayIdx !== excludeDayIdx);
  if (!others.length) return null;
  return others.map(c => `${c.day.icon} ${c.day.label}`).join(', ');
}

// After editing one copy's config fields, push those same fields onto every
// other day's copy of the same exercise so they never silently drift apart
// (which would otherwise desync the shared progression state's valid ranges —
// e.g. one day thinking reps cap at 12, another still capping at 10).
function propagateLinkedExerciseConfig(sourceEx) {
  getLinkedCopies(sourceEx.id).forEach(({ ex }) => {
    if (ex === sourceEx) return;
    LINKED_SYNC_FIELDS.forEach(f => {
      if (sourceEx[f] === undefined) delete ex[f];
      else ex[f] = sourceEx[f];
    });
  });
}

function startTimerFor(exId) {
  const ex = getExerciseById(exId);

}

function matchSet1(exId) {
  const arr = liveSets[exId];
  if (!arr || arr.length === 0) return;
  const first = arr[0].value;
  for (let i = 1; i < arr.length; i++) arr[i].value = first;

}

function skipExercise(exId) {

    confirmLabel: 'Skip',

function adjustWeightLive(exId, direction) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const mode = getExerciseMode(ex);
  if (!mode.hasWeightControl) return;
  const s = getExState(ex);
  const result = mode.adjustWeight(ex, s, direction);
  if (!result.ok) { alert(result.reason); return; }
  saveState();
  if (navigator.vibrate) navigator.vibrate(15);
  render();
}

function adjustSetsLive(exId, direction) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const s = getExState(ex);
  const arr = liveSets[exId];

  if (getExerciseMode(ex).usesProgressiveSets) {
    const min = getSetsMin(ex), max = getSetsMax(ex);
    const newSets = Math.min(Math.max(s.sets + direction, min), max);
    if (newSets === s.sets) { alert(direction > 0 ? `Sets ceiling is ${max} (change it in Manage → Sets/Reps if you want higher).` : `Sets floor is ${min}.`); return; }
    s.sets = newSets;
  } else {
    const newSets = Math.max(1, ex.sets + direction);
    if (newSets === ex.sets) { alert('Minimum is 1 set.'); return; }
    ex.sets = newSets;
    persistDays();
  }

  if (arr) {
    const target = getTargetValue(ex);
    if (direction > 0) arr.push({ value: target, doneMark: false });
    else if (direction < 0 && arr.length > 1) arr.pop();
  }
  saveState();
  if (navigator.vibrate) navigator.vibrate(15);
  render();
}

function startWorkoutNow() {
  const today = dateStr(new Date());

  const countKey = `${today}__${dayLabel}`;
  state.sessionCount = state.sessionCount || {};
  state.sessionCount[countKey] = (state.sessionCount[countKey] || 0) + 1;
  state.sessionStarts = state.sessionStarts || {};
  state.sessionStarts[sessionKey(today, dayLabel, state.sessionCount[countKey])] = new Date().toISOString();
  saveState();
  if (navigator.vibrate) navigator.vibrate(20);
  render();
}

function markSessionStartIfNeeded() {
  const dayLabel = DAYS[currentDayIdx].label;
  const { anchorDate, sessionNum, key } = getActiveSession(dayLabel);
  state.sessionStarts = state.sessionStarts || {};
  if (!state.sessionStarts[key]) {
    // Subtract 2 minutes to account for the time spent actually performing this first set,
    // which happened before this "done" tap and would otherwise go uncounted.
    state.sessionStarts[key] = new Date(Date.now() - 2 * 60000).toISOString();
    // If this is the very first set of a brand-new (not-yet-started) session, also
    // register the session count so later lookups agree on which session this is.
    const countKey = `${anchorDate}__${dayLabel}`;
    state.sessionCount = state.sessionCount || {};
    if (!state.sessionCount[countKey]) state.sessionCount[countKey] = sessionNum;

}

function markSetDone(exId, setIdx) {
  const arr = liveSets[exId];
  const set = arr[setIdx];
  set.doneMark = !set.doneMark;
  if (set.doneMark) {
    // If this set finishes off the exercise AND every other exercise today is
    // already done, the whole workout is about to complete — there's nothing
    // left to rest for, so skip the timer instead of leaving one running with
    // no next set/exercise for it to lead into.
    const allSetsInThisExDone = arr.every(x => x.doneMark);
    const otherExercisesRemain = DAYS[currentDayIdx].exercises.some(e => e.id !== exId && !isDoneToday(e.name, DAYS[currentDayIdx].label));
    const isFinalSetOfWorkout = allSetsInThisExDone && !otherExercisesRemain;
    if (isFinalSetOfWorkout) {
      skipTimer(); // clear out any timer still running from an earlier set of this exercise — nothing left to rest for
    } else {
      startTimerFor(exId);

    const fab = document.getElementById('timerFab');
    fab.style.display = 'none';
    fab.classList.remove('urgent');

  render();

  const allDone = arr.every(x => x.doneMark);
  if (allDone) {
    const ex = getExerciseById(exId);
    setTimeout(() => { if (ex) finishExercise(ex); }, 250); // brief pause so the green "done" state is visible first
  }
}

let holdZeroTimer = null;

function typeSet(exId, setIdx) {
  const arr = liveSets[exId];
  const current = arr[setIdx].value;
  const input = prompt('Enter actual value:', current);
  if (input === null) return;
  const n = parseInt(input);
  if (!isNaN(n)) { arr[setIdx].value = Math.max(0, n); flashSetChanged(exId, setIdx); }
  render();
}

function targetLabel(ex) {
  return getExerciseMode(ex).label(ex, getExState(ex));
}

function finishExercise(ex) {
  const arr = liveSets[ex.id];
  if (!arr) { alert('Nothing to log yet.'); return; }
  // Catches the classic mis-tap: hitting Finish before checking off any sets
  // would silently log the untouched default target as if it were actually
  // performed. One extra tap here only fires when that's actually about to
  // happen — the normal "check off sets, auto-advance" flow never sees it.
  if (arr.every(x => !x.doneMark)) {
    showConfirm({
      title: 'Finish without checking off sets?',
      message: `No sets are marked done for ${ex.name} yet. Finishing now logs the target — ${targetLabel(ex)} — as if that's exactly what you did. If that's not accurate, go back and check off your real sets first.`,
      confirmLabel: 'Log it anyway',
      danger: true,
      onConfirm: () => finishExerciseConfirmed(ex)
    });
    return;
  }
  finishExerciseConfirmed(ex);
}

function finishExerciseConfirmed(ex) {
  const arr = liveSets[ex.id];
  if (!arr) { alert('Nothing to log yet.'); return; }
  const mode = getExerciseMode(ex);
  const s = getExState(ex);
  const preFinishSnapshot = JSON.parse(JSON.stringify(s)); // for Undo
  const arrSnapshot = JSON.parse(JSON.stringify(arr)); // for Undo
  const hasSkippedSet = arr.some(x => x.value === 0);
  const success = mode.successCheck(s, arr);

  let statusMsg = '';
  let leveledUp = false;

  if (hasSkippedSet) {
    statusMsg = 'Set(s) logged as 0 (skipped) — progression left unchanged this session.';
  } else {
    const result = success ? mode.onSuccess(ex, s) : mode.onFail(ex, s);
    statusMsg = result.message;
    leveledUp = !!result.leveledUp;
  }

  const prevMax = getHistoricalMax(ex.name, ex.mode);
  const sessionBest = mode.sessionBestValue(ex, s, arr);
  const isPR = !hasSkippedSet && prevMax !== null && sessionBest > prevMax;

  const activeSession = getActiveSession(DAYS[currentDayIdx].label);
  const pushedEntry = {
    date: new Date().toISOString(),
    sessionDate: activeSession.anchorDate,
    sessionNum: activeSession.sessionNum,
    day: DAYS[currentDayIdx].label,
    exercise: ex.name,
    mode: ex.mode,
    sets: arr.map(x => x.value),
    weight: mode.historyWeight(ex, s),
    success,
    skipped: hasSkippedSet,
    isPR
  };
  state.history.push(pushedEntry);
  let prEntry = null;
  if (isPR) {
    prEntry = recordPR(ex.name, sessionBest, mode.unit);
  }
  saveState();
  lastFinishUndo = { exId: ex.id, exName: ex.name, prevExState: preFinishSnapshot, arr: arrSnapshot, pushedEntry, prEntry };
  showUndoToast(`${ex.name}: ${statusMsg}${isPR ? ' 🏆 New PR!' : ''}`);
  delete liveSets[ex.id];
  redoUnlocked.delete(ex.id); // back to locked/read-only after this log, even if this was a redo
  if (focusOverrideId === ex.id) focusOverrideId = null; // let focus mode auto-advance to the next incomplete exercise
  render();
  const dayHasMoreToday = DAYS[currentDayIdx].exercises.some(e => !isDoneToday(e.name, DAYS[currentDayIdx].label));
  if (dayHasMoreToday) {
    startRestTimer(ex.transitionRest ?? TRANSITION_REST_SECONDS); // rest before moving to the next exercise
  } else {
    // Every exercise in this group is done — the workout is complete.
    // Trigger the automatic local backup (if enabled) right here, before
    // anything async — that keeps the download inside the same
    // user-gesture call stack as the tap that finished this exercise, so
    // browsers treat it the same as tapping the manual Download button
    // instead of blocking it as an unsolicited background download.
    const backedUp = autoBackupOnWorkoutComplete();
    const { anchorDate, sessionNum } = getActiveSession(DAYS[currentDayIdx].label);
    const mins = getSessionDuration(anchorDate, DAYS[currentDayIdx].label, sessionNum);
    if (WORKOUT_FLOW.showCompletionModal) {
      setTimeout(() => showWorkoutCompleteModal(DAYS[currentDayIdx], mins, backedUp), WORKOUT_FLOW.autoAdvanceDelayMs);
    }
  }
  setTimeout(scrollToNextIncomplete, 100);
  if (leveledUp) {
    const el = document.getElementById(`card-${ex.id}`);
    if (el) {
      el.classList.add('levelup');
      setTimeout(() => el.classList.remove('levelup'), 1000);
    }
  }
}

// Longest-streak tracking, used only to decide whether the completion modal's
// confetti should fire. Stored in state.meta alongside the existing backup
// metadata fields — same pattern, no new top-level state shape.
function checkAndUpdateLongestStreak(streak) {
  state.meta = state.meta || {};
  const prevBest = state.meta.longestStreak || 0;
  const isNewBest = streak > 0 && streak > prevBest;
  if (isNewBest) { state.meta.longestStreak = streak; saveState(); }
  return isNewBest;
}

// Lightweight count-up animation for the modal's stat numbers — 0 to target
// over ~700ms with an ease-out curve. Pure DOM/rAF, no dependency added.
function animateCountUp(el, target, { suffix = '', duration = 700 } = {}) {
  if (!el || !isFinite(target)) return;
  const start = performance.now();
  const from = 0;
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    const val = Math.round(from + (target - from) * eased);
    el.textContent = val.toLocaleString() + suffix;
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Minimal CSS-confetti burst — plain divs animated via the confettiFall
// keyframes in <style>, removed after they finish falling. Only ever called
// for the three "worth celebrating" moments (new PR / new longest streak /
// 100% completion is implicit here since this modal only shows on full
// completion) so it never turns into visual noise on every workout.
function spawnConfetti(container) {
  const colors = ['#4f7cff', '#ff6b4a', '#3ecf6e', '#b06bff', '#ffcb4a'];
  for (let i = 0; i < 26; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[i % colors.length];
    piece.style.animationDelay = (Math.random() * 0.3) + 's';
    piece.style.animationDuration = (1.6 + Math.random() * 0.9) + 's';
    piece.style.transform = `rotate(${Math.random()*360}deg)`;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

// Full-screen celebration shown the moment every exercise in a workout group
// is finished. Reads already-computed stats plus the same dashboard/prediction
// helpers the Progress page uses (getOverallConsistencyPct, computeStreak,
// computeWorkoutScore, predictExercise) — nothing here recomputes logic that
// already exists elsewhere.
function showWorkoutCompleteModal(day, mins, backedUp = false) {
  document.getElementById('winModalOverlay')?.remove();
  const exCount = day.exercises.length;
  const setCount = day.exercises.reduce((sum, ex) => {
    const s = getExState(ex);
    return sum + (getExerciseMode(ex).usesProgressiveSets ? s.sets : ex.sets);
  }, 0);
  const durationLabel = mins != null ? formatDuration(mins) : '—';

  const { anchorDate, sessionNum } = getActiveSession(day.label);
  const todaysEntries = state.history.filter(h => getEntryDateKey(h) === anchorDate && h.day === day.label && getEntrySessionNum(h) === sessionNum);
  const totalVolume = Math.round(todaysEntries.reduce((sum, h) => sum + (h.weight && !h.skipped ? h.weight * h.sets.reduce((a,b)=>a+b,0) : 0), 0));
  const prsBroken = todaysEntries.filter(h => h.isPR).length;
  const avgRestSeconds = Math.round(day.exercises.reduce((sum, ex) => sum + (ex.rest || 60), 0) / Math.max(1, day.exercises.length));
  // Rough, clearly-labeled estimate only (≈6 kcal/min is a typical moderate
  // resistance-training MET value) — not a substitute for a real metabolic measurement.
  const estCalories = mins != null ? Math.round(mins * 6) : null;

  const consistencyPct = getOverallConsistencyPct();
  const streak = computeStreak();
  const isNewLongestStreak = checkAndUpdateLongestStreak(streak);
  const recovery = getRecoveryStatus(day.label);
  const score = computeWorkoutScore({ completionPct: 100, consistencyPct, streak, prsToday: prsBroken });
  const grade = scoreToGrade(score);

  // If this exercise-day has a weighted lift with an established trend,
  // surface how today's session moved its projection — reuses predictExercise,
  // nothing recomputed.
  const trendEx = day.exercises.find(ex => (ex.mode === 'weighted' || ex.mode === 'weighted_bw') && predictExercise(ex));
  const trendPred = trendEx ? predictExercise(trendEx) : null;
  const trend3mo = trendPred ? trendPred.projections.find(p => p.months === 3) : null;

  const overlay = document.createElement('div');
  overlay.className = 'win-overlay';
  overlay.id = 'winModalOverlay';
  overlay.innerHTML = `
    <div class="win-modal">
      <div class="win-emoji" id="winEmoji">✓</div>
      <div class="win-ring-wrap"><svg class="win-ring-svg" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" class="win-ring-track"/>
        <circle cx="40" cy="40" r="34" class="win-ring-fill" id="winRingFill"/>
      </svg><div class="win-ring-grade">${grade}</div></div>
      <h3 class="win-title">${escapeHtml(day.label)} complete!</h3>
      <div class="win-sub">Nice work — every exercise logged. Workout score ${score}/100.</div>
      <div class="win-stats">
        <div class="win-stat"><div class="win-stat-val" id="winDuration">—</div><div class="win-stat-label">Duration</div></div>
        <div class="win-stat"><div class="win-stat-val" id="winExCount">0</div><div class="win-stat-label">Exercises</div></div>
        <div class="win-stat"><div class="win-stat-val" id="winSetCount">0</div><div class="win-stat-label">Sets</div></div>
      </div>
      <div class="win-stats">
        <div class="win-stat"><div class="win-stat-val" id="winVolume">0</div><div class="win-stat-label">Volume (lb)</div></div>
        <div class="win-stat"><div class="win-stat-val">${formatDuration(Math.round(avgRestSeconds/60)) === '0 min' ? avgRestSeconds+'s' : formatDuration(Math.round(avgRestSeconds/60))}</div><div class="win-stat-label">Avg Rest</div></div>
        <div class="win-stat"><div class="win-stat-val" id="winCalories">0</div><div class="win-stat-label">Est. Calories</div></div>
      </div>
      <div class="win-stats">
        <div class="win-stat"><div class="win-stat-val">${prsBroken}${prsBroken ? ' 🏆' : ''}</div><div class="win-stat-label">PRs Broken</div></div>
        <div class="win-stat"><div class="win-stat-val">${consistencyPct != null ? consistencyPct+'%' : '—'}</div><div class="win-stat-label">Consistency</div></div>
        <div class="win-stat"><div class="win-stat-val">${streak}w 🔥</div><div class="win-stat-label">Streak${isNewLongestStreak ? ' (best!)' : ''}</div></div>
      </div>
      <div class="win-recovery">Recovery: <strong>${recovery.label}</strong></div>
      ${trend3mo ? `<div class="win-pred-update">🔮 Updated projection — ${escapeHtml(trendEx.name)}: ~${trend3mo.predictedWorkingWeight} lb in 3 months (${trend3mo.confidence}% confidence)</div>` : ''}
      ${backedUp ? `<div class="meta" style="margin:8px 0 0; text-align:center;">📥 Backed up locally</div>` : ''}
      <button class="btn" style="width:100%; margin-top:14px;" id="winModalCloseBtn">Nice!</button>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  overlay.querySelector('#winModalCloseBtn').onclick = close;
  if (navigator.vibrate) navigator.vibrate([40, 60, 40, 60, 90]);

  // Animation sequence: ring fills, then stats count up, then (if earned) confetti.
  const ringFill = overlay.querySelector('#winRingFill');
  const circumference = 2 * Math.PI * 34;
  ringFill.style.strokeDasharray = `${circumference} ${circumference}`;
  ringFill.style.strokeDashoffset = circumference;
  requestAnimationFrame(() => {
    ringFill.style.transition = 'stroke-dashoffset 900ms cubic-bezier(.2,.8,.3,1)';
    ringFill.style.strokeDashoffset = circumference * (1 - score / 100);
  });
  setTimeout(() => {
    const durEl = overlay.querySelector('#winDuration');
    if (mins != null) animateCountUp(durEl, mins, { suffix: 'm' }); else durEl.textContent = '—';
    animateCountUp(overlay.querySelector('#winExCount'), exCount);
    animateCountUp(overlay.querySelector('#winSetCount'), setCount);
    animateCountUp(overlay.querySelector('#winVolume'), totalVolume);
    if (estCalories != null) animateCountUp(overlay.querySelector('#winCalories'), estCalories); else overlay.querySelector('#winCalories').textContent = '—';
  }, 500);
  if (prsBroken > 0 || isNewLongestStreak) {
    setTimeout(() => spawnConfetti(overlay), 250);
  }
}

// ---------- REST TIMER ----------
let restRemaining = 0;
// A "hold" timer is the same countdown/FAB machinery, repurposed to time a
// single timed-hold set (e.g. plank) rather than the rest between sets.
// timerKind distinguishes which one is currently running so the FAB shows
// the right label and, on completion, a hold timer marks its specific set
// done instead of just going silent like a rest timer does.
let timerKind = 'rest';
let holdExId = null, holdSetIdx = null;
function startRestTimer(seconds) {
  clearInterval(timerInterval);
  timerKind = 'rest';
  holdExId = null; holdSetIdx = null;
  restRemaining = seconds;
  const fab = document.getElementById('timerFab');
  fab.style.display = 'flex';
  fab.classList.remove('urgent');
  updateFab();
  timerInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      clearInterval(timerInterval);
      fab.style.display = 'none';
      fab.classList.remove('urgent');
      finalAlarm();
    } else {
      updateFab();
      if (restRemaining <= 5) {
        fab.classList.add('urgent');
        countdownTick();
      }
    }
  }, 1000);
}

// Starts a countdown for one specific timed-hold set, defaulting to that
// set's current value — which is seeded from progression (getTargetValue)
// and can be nudged with the +/- steppers same as any other set. When it
// hits zero the set is auto-marked done, which flows straight into the
// normal rest-timer-before-next-set logic in markSetDone.
function startHoldTimer(exId, setIdx) {
  const arr = liveSets[exId];
  if (!arr || !arr[setIdx] || arr[setIdx].doneMark) return;
  const seconds = arr[setIdx].value;
  if (!seconds || seconds <= 0) return;
  clearInterval(timerInterval);
  timerKind = 'hold';
  holdExId = exId; holdSetIdx = setIdx;
  restRemaining = seconds;
  const fab = document.getElementById('timerFab');
  fab.style.display = 'flex';
  fab.classList.remove('urgent');
  updateFab();
  if (navigator.vibrate) navigator.vibrate(20);
  render();
  timerInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      clearInterval(timerInterval);
      fab.style.display = 'none';
      fab.classList.remove('urgent');
      finalAlarm();
      completeHoldSet(exId, setIdx);
    } else {
      updateFab();
      if (restRemaining <= 5) {
        fab.classList.add('urgent');
        countdownTick();
      }
    }
  }, 1000);
}
function completeHoldSet(exId, setIdx) {
  timerKind = 'rest';
  holdExId = null; holdSetIdx = null;
  const arr = liveSets[exId];
  if (!arr || !arr[setIdx] || arr[setIdx].doneMark) return;
  markSetDone(exId, setIdx); // marks done + triggers the normal rest timer / finish flow
}
function updateFab() {
  const fab = document.getElementById('timerFab');
  const m = Math.floor(restRemaining/60), s = restRemaining%60;
  fab.innerHTML = `<span class="fablabel">${timerKind === 'hold' ? 'HOLD' : 'REST'}</span>${m}:${s.toString().padStart(2,'0')}`;
}
function skipTimer() {
  clearInterval(timerInterval);
  timerKind = 'rest';
  holdExId = null; holdSetIdx = null;
  const fab = document.getElementById('timerFab');
  fab.style.display = 'none';
  fab.classList.remove('urgent');
}
function beep(freq, gain, durationMs, type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type || 'square';
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; g.gain.value = gain;
    o.start(); setTimeout(() => { o.stop(); ctx.close(); }, durationMs);
  } catch(e) {}
}
function countdownTick() {
  // Sharp, loud tick each second for the final 5-second countdown
  beep(1046, 0.55, 150, 'square');
  if (navigator.vibrate) navigator.vibrate(180);
}
function finalAlarm() {
  // Loud, long, repeated alarm signaling rest is fully over
  const pattern = [500,150,500,150,500,150,500,150,700];
  if (navigator.vibrate) navigator.vibrate(pattern);
  let i = 0;
  const alarmInterval = setInterval(() => {
    beep(i % 2 === 0 ? 1318 : 988, 0.85, 350, 'square');
    i++;
    if (i >= 5) clearInterval(alarmInterval);
  }, 400);
}

// ---------- RENDER ----------
function render() {
  const app = document.getElementById('app');
  if (view === 'workout') app.innerHTML = renderWorkout();
  else if (view === 'progress') app.innerHTML = renderProgress();
  else if (view === 'manage') app.innerHTML = renderManage();
  else app.innerHTML = renderHistory();

  if (view === 'progress') setTimeout(renderCharts, 0);
  requestAnimationFrame(scrollActiveTabsIntoView);
}

// Keeps the currently-selected pill scrolled into view within its (horizontally
// scrollable) tab strip — e.g. after a swipe moves the selection off-screen.
function scrollTabIntoView(containerId, idx) {
  const container = document.getElementById(containerId);
  if (!container || idx < 0) return;
  const child = container.children[idx];
  if (child) child.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
}

function scrollActiveTabsIntoView() {
  if (view === 'workout') {
    scrollTabIntoView('workoutDayTabs', currentDayIdx);
  } else if (view === 'progress') {
    scrollTabIntoView('progressDayTabs', progressDayIdx);
    const progDay = DAYS[progressDayIdx];
    const exIdx = progDay ? progDay.exercises.findIndex(e => e.id === progressExerciseId) : -1;
    scrollTabIntoView('progressExerciseTabs', exIdx);
  }
}

// Renders one exercise's full interactive card. Used by both List Mode (every
// exercise, one after another) and Focus Mode (just the single active one),
// so the actual set-logging UI only exists in one place. `highlighted` adds
// the "this is the one to do right now" styling used in Focus Mode.
function renderExerciseCard(ex, day, { highlighted = false } = {}) {
  const doneToday = isDoneToday(ex.name, day.label);

  // Once an exercise is logged for today, lock it to a compact, read-only
  // summary instead of leaving the full Finish/Skip controls live. This is
  // what stops a stray tap in the full list from quietly creating a second,
  // duplicate log entry for the same exercise. "Redo" is one deliberate,
  // confirmed step away if a real correction is needed.
  if (doneToday && !redoUnlocked.has(ex.id)) {
    const logged = getTodayLoggedEntry(ex, day);
    const loggedLabel = logged
      ? `${logged.sets.join(', ')}${logged.weight != null ? ' @ ' + logged.weight + ' lb' : ''}${logged.skipped ? ' (skipped)' : ''}`
      : targetLabel(ex);
    return `<div class="card done-today card-locked" style="border-left:3px solid ${day.color};" id="card-${ex.id}">
      <div class="row">
        <h3>✅ ${escapeHtml(ex.name)}${isExerciseLinked(ex.id) ? ` <span class="badge linked" title="Also on: ${escapeHtml(getLinkedDayLabel(ex.id, currentDayIdx) || '')}">🔗</span>` : ''}</h3>
        <button class="btn small secondary" onclick="unlockExerciseForRedo('${ex.id}')">↻ Redo</button>
      </div>
      <div class="meta" style="margin-bottom:0;">Logged: ${escapeHtml(loggedLabel)}</div>
    </div>`;
  }

  const s = getExState(ex);
  const arr = ensureLive(ex);
  const step = getExerciseMode(ex).stepSize ?? 1;
  const setsHtml = arr.map((set, i) => {
    const isChanged = recentlyChangedSet && recentlyChangedSet.exId === ex.id && recentlyChangedSet.setIdx === i;
    const isHolding = timerKind === 'hold' && holdExId === ex.id && holdSetIdx === i;
    const holdBtn = ex.mode === 'timed' && !set.doneMark
      ? `<button class="stepbtn holdbtn" onclick="startHoldTimer('${ex.id}', ${i})" title="Start ${set.value}s hold timer">${isHolding ? '⏱' : '▶'}</button>`
      : '';
    return `<div class="setbox ${set.doneMark?'done':''} ${isChanged?'changed':''}">
      <button class="stepbtn"
        onpointerdown="startHoldZero('${ex.id}', ${i})"
        onpointerup="endHoldZero('${ex.id}', ${i}, -${step})"
        onpointerleave="cancelHoldZero()"
        onpointercancel="cancelHoldZero()">−</button>
      <span class="setval" onclick="typeSet('${ex.id}', ${i})">${set.value}</span>
      <button class="stepbtn" onclick="adjustSet('${ex.id}', ${i}, ${step})">+</button>
      <button class="donebtn" onclick="markSetDone('${ex.id}', ${i})">${set.doneMark?'✓':'Done'}</button>
      ${holdBtn}
    </div>`;
  }).join('');

  const badge = s.failStreak > 0 ? `<span class="badge deload">${s.failStreak}/${getFailThreshold(ex)} missed</span>` : `<span class="badge up">on track</span>`;

  const exMode = getExerciseMode(ex);
  const weightControl = exMode.hasWeightControl
    ? `<div class="livectrl">
        <span class="livectrl-label">Weight</span>
        <button class="stepbtn" onclick="adjustWeightLive('${ex.id}', -1)">−</button>
        <span class="livectrl-val">${exMode.weightLabel(ex, s)}</span>
        <button class="stepbtn" onclick="adjustWeightLive('${ex.id}', 1)">+</button>
      </div>` : '';

  const setsControl = `<div class="livectrl">
        <span class="livectrl-label">Sets</span>
        <button class="stepbtn" onclick="adjustSetsLive('${ex.id}', -1)">−</button>
        <span class="livectrl-val">${exMode.usesProgressiveSets ? s.sets : ex.sets}</span>
        <button class="stepbtn" onclick="adjustSetsLive('${ex.id}', 1)">+</button>
      </div>`;

  return `<div class="card ${doneToday?'done-today':''} ${highlighted?'card-focus':''}" style="border-left:3px solid ${day.color};" id="card-${ex.id}">
    ${highlighted ? `<div class="focus-eyebrow">Now training</div>` : ''}
    ${doneToday ? `<div class="focus-eyebrow" style="color:var(--danger);">Redo unlocked — this will add a second log entry</div>` : ''}
    <div class="row"><h3>${doneToday?'✅ ':''}${escapeHtml(ex.name)}${isExerciseLinked(ex.id) ? ` <span class="badge linked" title="Also on: ${escapeHtml(getLinkedDayLabel(ex.id, currentDayIdx) || '')}">🔗</span>` : ''}</h3>${badge}</div>
    ${ex.notes ? `<div class="meta" style="font-style:italic;">📝 ${escapeHtml(ex.notes)}</div>` : ''}
    <div class="meta">Target: ${targetLabel(ex)}</div>
    <div class="row" style="margin-bottom:10px; gap:16px;">${weightControl}${setsControl}</div>
    <div class="sets">${setsHtml}</div>
    <div class="row" style="margin-top:10px;">
      <button class="btn small secondary" onclick="matchSet1('${ex.id}')">Match set 1</button>
      <button class="btn small secondary" onclick="skipExercise('${ex.id}')">Skip</button>
      <button class="btn small" onclick="finishExercise(DAYS[${currentDayIdx}].exercises.find(e=>e.id==='${ex.id}'))">Finish</button>
    </div>
  </div>`;
}

// Session-only set of exercise IDs the user has explicitly chosen to re-log
// today, after an interstitial warning. Never persisted — a fresh page load
// always starts every completed exercise back in its locked state.
let redoUnlocked = new Set();

function getTodayLoggedEntry(ex, day) {
  const { anchorDate, sessionNum } = getActiveSession(day.label);
  for (let i = state.history.length - 1; i >= 0; i--) {
    const h = state.history[i];
    if (h.exercise === ex.name && h.day === day.label && getEntryDateKey(h) === anchorDate && getEntrySessionNum(h) === sessionNum) return h;
  }
  return null;
}

function unlockExerciseForRedo(exId) {
  const ex = getExerciseById(exId);
  showConfirm({
    title: 'Log this again?',
    message: `${ex ? ex.name : 'This exercise'} is already logged for today. Doing it again adds a SECOND entry — it'll count twice toward today's volume and duration. Only do this to fix a mistake.`,
    confirmLabel: 'Unlock to redo',
    danger: true,
    onConfirm: () => { redoUnlocked.add(exId); render(); }
  });
}

// A tappable dot rail summarizing every exercise in the group at a glance —
// done (✓), the one currently active (glowing ring), and everything still
// upcoming (dim). Tapping a dot jumps Focus Mode to preview that exercise.
function renderProgressRail(day, activeExId) {
  const dots = day.exercises.map(ex => {
    const done = isDoneToday(ex.name, day.label);
    const active = ex.id === activeExId;
    const cls = done ? 'railstop done' : active ? 'railstop active' : 'railstop';
    const label = done ? '✓' : '';
    return `<div class="${cls}" style="${active ? `--rail-color:${day.color};` : ''}" onclick="focusOnExercise('${ex.id}')" title="${escapeHtml(ex.name)}">${label}</div>`;
  }).join('');
  return `<div class="progress-rail">${dots}</div>`;
}

// Manual override so a lazy tap on the progress rail (or an "Up Next" preview)
// can jump the focused card to a different exercise without losing place —
// it's cleared automatically the moment its target exercise gets finished.
let focusOverrideId = null;
function focusOnExercise(exId) {
  focusOverrideId = exId;
  render();
  requestAnimationFrame(() => {
    const el = document.getElementById(`card-${exId}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}

function renderWorkout() {
  const tabs = DAYS.map((d,i) => {
    const pct = getTodayCompletionPct(d);
    const active = i === currentDayIdx;
    const tabStyle = active ? `background:${d.color}; color:#fff;` : '';
    const todayKey = dateStr(new Date());
    const sessionsToday = getSessionCount(todayKey, d.label);
    const sessionTag = sessionsToday > 1 ? `<span class="badge" style="padding:1px 6px; font-size:9.5px;">×${sessionsToday}</span>` : '';
    return `<div class="tab" style="${tabStyle}" onclick="selectDay(${i})">
      ${d.icon} ${escapeHtml(d.label)} ${sessionTag}
      <span class="ring" style="background: conic-gradient(${d.color} ${pct*3.6}deg, var(--ring-track) 0deg)"><span class="ring-inner">${pct === 100 ? '✓' : ''}</span></span>
    </div>`;
  }).join('');

  const streakEl = document.getElementById('streakBadge');
  if (streakEl) {
    const streak = computeStreak();
    const thisWeek = getWeekWorkoutGroupCount(getWeekKey(new Date()));
    const weekPart = `${thisWeek}/${DAYS.length} muscle groups this week`;
    streakEl.textContent = streak > 0 ? `🔥 ${streak} week streak · ${weekPart}` : weekPart;
  }

  const day = DAYS[currentDayIdx];
  const activeSessionInfo = getActiveSession(day.label);
  const sessionStart = state.sessionStarts && state.sessionStarts[activeSessionInfo.key];
  const pct = getTodayCompletionPct(day);
  const sessionComplete = sessionStart && pct === 100;
  const startedLabel = sessionStart
    ? `✅ Started at ${new Date(sessionStart).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}${activeSessionInfo.sessionNum > 1 ? ` (session ${activeSessionInfo.sessionNum})` : ''}`
    : '';
  const startBar = !sessionStart
    ? `<div class="card" style="text-align:center; padding:10px;">
        <button class="btn" onclick="startWorkoutNow()" style="width:100%;">▶ Begin Workout</button>
        <div class="meta" style="margin-top:6px; margin-bottom:0;">Tap when you walk in for the most accurate session time</div>
      </div>`
    : sessionComplete
      ? `<div class="card" style="text-align:center; padding:10px;">
          <span class="badge up">${startedLabel}</span>
          <div style="margin-top:8px;"><button class="btn small secondary" onclick="startWorkoutNow()">↻ Start Another Session Today</button></div>
        </div>`
      : `<div class="card" style="text-align:center; padding:10px;"><span class="badge up">${startedLabel}</span></div>`;

  const completeBanner = pct === 100
    ? `<div class="card complete-banner">🎉 ${escapeHtml(day.label)} workout completed!</div>`
    : '';

  const modeToggle = `<div class="focus-toggle" onclick="setFocusMode(${!getFocusMode()})" title="${getFocusMode() ? 'Switch to full list' : 'Switch to guided focus mode'}">${getFocusMode() ? '🎯 Focus' : '☰ List'}</div>`;

  let body;
  if (getFocusMode() && day.exercises.length > 0 && pct < 100) {
    // ---- FOCUS MODE: one exercise at a time, no scrolling required ----
    const incomplete = day.exercises.filter(ex => !isDoneToday(ex.name, day.label));
    const overrideValid = focusOverrideId && incomplete.some(ex => ex.id === focusOverrideId);
    const activeEx = overrideValid ? incomplete.find(ex => ex.id === focusOverrideId) : incomplete[0];
    if (!overrideValid) focusOverrideId = null;
    const activeIdx = day.exercises.findIndex(e => e.id === activeEx.id);
    const upNext = day.exercises.slice(activeIdx + 1).filter(ex => !isDoneToday(ex.name, day.label)).slice(0, WORKOUT_FLOW.upNextPreviewCount);
    const doneCount = day.exercises.length - incomplete.length;

    const upNextHtml = upNext.length ? `<div class="upnext-row" onclick="focusOnExercise('${upNext[0].id}')">
        <span class="upnext-label">Up next</span>
        <span class="upnext-name">${escapeHtml(upNext[0].name)}</span>
        <span class="upnext-arrow">→</span>
      </div>` : '';

    const completedHtml = doneCount > 0 ? `<details class="completed-collapse">
        <summary>✅ Completed (${doneCount}/${day.exercises.length})</summary>
        ${day.exercises.filter(ex => isDoneToday(ex.name, day.label)).map(ex => `<div class="completed-row">${escapeHtml(ex.name)} <span class="badge up">done</span></div>`).join('')}
      </details>` : '';

    body = `${renderProgressRail(day, activeEx.id)}
      ${completedHtml}
      ${renderExerciseCard(activeEx, day, { highlighted: true })}
      ${upNextHtml}`;
  } else {
    // ---- LIST MODE (or workout already complete): everything at once ----
    body = day.exercises.map(ex => renderExerciseCard(ex, day)).join('');
  }

  return `<div class="tabs" id="workoutDayTabs">${tabs}</div><main>${startBar}${completeBanner}${modeToggle}${body}</main>`;
}

function getMuscleGroupDurationStats(dayLabel) {
  const seen = new Map();
  state.history.filter(h => h.day === dayLabel).forEach(h => {
    const dk = getEntryDateKey(h);
    const num = getEntrySessionNum(h);
    const key = dk + '__s' + num;
    if (!seen.has(key)) seen.set(key, { dateKey: dk, sessionNum: num });
  });
  const sessions = [...seen.values()].sort((a,b) => a.dateKey.localeCompare(b.dateKey) || a.sessionNum - b.sessionNum);
  const durationsWithDate = sessions.map(({dateKey, sessionNum}) => {
    const entries = state.history.filter(h => getEntryDateKey(h) === dateKey && h.day === dayLabel && getEntrySessionNum(h) === sessionNum);
    if (entries.length < 2) return null;
    const times = entries.map(h => new Date(h.date).getTime());
    return { date: dateKey, mins: Math.round((Math.max(...times) - Math.min(...times)) / 60000) };
  }).filter(d => d != null);
  if (durationsWithDate.length === 0) return null;
  const durations = durationsWithDate.map(d => d.mins);
  const mean = Math.round(durations.reduce((a,b) => a+b, 0) / durations.length);
  const last = durationsWithDate[durationsWithDate.length - 1];
  return { mean, min: Math.min(...durations), max: Math.max(...durations), count: durations.length, last: last.mins, lastDate: last.date };
}

function getOverviewStats() {
  const totalSessions = new Set(state.history.map(h => `${h.sessionDate || dateStr(h.date)}::${h.day}::${h.sessionNum || 1}`)).size;
  const totalVolume = state.history.reduce((sum, h) => {
    if (h.weight && !h.skipped) return sum + h.weight * h.sets.reduce((a,b) => a+b, 0);
    return sum;
  }, 0);
  const exercisesTracked = new Set(state.history.map(h => h.exercise)).size;
  const thisMonthKey = dateStr(new Date()).slice(0,7);
  const thisMonthSessions = new Set(
    state.history.filter(h => (h.sessionDate || dateStr(h.date)).startsWith(thisMonthKey))
      .map(h => `${h.sessionDate || dateStr(h.date)}::${h.day}::${h.sessionNum || 1}`)
  ).size;

  let totalTimeMinutes = 0, timedSessionCount = 0;
  getAllUniqueSessions().forEach(({dateKey, dayLabel, sessionNum}) => {
    const mins = getSessionDuration(dateKey, dayLabel, sessionNum);
    if (mins != null) { totalTimeMinutes += mins; timedSessionCount++; }
  });
  const avgSessionMinutes = timedSessionCount ? Math.round(totalTimeMinutes / timedSessionCount) : null;

  return { totalSessions, totalVolume: Math.round(totalVolume), exercisesTracked, thisMonthSessions, totalTimeMinutes, avgSessionMinutes };
}

function getAllTimeBests(day) {
  return day.exercises.map(ex => {
    const best = getHistoricalMax(ex.name, ex.mode);
    if (best === null) return null;
    const unit = getExerciseMode(ex).unit;
    const daysSince = getDaysSinceLastPR(ex.name, ex.mode);
    return { name: ex.name, best, unit, daysSince };
  }).filter(Boolean);
}

// ---------- TODAY-AT-A-GLANCE DASHBOARD ----------
// A small, self-contained metric layer sitting on top of data the app
// already has (state.history, getExState, getMuscleGroupDurationStats,
// computeStreak) — it reads, never writes, so it can't drift out of sync
// with the actual progression engine.

// Median gap (in days) between sessions of a given day-label — used for the
// "recovery status" read on the dashboard header.
function getDayCadenceDays(dayLabel) {
  const dates = getAllUniqueSessions().filter(s => s.dayLabel === dayLabel).map(s => new Date(s.dateKey).getTime()).sort((a,b)=>a-b);
  const uniq = [...new Set(dates)];
  if (uniq.length < 2) return 7 * DAYS.length; // no history yet — assume one full rotation
  const gaps = [];
  for (let i = 1; i < uniq.length; i++) gaps.push((uniq[i]-uniq[i-1]) / 86400000);
  gaps.sort((a,b)=>a-b);
  const mid = Math.floor(gaps.length/2);
  return gaps.length % 2 ? gaps[mid] : (gaps[mid-1]+gaps[mid])/2;
}

function getRecoveryStatus(dayLabel) {
  const sessions = getAllUniqueSessions().filter(s => s.dayLabel === dayLabel).sort((a,b) => a.dateKey.localeCompare(b.dateKey));
  if (!sessions.length) return { label: 'No history yet', level: 'neutral' };
  const last = sessions[sessions.length - 1];
  const daysSince = Math.floor((Date.now() - new Date(last.dateKey).getTime()) / 86400000);
  const cadence = getDayCadenceDays(dayLabel);
  const ratio = cadence > 0 ? daysSince / cadence : 1;
  if (ratio < 0.5) return { label: 'Still recovering', level: 'low' };
  if (ratio <= 1.4) return { label: 'Recovered · ready', level: 'good' };
  return { label: 'Well rested (or overdue)', level: 'neutral' };
}

// Average consistency across every exercise with enough history to measure —
// a single "how on-pace am I overall" percentage for the header.
function getOverallConsistencyPct() {
  const allEx = DAYS.flatMap(d => d.exercises);
  const measurable = allEx.filter(ex => state.history.filter(h => h.exercise === ex.name && !h.skipped).length >= 2);
  if (!measurable.length) return null;
  const avg = measurable.reduce((sum, ex) => sum + getExerciseConsistency(ex.name), 0) / measurable.length;
  return Math.round(avg * 100);
}

// Composite 0-100 "how's this workout going" score. Weights: completion is
// the biggest single driver (it's literally what "today" is about), then
// consistency (the habit that actually compounds), then a streak and PR
// bonus on top. Intentionally simple/transparent rather than a black box.
function computeWorkoutScore({ completionPct, consistencyPct, streak, prsToday }) {
  const completionScore = completionPct; // 0-100, weight 0.5
  const consistencyScore = consistencyPct ?? 60; // neutral default when no data yet
  const streakScore = Math.min(100, streak * 12); // saturates around a 8-week streak
  let score = completionScore * 0.5 + consistencyScore * 0.3 + streakScore * 0.2;
  score += Math.min(10, prsToday * 5); // small bonus, doesn't dominate
  return Math.round(Math.min(100, score));
}
function scoreToGrade(score) {
  if (score >= 97) return 'A+';
  if (score >= 90) return 'A';
  if (score >= 83) return 'B+';
  if (score >= 75) return 'B';
  if (score >= 65) return 'C+';
  if (score >= 50) return 'C';
  return 'D';
}

// current(number), baseline(number|null) -> { arrow, dir, pct, colorVar }.
// invertGood=true for metrics where a *decrease* is the good direction
// (e.g. workout duration getting shorter for the same work).
function computeTrend(current, baseline, invertGood = false) {
  if (baseline == null || baseline === 0 || current == null) return { arrow: '→', dir: 'flat', pct: null, colorVar: 'var(--text-faint)' };
  const pct = Math.round(((current - baseline) / baseline) * 100);
  if (Math.abs(pct) < 3) return { arrow: '→', dir: 'flat', pct, colorVar: 'var(--text-faint)' };
  const dir = pct > 0 ? 'up' : 'down';
  const isGood = invertGood ? dir === 'down' : dir === 'up';
  return { arrow: dir === 'up' ? '▲' : '▼', dir, pct, colorVar: isGood ? 'var(--success)' : 'var(--danger)' };
}

function getTodayDashboardStats() {
  const day = DAYS[currentDayIdx];
  if (!day) return null;
  const completionPct = getTodayCompletionPct(day);
  const { anchorDate, sessionNum } = getActiveSession(day.label);
  const todaysEntries = state.history.filter(h => getEntryDateKey(h) === anchorDate && h.day === day.label && getEntrySessionNum(h) === sessionNum);
  const doneNames = new Set(todaysEntries.map(h => h.exercise));
  const completedCount = doneNames.size;
  const remainingCount = Math.max(0, day.exercises.length - completedCount);
  const setsToday = todaysEntries.reduce((sum, h) => sum + (h.sets ? h.sets.length : 0), 0);
  const volumeToday = Math.round(todaysEntries.reduce((sum, h) => sum + (h.weight && !h.skipped ? h.weight * h.sets.reduce((a,b)=>a+b,0) : 0), 0));
  const durationSoFar = getSessionDuration(anchorDate, day.label, sessionNum);
  const durStats = getMuscleGroupDurationStats(day.label);
  const estFinishMins = durStats && completionPct > 0 && completionPct < 100
    ? Math.max(0, Math.round(durStats.mean * (1 - completionPct / 100)))
    : null;
  const prsToday = (state.prs || []).filter(p => dateStr(p.date) === dateStr(new Date())).length;
  const streak = computeStreak();
  const consistencyPct = getOverallConsistencyPct();
  const recovery = getRecoveryStatus(day.label);
  const score = computeWorkoutScore({ completionPct, consistencyPct, streak, prsToday });

  // 30-day average session volume for this day, for the trend chip.
  const priorSessions = getAllUniqueSessions().filter(s => s.dayLabel === day.label && s.dateKey !== anchorDate);
  const cutoff30 = Date.now() - 30 * 86400000;
  const recentVols = priorSessions.filter(s => new Date(s.dateKey).getTime() >= cutoff30).map(s => {
    const entries = state.history.filter(h => getEntryDateKey(h) === s.dateKey && h.day === day.label && getEntrySessionNum(h) === s.sessionNum);
    return entries.reduce((sum, h) => sum + (h.weight && !h.skipped ? h.weight * h.sets.reduce((a,b)=>a+b,0) : 0), 0);
  });
  const avgVol30 = recentVols.length ? Math.round(recentVols.reduce((a,b)=>a+b,0) / recentVols.length) : null;
  const volumeTrend = volumeToday > 0 ? computeTrend(volumeToday, avgVol30) : null;

  const avgDur30 = durStats ? durStats.mean : null;
  const durationTrend = durationSoFar != null ? computeTrend(durationSoFar, avgDur30, true) : null;

  return {
    day, completionPct, completedCount, remainingCount, setsToday, volumeToday,
    durationSoFar, estFinishMins, prsToday, streak, consistencyPct, recovery,
    score, grade: scoreToGrade(score), volumeTrend, durationTrend,
    anchorDate, sessionNum,
  };
}

function generateIntelligentSummary(stats) {
  if (!stats) return 'Log a few sessions to unlock trend insights.';
  const { volumeTrend, durationTrend, consistencyPct, completionPct } = stats;
  if (completionPct === 0) {
    if (consistencyPct != null && consistencyPct >= 85) return `On pace — you're training consistently. Ready when you are.`;
    return `Ready to start ${escapeHtml(stats.day.label)}.`;
  }
  if (volumeTrend && volumeTrend.dir === 'up' && volumeTrend.pct >= 8) {
    return `Excellent progress. Volume is up ${volumeTrend.pct}% vs your recent average for this day.`;
  }
  if (volumeTrend && volumeTrend.dir === 'down' && volumeTrend.pct <= -8) {
    return `Progress has slowed today — volume is down ${Math.abs(volumeTrend.pct)}% vs your recent average. Recovery or fatigue may be a factor.`;
  }
  if (durationTrend && durationTrend.dir === 'down' && durationTrend.colorVar === 'var(--success)') {
    return `Efficient session — moving faster than your recent average pace for this day.`;
  }
  if (consistencyPct != null && consistencyPct < 60) {
    return `Consistency has dropped to ${consistencyPct}% recently — that's the biggest lever on your long-term progress right now.`;
  }
  return `Solid, steady session. Keep the pace up.`;
}

function renderTodayHeader() {
  const stats = getTodayDashboardStats();
  if (!stats) return '';
  const { day, completionPct, completedCount, remainingCount, setsToday, volumeToday, durationSoFar, estFinishMins, prsToday, streak, consistencyPct, recovery, score, grade, volumeTrend, durationTrend, anchorDate, sessionNum } = stats;

  const trendChip = (t) => t ? `<span style="color:${t.colorVar}; font-weight:700;">${t.arrow}${t.pct != null ? ' ' + Math.abs(t.pct) + '%' : ''}</span>` : '';
  const recoveryDot = recovery.level === 'good' ? 'var(--success)' : recovery.level === 'low' ? 'var(--danger)' : 'var(--text-faint)';

  const metric = (label, val, trend) => `
    <div class="dash-metric">
      <div class="dash-metric-label">${label}</div>
      <div class="dash-metric-val">${val} ${trend ? trendChip(trend) : ''}</div>
    </div>`;

  const durationEditAttr = `openDurationEditModal('${anchorDate}', '${escapeHtml(day.label).replace(/'/g, "\\'")}', ${sessionNum}, ${durationSoFar != null ? durationSoFar : 'null'})`;
  const durationMetric = `
    <div class="dash-metric">
      <div class="dash-metric-label">Duration</div>
      <div class="dash-metric-val" style="cursor:pointer;" onclick="${durationEditAttr}">
        ${durationSoFar != null ? formatDuration(durationSoFar) : '—'} ${durationTrend ? trendChip(durationTrend) : ''}
        <span style="opacity:.55; font-size:11px;">✏️</span>
      </div>
    </div>`;

  return `<div class="card dash-header">
    <div class="dash-top-row">
      <div>
        <div class="dash-eyebrow">${day.icon} ${escapeHtml(day.label)} · Today</div>
        <div class="dash-summary">${generateIntelligentSummary(stats)}</div>
      </div>
      <div class="dash-score" style="--score-pct:${score}%;">
        <div class="dash-score-ring"><div class="dash-score-inner"><div class="dash-score-val">${score}</div><div class="dash-score-grade">${grade}</div></div></div>
      </div>
    </div>
    <div class="dash-progress-track"><div class="dash-progress-fill" style="width:${completionPct}%; background:${day.color};"></div></div>
    <div class="dash-metric-grid">
      ${metric('Completion', completionPct + '%')}
      ${metric('Exercises', `${completedCount}/${day.exercises.length}`)}
      ${metric('Remaining', remainingCount)}
      ${metric('Sets Done', setsToday)}
      ${metric('Volume', volumeToday.toLocaleString() + ' lb', volumeTrend)}
      ${durationMetric}
      ${metric('Est. Finish', estFinishMins != null ? `in ~${estFinishMins}m` : '—')}
      ${metric('Streak', streak + 'w 🔥')}
      ${metric('Consistency', consistencyPct != null ? consistencyPct + '%' : '—')}
      ${metric('PRs Today', prsToday + (prsToday ? ' 🏆' : ''))}
      ${metric('Recovery', `<span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:7px;height:7px;border-radius:50%;background:${recoveryDot};display:inline-block;"></span>${recovery.label}</span>`)}
      ${metric('Score', `${score}/100`)}
    </div>
  </div>`;
}

function renderProgress() {
  if (progressDayIdx >= DAYS.length) progressDayIdx = 0;
  const progDay = DAYS[progressDayIdx];

  const progTabs = DAYS.map((d,i) => {
    const active = i === progressDayIdx;
    const tabStyle = active ? `background:${d.color}; color:#fff;` : '';
    return `<div class="tab" style="${tabStyle}" onclick="selectProgressDay(${i})">${d.icon} ${escapeHtml(d.label)}</div>`;
  }).join('');

  if (!progDay.exercises.find(e => e.id === progressExerciseId)) {

  }

  const exercisePills = progDay.exercises.map(ex => {

  }).join('') || `<div class="empty" style="padding:14px 0;">No PRs yet — keep logging!</div>`;

  const durationByDay = DAYS.map(d => {
    const stats = getMuscleGroupDurationStats(d.label);
    return `<div class="histitem">
      <strong>${d.icon} ${escapeHtml(d.label)}</strong><br>
      ${stats
        ? `avg <strong>${stats.mean} min</strong> · range ${stats.min}–${stats.max} min <span style="color:var(--text-faint)">(${stats.count} session${stats.count>1?'s':''})</span><br>
           last session: <strong>${stats.last} min</strong> <span style="color:var(--text-faint)">(${new Date(stats.lastDate).toLocaleDateString()})</span>`
        : `<span style="color:var(--text-faint)">Not enough data yet</span>`}
    </div>`;
  }).join('');

  const overview = getOverviewStats();
  const bests = getAllTimeBests(progDay);
  const bestsHtml = bests.length
    ? bests.map(b => `<div class="histitem row">
        <span>${b.name}</span>
        <span style="text-align:right;"><strong>${b.best} ${b.unit}</strong><br><span style="font-size:11px; color:var(--text-faint);">${b.daysSince != null ? formatDaysAgo(b.daysSince) : ''}</span></span>
      </div>`).join('')
    : `<div class="empty" style="padding:10px 0;">No history yet for this day.</div>`;

  const monthly = getMonthlySessionCounts(6);
  const maxMonthly = Math.max(1, ...monthly.map(m => m.count));
  const monthlyBarsHtml = monthly.map(m => {
    const heightPct = Math.round((m.count / maxMonthly) * 100);
    return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
      <div style="width:100%; max-width:22px; height:${Math.max(heightPct, m.count>0?6:2)}%; background:${m.count>0?'var(--accent)':'var(--surface-raised)'}; border-radius:4px 4px 0 0;"></div>
      <div style="font-size:9.5px; color:var(--text-faint); margin-top:4px;">${m.label}</div>
      <div style="font-size:10px; color:var(--text-dim); font-weight:700;">${m.count}</div>
    </div>`;
  }).join('');

  const dayFrequency = getRecentDayFrequency(30);
  const maxFreq = Math.max(1, ...dayFrequency.map(d => d.count));
  const balanceHtml = dayFrequency.map(d => {
    const pct = Math.round((d.count / maxFreq) * 100);

let chartRef = null;
function renderCharts() {
  const ex = getExerciseById(progressExerciseId);
  const predEl = document.getElementById('predictionText');
  const canvas = document.getElementById('progressChart');
  const cardsWrap = document.getElementById('projectionCardsWrap');
  if (cardsWrap) cardsWrap.innerHTML = '';
  if (!ex) {
    if (predEl) predEl.textContent = 'Add an exercise to this day to see progression.';
    if (chartRef) { chartRef.destroy(); chartRef = null; }
    return;
  }
  if (typeof Chart === 'undefined') {
    if (predEl) predEl.textContent = 'Charts need internet the first time to load (they\u2019re cached offline after that).';
    if (canvas) canvas.style.display = 'none';
    return;
  }

  const supportsWeight = ex.mode === 'weighted' || ex.mode === 'weighted_bw';
  const isVolumeMode = chartMetric === 'volume' && supportsWeight;
  const isE1rmMode = chartMetric === 'e1rm' && supportsWeight;
  const predSettings = getPredictionSettings();

  const rangeDays = chartRange === '30' ? 30 : chartRange === '90' ? 90 : null;
  let points = state.history.filter(h => ex.name === h.exercise && !h.skipped);
  if (rangeDays != null) {
    const cutoff = Date.now() - rangeDays * 86400000;
    points = points.filter(p => new Date(p.date).getTime() >= cutoff);
  }

  if (points.length === 0) {
    if (chartRef) { chartRef.destroy(); chartRef = null; }
    if (canvas) canvas.style.display = 'none';
    if (predEl) predEl.textContent = 'No sessions logged in this time range.';
    return;
  }
  if (canvas) canvas.style.display = '';

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  const data = isVolumeMode
    ? points.map(p => (p.weight || 0) * p.sets.reduce((a,b) => a+b, 0))
    : isE1rmMode
      ? points.map(p => estimate1RM(p.weight || 0, Math.max(...p.sets)))
      : points.map(p => p.weight ?? Math.max(...p.sets));

  // Quick one-line trend note. Reuses the same prediction engine that
  // drives the chart's future line and the projection cards below —
  // no separate regression logic duplicated here.
  let predictionMsg = '';
  const engineResult = (!isVolumeMode && predSettings.enabled) ? predictExercise(ex) : null;
  if (isVolumeMode) {
    if (data.length >= 3) {
      const pctChange = data[0] > 0 ? Math.round(((data[data.length-1] - data[0]) / data[0]) * 100) : 0;
      predictionMsg = `Total volume per session is ${pctChange >= 0 ? 'up' : 'down'} ${Math.abs(pctChange)}% over this range.`;
    } else {
      predictionMsg = 'Log a few more sessions to see a volume trend.';
    }
  } else if (engineResult) {
    const proj3 = engineResult.projections.find(x => x.months === 3);
    if (isE1rmMode) {
      predictionMsg = proj3.progressPct > 0
        ? `At current pace, ~${proj3.predictedE1rm} lb estimated 1RM projected in ~3 months.`
        : `Trend is flat/declining — keep logging for a better estimate.`;
    } else if (ex.mode === 'weighted') {
      if (proj3.atCeiling) {
        predictionMsg = `Already near your equipment ceiling (${WEIGHTS[WEIGHTS.length-1]} lb) — further gains need higher reps/tempo, not heavier dumbbells.`;
      } else if (proj3.progressPct <= 0) {
        predictionMsg = `Trend is flat/declining — no clear projection yet. Keep logging for a better estimate.`;
      } else {
        predictionMsg = `At current pace, ~${proj3.predictedWorkingWeight} lb projected in ~3 months.`;
      }
    } else if (ex.mode === 'weighted_bw') {
      predictionMsg = proj3.progressPct > 0
        ? `At current pace, ~+${Math.max(0, proj3.predictedWorkingWeight - (proj3.currentWorkingWeight||0))} lb belt weight projected in ~3 months.`
        : `Trend is flat/declining — keep logging for a better estimate.`;
    } else if (ex.mode === 'timed') {
      predictionMsg = proj3.progressPct > 0 ? `At current pace, ~${proj3.predictedE1rm}s hold projected in ~3 months.` : `Trend is flat — keep logging.`;
    } else {
      predictionMsg = proj3.progressPct > 0 ? `At current pace, ~${proj3.predictedE1rm} reps projected in ~3 months.` : `Trend is flat — keep logging.`;
    }
  } else if (!predSettings.enabled) {
    predictionMsg = 'Predictions are turned off.';
  } else {
    predictionMsg = 'Log a few more sessions to unlock a trend projection.';
  }
  if (ex.mode === 'weighted_bw' && isE1rmMode) {
    predictionMsg += ' (Based on added belt weight only — bodyweight itself isn\u2019t tracked.)';
  }
  if (predEl) predEl.textContent = predictionMsg;

  if (chartRef) chartRef.destroy();
  const chartLabel = isVolumeMode ? 'Total Volume (lb)' : isE1rmMode ? 'Estimated 1RM (lb)' : 'Weight / Best reps';
  const chartColor = isVolumeMode ? '#ff6b4a' : isE1rmMode ? '#3ecf6e' : '#4f7cff';
  const cssVars = getComputedStyle(document.documentElement);
  const textColor = cssVars.getPropertyValue('--text').trim() || '#e8e8ec';
  const textDimColor = cssVars.getPropertyValue('--text-dim').trim() || '#9aa0ac';

  const datasets = [{ label: chartLabel, data, borderColor: chartColor, backgroundColor: chartColor + '26', fill:true, tension:0.3, pointRadius: 3 }];
  let futureMeta = []; // parallel metadata for the predicted dataset's tooltip

  const showFuture = !isVolumeMode && engineResult && predSettings.enabled && predSettings.showFutureLine;
  if (showFuture) {
    const horizons = [1,2,3,4,5,6,8,10,12,15,18,21,24];
    const finePred = predictExercise(ex, horizons);
    const futureLabels = horizons.map(m => {
      const d = new Date(); d.setMonth(d.getMonth() + m);
      return d.toLocaleDateString();
    });
    const futureValues = finePred.projections.map(p => isE1rmMode ? p.predictedE1rm : (supportsWeight ? p.predictedWorkingWeight : p.predictedE1rm));
    futureMeta = finePred.projections.map(p => ({ predictedE1rm: p.predictedE1rm, predictedWorkingWeight: p.predictedWorkingWeight, confidence: p.confidence }));

    // Dim the "actual" dataset's fill a touch so the eye reads the predicted
    // segment as clearly secondary, per "historical data always has higher
    // visual priority" — solid color/full opacity for actual, translucent
    // dashed for predicted.
    const predictedSeriesData = new Array(labels.length - 1).fill(null).concat([data[data.length-1], ...futureValues]);
    labels.push(...futureLabels);
    datasets[0].data = data.concat(new Array(futureValues.length).fill(null));
    datasets.push({
      label: 'Predicted',
      data: predictedSeriesData,
      borderColor: chartColor + '99',
      backgroundColor: 'transparent',
      borderDash: [7, 5],
      fill: false,
      tension: 0.25,
      pointRadius: (ctx) => ctx.dataIndex === labels.length - horizons.length ? 3 : 2,
      pointStyle: 'rectRot',
      pointBackgroundColor: chartColor + '99',
    });

    renderProjectionCards(cardsWrap, ex, finePred, predSettings);
  } else if (cardsWrap) {
    cardsWrap.innerHTML = '';
  }

  chartRef = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      plugins: {
        legend: { display: datasets.length > 1, labels: { color: textColor } },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              if (ctx.datasetIndex === 1) {
                const idx = ctx.dataIndex - (labels.length - futureMeta.length);
                const meta = futureMeta[idx];
                if (!meta) return `Predicted: ${ctx.formattedValue}`;
                const lines = [`Predicted: ${ctx.formattedValue}`, `Est. 1RM: ${meta.predictedE1rm} lb`];
                if (predSettings.showConfidence) lines.push(`Confidence: ${meta.confidence}%`);
                return lines;
              }
              return `${ctx.dataset.label}: ${ctx.formattedValue}`;
            }
          }
        }
      },
      scales: { x:{ ticks:{ color: textDimColor } }, y:{ ticks:{ color: textDimColor }, beginAtZero:false } }
    }
  });
}

// Renders the 3/6/12/24-month milestone cards under the chart, plus a short
// list of data-grounded insights. Pure DOM write into the container the
// Progress page template already reserved — kept out of the main template
// string since it depends on the async-loaded Chart.js/prediction pass.
function renderProjectionCards(wrap, ex, pred, settings) {
  if (!wrap || !settings.showMilestones) { if (wrap) wrap.innerHTML = ''; return; }
  const supportsWeight = ex.mode === 'weighted' || ex.mode === 'weighted_bw';
  const targetHorizons = [3, 6, 12, 24];
  const cards = targetHorizons.map(m => {
    const p = pred.projections.find(x => x.months === m);
    if (!p) return '';
    const confColor = p.confidence >= 80 ? 'var(--success)' : p.confidence >= 55 ? '#ffcb4a' : 'var(--text-faint)';
    const primaryVal = supportsWeight ? `${p.predictedWorkingWeight} ${pred.unit}` : `${p.predictedE1rm} ${pred.unit}`;
    const deltaVal = supportsWeight && p.deltaWorkingWeight != null ? `(+${Math.max(0,p.deltaWorkingWeight)} ${pred.unit})` : `(${p.progressPct >= 0 ? '+' : ''}${p.progressPct}%)`;
    return `<div class="proj-card">
      <div class="proj-card-h">${m < 12 ? m + ' Months' : (m/12) + ' Year' + (m>12?'s':'')}</div>
      <div class="proj-card-primary">${primaryVal}</div>
      <div class="proj-card-delta">${deltaVal}</div>
      ${supportsWeight ? `<div class="proj-card-sub">Est. 1RM: ${p.predictedE1rm} lb</div>` : ''}
      <div class="proj-card-sub">Volume: ${p.progressPct >= 0 ? '+' : ''}${p.progressPct}%</div>
      ${settings.showConfidence ? `<div class="proj-card-conf"><span class="proj-conf-dot" style="background:${confColor};"></span>${p.confidence}% confidence</div>` : ''}
      ${p.atCeiling ? `<div class="proj-card-sub" style="color:var(--danger);">At equipment ceiling</div>` : ''}
    </div>`;
  }).join('');

  const insights = generatePredictionInsights(ex);
  const insightsHtml = insights.length ? `<div class="pred-insights">${insights.map(i => `<div class="pred-insight-row">💡 ${escapeHtml(i)}</div>`).join('')}</div>` : '';

  wrap.innerHTML = `<div class="proj-cards-label">Future Progress Prediction <span style="font-weight:400;color:var(--text-faint);">(${settings.mode})</span></div>
    <div class="proj-cards-row">${cards}</div>
    ${insightsHtml}`;
}


let calendarOffset = 0;

function changeMonth(delta) {
  calendarOffset += delta;
  render();
}

function renderCalendar() {
  const workoutDates = new Set(state.history.map(h => getEntryDateKey(h)));
  const base = new Date();
  base.setMonth(base.getMonth() + calendarOffset);
  const year = base.getFullYear();
  const month = base.getMonth();
  const monthLabel = base.toLocaleString('default', { month: 'long', year: 'numeric' });

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay(); // 0 = Sunday
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = dateStr(new Date());

  const dowHeaders = ['S','M','T','W','T','F','S'].map(d => `<div class="cal-dow">${d}</div>`).join('');

  let cells = '';
  for (let i = 0; i < startWeekday; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const cellDate = new Date(year, month, day);
    const key = dateStr(cellDate);
    const worked = workoutDates.has(key);
    const isToday = key === todayStr;
    cells += `<div class="cal-cell ${worked?'worked':''} ${isToday?'today':''}">${day}</div>`;
  }

  return `<div class="card">
    <div class="row">
      <button class="btn small secondary" onclick="changeMonth(-1)">‹</button>
      <h3>${monthLabel}</h3>
      <button class="btn small secondary" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">${dowHeaders}${cells}</div>
    <div class="meta" style="margin-top:8px;">🟢 worked out · ⬜ rest / no log</div>
  </div>`;
}

function resetAllData() {
  showConfirm({
    title: 'Reset all data?',
    message: 'This will permanently delete ALL workout history, progression, PRs, and streaks (your exercise list and Google Drive connection stay intact).',
    confirmLabel: 'Reset',
    danger: true,
    requireText: 'RESET',
    onConfirm: () => {
      const keepDays = DAYS;
      const keepDriveSync = state.driveSync;
      state = { version: SCHEMA_VERSION, exercises: {}, history: [], prs: [], meta: {}, sessionStarts: {}, customDays: keepDays, driveSync: keepDriveSync };
      saveState();
      liveSets = {};
      currentDayIdx = 0;
      alert('All data reset. Exercise list and Drive connection were kept.');
      setView('workout');
    }
  });
}

function renameDay(dayIdx) {
  const day = DAYS[dayIdx];
  const newName = prompt(`Rename "${day.label}" to:`, day.label);
  if (!newName || !newName.trim() || newName.trim() === day.label) return;
  const oldLabel = day.label;
  const cleanName = newName.trim();
  day.label = cleanName;
  // Cascade: update all history entries and PRs that reference the old day label
  state.history.forEach(h => { if (h.day === oldLabel) h.day = cleanName; });
  // Cascade: session start keys are scoped by date+day label(+session number), so rekey any that used the old label
  const rekeyKnownFormat = (obj) => {
    if (!obj) return;
    Object.keys(obj).forEach(key => {
      // matches "<date>__<oldLabel>" or "<date>__<oldLabel>__s<N>"
      const suffixMatch = key.endsWith(`__${oldLabel}`) ? '' :
        (key.match(/__s\d+$/) && key.slice(0, key.lastIndexOf('__s')).endsWith(`__${oldLabel}`)) ? key.slice(key.lastIndexOf('__s')) : null;
      if (suffixMatch === null) return;
      const base = suffixMatch ? key.slice(0, -(`__${oldLabel}${suffixMatch}`.length)) : key.slice(0, -(`__${oldLabel}`.length));
      const newKey = `${base}__${cleanName}${suffixMatch || ''}`;
      obj[newKey] = obj[key];
      delete obj[key];
    });
  };
  rekeyKnownFormat(state.sessionStarts);
  rekeyKnownFormat(state.sessionCount);
  persistDays();
  saveState();
  render();
}

function moveDay(dayIdx, direction) {
  const target = dayIdx + direction;
  if (target < 0 || target >= DAYS.length) return;
  [DAYS[dayIdx], DAYS[target]] = [DAYS[target], DAYS[dayIdx]];
  // Keep the same day visually selected after reorder, on both workout and progress tabs
  if (currentDayIdx === dayIdx) currentDayIdx = target;
  else if (currentDayIdx === target) currentDayIdx = dayIdx;
  if (progressDayIdx === dayIdx) progressDayIdx = target;
  else if (progressDayIdx === target) progressDayIdx = dayIdx;
  persistDays();
  render();
}

function renameExercise(exId) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const newName = prompt(`Rename "${ex.name}" to:`, ex.name);
  if (!newName || !newName.trim() || newName.trim() === ex.name) return;
  const oldName = ex.name;
  const cleanName = newName.trim();
  ex.name = cleanName;
  // Cascade: update history and PR records so charts/PR lookups still match this exercise
  state.history.forEach(h => { if (h.exercise === oldName) h.exercise = cleanName; });
  if (state.prs) state.prs.forEach(p => { if (p.exercise === oldName) p.exercise = cleanName; });
  propagateLinkedExerciseConfig(ex);
  persistDays();
  saveState();
  render();
}

function moveExercise(dayIdx, exIdx, direction) {
  const list = DAYS[dayIdx].exercises;
  const target = exIdx + direction;
  if (target < 0 || target >= list.length) return;
  [list[exIdx], list[target]] = [list[target], list[exIdx]];
  persistDays();
  render();
}

function removeDay(dayIdx) {
  const day = DAYS[dayIdx];
  if (DAYS.length <= 1) { alert('You need at least one day.'); return; }
  showConfirm({
    title: 'Delete this day?',
    message: `Delete the entire "${day.label}" day and its exercises? History/progress is deleted too, except for any exercise also linked to another day — that one keeps its history there. This cannot be undone.`,
    confirmLabel: 'Delete',
    danger: true,
    onConfirm: () => {
      // Only wipe history/PRs/progression state for exercises that don't
      // also live on another day — a linked exercise keeps progressing on
      // whichever day(s) survive.
      const exNamesToWipe = day.exercises.filter(e => !DAYS.some((d,i) => i !== dayIdx && d.exercises.some(o => o.id === e.id))).map(e => e.name);
      const exIdsToWipe = day.exercises.filter(e => !DAYS.some((d,i) => i !== dayIdx && d.exercises.some(o => o.id === e.id))).map(e => e.id);
      state.history = state.history.filter(h => !exNamesToWipe.includes(h.exercise));
      if (state.prs) state.prs = state.prs.filter(p => !exNamesToWipe.includes(p.exercise));
      exIdsToWipe.forEach(id => { if (state.exercises) delete state.exercises[id]; });
      DAYS.splice(dayIdx, 1);
      persistDays();
      saveState();
      if (currentDayIdx >= DAYS.length) currentDayIdx = DAYS.length - 1;
      render();
    }
  });
}

function addDay() {
  const label = prompt('New muscle group / day name (e.g. "Arms", "Calves"):');
  if (!label || !label.trim()) return;
  const icon = prompt('Pick an emoji icon for this day (or leave blank for default):', '⭐') || '⭐';
  const id = label.toLowerCase().trim().replace(/[^a-z0-9]+/g, '_') + '_' + Date.now().toString(36).slice(-4);
  const color = DAY_PALETTE[DAYS.length % DAY_PALETTE.length];
  DAYS.push({ id, label: label.trim(), icon, color, exercises: [] });
  persistDays();
  currentDayIdx = DAYS.length - 1;
  render();
  alert(`Added "${label.trim()}". Now add exercises to it below.`);
}

function removeExercise(dayIdx, exId) {
  const day = DAYS[dayIdx];
  const ex = day.exercises.find(e => e.id === exId);
  if (!ex) return;
  const linkedElsewhere = DAYS.some((d, i) => i !== dayIdx && d.exercises.some(e => e.id === exId));
  if (linkedElsewhere) {
    const otherLabel = getLinkedDayLabel(exId, dayIdx);
    showConfirm({
      title: 'Remove from this day?',
      message: `"${ex.name}" is also linked to ${otherLabel}. Removing it here only unlinks it from ${day.label} — its history and progress are kept and it'll keep progressing on ${otherLabel}.`,
      confirmLabel: 'Remove from this day',
      onConfirm: () => {
        day.exercises = day.exercises.filter(e => e.id !== exId);
        persistDays();
        render();
      }
    });
    return;
  }
  showConfirm({
    title: 'Remove exercise?',
    message: `Remove "${ex.name}" and delete all its history? This cannot be undone.`,
    confirmLabel: 'Remove',
    danger: true,
    onConfirm: () => {
      day.exercises = day.exercises.filter(e => e.id !== exId);
      state.history = state.history.filter(h => h.exercise !== ex.name);
      if (state.prs) state.prs = state.prs.filter(p => p.exercise !== ex.name);
      if (state.exercises) delete state.exercises[ex.id];
      persistDays();
      saveState();
      render();
    }
  });
}

      <label style="${lbl}">Sets — max<input type="number" id="editExSetsMax" value="${getSetsMax(ex)}"></label>
