<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
  // Applied before first paint so a saved "light" preference doesn't flash dark first.
  // No stored preference (or "dark") leaves the <html> element as-is, which is the
  // default dark theme defined in :root below.
  try {
    if (localStorage.getItem('liftlog_theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  } catch (e) {}
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LiftLog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<!-- iOS only: Safari lets the home-screen icon and the launch/splash image differ.
     Android/Chrome cannot split these — it always uses the manifest.json icons for both. -->
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-startup-image" href="icon-512-splash.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0a0b10;
    --surface: #15171f;
    --surface-raised: #1c1f29;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --text: #f2f3f6;
    --text-dim: #8b90a3;
    --text-faint: #565b6c;
    --accent: #5b7fff;
    --success: #34d399;
    --success-bg: #132a20;
    --success-glow: rgba(52,211,153,.55);
    --success-border: rgba(52,211,153,.4);
    --danger: #f2555a;
    --danger-bg: #2a1518;
    --header-grad-a: #171922;
    --header-grad-b: #121319;
    --control-bg: #262a36;
    --control-bg-active: #2d3240;
    --done-bg: #2c5b41;
    --card-shadow: 0 1px 2px rgba(0,0,0,.2), 0 4px 14px rgba(0,0,0,.18);
    --streak-color: #ffa361;
    --ring-track: #2a2d3a;
    color-scheme: dark;
  }
  /* Light ("Normal") mode — opt-in via data-theme, dark stays the default look.
     Clean white palette: true white throughout, elevation done via soft shadow/border
     rather than background-color shifts, so it reads crisp rather than tinted. */
  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-raised: #f6f6f8;
    --border: rgba(20,20,25,0.09);
    --border-strong: rgba(20,20,25,0.15);
    --text: #1a1a1e;
    --text-dim: #6b6b74;
    --text-faint: #a3a3ac;
    --accent: #2f3f75;
    --success: #2f7a52;
    --success-bg: #eef7f1;
    --success-glow: rgba(47,122,82,.28);
    --success-border: rgba(47,122,82,.4);
    --danger: #b23b3b;
    --danger-bg: #fbeeec;
    --header-grad-a: #ffffff;
    --header-grad-b: #fafafb;
    --control-bg: #f6f6f8;
    --control-bg-active: #ececef;
    --done-bg: #2f7a52;
    --card-shadow: 0 1px 2px rgba(20,20,25,.04), 0 8px 20px rgba(20,20,25,.06);
    --streak-color: #a8712e;
    --ring-track: #ececef;
    color-scheme: light;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); padding-bottom: 92px;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 18px 16px 15px; background: linear-gradient(180deg, var(--header-grad-a) 0%, var(--header-grad-b) 100%);
    position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border);
  }
  header::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
    background: linear-gradient(90deg, #4f7cff, #ff6b4a, #3ecf6e, #b06bff, #ffcb4a);
    opacity: .75;
  }
  header h1 {
    margin: 0; font-size: 21px; font-weight: 800; letter-spacing: -0.02em;
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px 10px;
  }
  #streakBadge { font-size: 12.5px; color: var(--streak-color); font-weight: 600; letter-spacing: -0.01em; }
  .gearbtn {
    float: right; background: var(--surface-raised); color: var(--text); border: 1px solid var(--border);
    border-radius: 9px; width: 34px; height: 34px; font-size: 15px; transition: transform .12s ease, background .15s ease;
  }
  .gearbtn:active { transform: scale(.92); background: var(--control-bg); }
  .ring {
    width: 20px; height: 20px; border-radius: 50%; margin-left: 6px;
    display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
  }
  .ring-inner { width: 12px; height: 12px; border-radius: 50%; background: var(--surface-raised); font-size: 8px; display: flex; align-items: center; justify-content: center; color: var(--success); font-weight: 900; }
  .tabs { display: flex; gap: 7px; padding: 12px; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab {
    flex: 0 0 auto; padding: 9px 15px; border-radius: 22px; background: var(--surface-raised);
    color: var(--text-dim); font-size: 13px; font-weight: 600; white-space: nowrap; letter-spacing: -0.01em;
    display: flex; align-items: center; border: 1px solid var(--border);
    transition: background .25s ease, color .25s ease, border-color .25s ease;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: transparent; }
  @keyframes levelUpPulse {
    0% { box-shadow: 0 0 0 0 var(--success-glow); }
    70% { box-shadow: 0 0 0 16px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }
  .card.done-today { background: var(--success-bg); border-color: var(--success-border); border-width: 1.5px; }
  .card.done-today h3 { color: var(--success); }
  .card.levelup { animation: levelUpPulse 1s ease-out; }
  .complete-banner {
    text-align: center; font-size: 15.5px; font-weight: 700; color: var(--success); letter-spacing: -0.01em;
    background: var(--success-bg); border: 1px solid var(--success-border);
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeSlide .3s cubic-bezier(.2,.7,.3,1); }
  .setbox.changed { border-color: var(--accent); }
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--surface);
    border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .navbtn {
    flex: 1; padding: 13px 0 11px; text-align: center; font-size: 11.5px; font-weight: 600;
    color: var(--text-faint); position: relative; transition: color .2s ease; letter-spacing: -0.01em;
  }
  .navbtn.active { color: var(--accent); }
  .navbtn.active::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 28px; height: 2.5px; border-radius: 0 0 3px 3px; background: var(--accent);
  }
  main { padding: 16px; }
  .card {
    background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px;
    border: 1px solid var(--border); box-shadow: var(--card-shadow);
  }
  .card h3 { margin: 0 0 6px 0; font-size: 15.5px; font-weight: 700; letter-spacing: -0.01em; }
  .meta { font-size: 12.5px; color: var(--text-dim); margin-bottom: 10px; }
  .livectrl { display: flex; align-items: center; gap: 6px; }
  .livectrl-label { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .5px; }
  .livectrl-val { font-size: 14px; font-weight: 700; min-width: 44px; text-align: center; color: var(--text); }
  .sets { display: flex; gap: 8px; flex-wrap: wrap; }
  .setbox {
    min-width: 158px; height: 56px; border-radius: 13px; background: var(--surface-raised);
    display: flex; align-items: center; justify-content: space-between; padding: 0 4px;
    border: 1.5px solid var(--border-strong); gap: 2px; transition: border-color .25s ease, background .25s ease;
  }
  .setbox.done { background: var(--success-bg); border-color: var(--success-border); }
  .stepbtn {
    width: 42px; height: 46px; border-radius: 10px; background: var(--control-bg); color: var(--text);
    border: none; font-size: 21px; line-height: 1; flex: 0 0 auto; font-weight: 500;
    transition: transform .1s ease, background .15s ease;
  }
  .stepbtn:active { transform: scale(.9); background: var(--control-bg-active); }
  .setval {
    flex: 1; text-align: center; font-size: 18px; font-weight: 700; color: var(--text);
    min-width: 26px; letter-spacing: -0.01em;
  }
  .donebtn {
    height: 46px; padding: 0 12px; border-radius: 10px; background: var(--done-bg); color: #fff;
    border: none; font-size: 12.5px; font-weight: 700; flex: 0 0 auto; letter-spacing: -0.01em;
    transition: transform .1s ease, background .15s ease;
  }
  .donebtn:active { transform: scale(.93); }
  .setbox.done .donebtn { background: var(--success); color: #06120c; }
  input, select {
    padding: 10px; border-radius: 8px; background: var(--surface-raised);
    border: 1px solid var(--border-strong); color: var(--text); font-size: 14px; font-family: inherit;
  }
  .btn {
    padding: 10px 16px; border-radius: 11px; background: var(--accent); color: #fff; border: none;
    font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em;
    transition: transform .1s ease, filter .15s ease;
  }
  .btn:active { transform: scale(.96); filter: brightness(.92); }
  .btn.secondary { background: var(--surface-raised); color: var(--text); border: 1px solid var(--border-strong); }
  .btn.danger { background: var(--danger); }
  .btn.small { padding: 7px 11px; font-size: 12px; }
  .row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }

  /* In-app modal (replaces browser confirm()/prompt() for key flows) */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: fadeSlide .18s ease-out;
  }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 16px;
    padding: 20px; max-width: 360px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  .modal-msg { font-size: 14.5px; line-height: 1.45; color: var(--text); white-space: pre-line; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* Toast (status messages + short undo window) */
  #toastRoot { position: fixed; left: 0; right: 0; bottom: 96px; z-index: 90; display: flex; justify-content: center; pointer-events: none; }
  .toast {
    background: var(--surface-raised); border: 1px solid var(--border-strong); color: var(--text);
    padding: 12px 14px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.35);
    display: flex; align-items: center; gap: 12px; font-size: 13.5px; max-width: 90vw;
    pointer-events: auto; animation: fadeSlide .2s ease-out;
  }
  .toast-action { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 6px 11px; font-size: 12.5px; font-weight: 700; flex: 0 0 auto; }

  /* Expandable exercise edit card (Manage screen) */
  .exp-row {
    padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .exp-row .chev { color: var(--text-faint); font-size: 12px; transition: transform .2s ease; flex: 0 0 auto; }
  .exp-row.open .chev { transform: rotate(90deg); }
  .exp-body { padding: 4px 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .exp-field label { display: block; font-size: 11.5px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .exp-field input, .exp-field textarea { width: 100%; }
  .exp-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .exp-section-label { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  .timer-fab {
    position: fixed; right: 16px; bottom: 100px; width: 92px; height: 92px; border-radius: 46px;
    background: linear-gradient(155deg, #ff8058, #ff5f4a);
    color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 25px; font-weight: 800; box-shadow: 0 8px 24px rgba(255,95,74,.4); z-index: 20;
    border: 2.5px solid rgba(255,255,255,.25);
  }
  .timer-fab .fablabel { font-size: 10.5px; font-weight: 700; letter-spacing: 1.5px; opacity: .9; margin-bottom: 2px; }
  @keyframes urgentPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  .timer-fab.urgent {
    background: linear-gradient(155deg, #ff3b3b, #d81f1f);
    animation: urgentPulse 0.5s ease-in-out infinite;
    box-shadow: 0 8px 28px rgba(255,40,40,.65);
  }
  .badge {
    font-size: 10.5px; font-weight: 700; letter-spacing: -0.01em; padding: 3px 9px;
    border-radius: 10px; background: var(--surface-raised); color: var(--text-dim);
  }
  .badge.up { background: var(--success-bg); color: var(--success); }
  .badge.deload { background: var(--danger-bg); color: var(--danger); }
  .histitem { padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .histitem:last-child { border-bottom: none; }
  #testModeBanner {
    background: repeating-linear-gradient(45deg, #7a2e00, #7a2e00 10px, #8f3800 10px, #8f3800 20px);
    color: #fff; text-align: center; font-size: 12.5px; font-weight: 700; letter-spacing: .02em;
    padding: 8px; position: sticky; top: 0; z-index: 9;
  }
  .empty { text-align: center; color: var(--text-faint); padding: 40px 10px; font-size: 13px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 5px; margin-top: 10px; width: 100%; }
  .cal-dow { text-align: center; font-size: 10.5px; font-weight: 600; color: var(--text-faint); padding-bottom: 4px; min-width: 0; }
  .cal-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 9px; background: var(--surface-raised); font-size: 12px; color: var(--text-dim); min-width: 0;
  }
  .cal-cell.empty { background: transparent; }
  .cal-cell.worked { background: var(--success-bg); color: var(--success); font-weight: 700; }
  .cal-cell.today { border: 2px solid var(--accent); }
  select {
    background: var(--surface-raised); color: var(--text); border: 1px solid var(--border-strong);
    border-radius: 9px; padding: 7px 8px; font-size: 13px;
  }
  canvas { max-height: 220px; }
</style>
</head>
<body>

<header><h1>LiftLog <span id="streakBadge"></span> <button class="gearbtn" onclick="setView('manage')">⚙</button></h1></header>
<div id="testModeBanner" style="display:none;"></div>

<div id="app"></div>

<div class="nav">
  <div class="navbtn active" data-view="workout" onclick="setView('workout')">🏋️ Workout</div>
  <div class="navbtn" data-view="progress" onclick="setView('progress')">📈 Progress</div>
  <div class="navbtn" data-view="history" onclick="setView('history')">🗒️ History</div>
</div>

<div class="timer-fab" id="timerFab" style="display:none;" onclick="skipTimer()"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
// ---------- DATA ----------
const DAY_PALETTE = ['#4f7cff', '#ff6b4a', '#3ecf6e', '#b06bff', '#ffcb4a', '#ff5c93', '#5ce1e6', '#f2a65a'];

const WEIGHTS = [11, 22, 33, 44, 55]; // lb per dumbbell
const BELT_INCREMENT = 5; // lb, weighted pull-up/chin-up belt, open-ended

const DEFAULT_DAYS = [
  { id:'shoulders', label:'Shoulders', icon:'💪', color:'#4f7cff', exercises:[
    {id:'db_press', name:'DB Shoulder Press', mode:'weighted', sets:5, repLow:5, repHigh:8, rest:120},
    {id:'lat_raise', name:'Lateral Raise (side delt priority)', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'lat_raise_2', name:'Bent-Over Lateral Raise', mode:'weighted', sets:2, repLow:10, repHigh:15, rest:60},
    {id:'rear_delt', name:'Rear Delt Fly', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'shrug', name:'DB Shrug', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
  ]},
  { id:'chest', label:'Chest', icon:'🎽', color:'#ff6b4a', exercises:[
    {id:'db_bench', name:'DB Bench Press', mode:'weighted', sets:5, repLow:5, repHigh:8, rest:150},
    {id:'incline_press', name:'Incline DB Press', mode:'weighted', sets:4, repLow:6, repHigh:10, rest:120},
    {id:'flyes', name:'DB Flyes', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'close_grip', name:'Close-Grip Press', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:90},
    {id:'pullover', name:'DB Pullover', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
  ]},
  { id:'back', label:'Back', icon:'🔺', color:'#3ecf6e', exercises:[
    {id:'pullups', name:'Wide-Grip Pull-ups (width priority)', mode:'weighted_bw', sets:6, repLow:5, repHigh:10, rest:150},
    {id:'db_row', name:'DB Row', mode:'weighted', sets:5, repLow:6, repHigh:10, rest:90},
    {id:'chinups', name:'Chin-ups', mode:'weighted_bw', sets:3, repLow:5, repHigh:10, rest:120},
    {id:'reverse_fly', name:'Reverse Flyes', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:60},
    {id:'db_deadlift', name:'DB Deadlift', mode:'weighted', sets:5, repLow:5, repHigh:8, rest:150},
  ]},
  { id:'legs', label:'Legs', icon:'🦵', color:'#b06bff', exercises:[
    {id:'goblet_squat', name:'DB Goblet Squat', mode:'weighted', sets:5, repLow:5, repHigh:10, rest:150},
    {id:'sumo_squat', name:'DB Sumo Squat (width priority)', mode:'weighted', sets:3, repLow:8, repHigh:12, rest:120},
    {id:'lunges', name:'DB Lunges', mode:'weighted', sets:4, repLow:8, repHigh:12, rest:90},
    {id:'rdl', name:'DB Romanian Deadlift', mode:'weighted', sets:4, repLow:6, repHigh:10, rest:120},
    {id:'calf_raise', name:'Calf Raises (priority)', mode:'weighted', sets:5, repLow:10, repHigh:15, rest:45},
    {id:'calf_raise_single', name:'Single-Leg Calf Raise', mode:'bodyweight', sets:2, startReps:12, rest:45},
  ]},
  { id:'abs', label:'Abs', icon:'🔥', color:'#ffcb4a', exercises:[
    {id:'weighted_crunch', name:'Weighted Crunch', mode:'weighted', sets:4, repLow:10, repHigh:15, rest:45},
    {id:'russian_twist', name:'Russian Twists', mode:'weighted', sets:3, repLow:12, repHigh:20, rest:45},
    {id:'leg_raise', name:'Leg Raises', mode:'bodyweight', sets:4, startReps:8, rest:45},
    {id:'plank', name:'Plank', mode:'timed', sets:3, startSeconds:30, rest:45},
    {id:'side_bend', name:'Side Bends', mode:'weighted', sets:3, repLow:12, repHigh:20, rest:45},
  ]},
];

const DEFAULT_SETS_MIN = 3;
const DEFAULT_SETS_MAX = 5;
const DEFAULT_REP_LOW = 8;
const DEFAULT_REP_HIGH = 12;
const DEFAULT_REP_INCREMENT = 2;
DEFAULT_DAYS.forEach(day => day.exercises.forEach(ex => {
  if (ex.mode === 'weighted' || ex.mode === 'weighted_bw') {
    ex.setsMin = DEFAULT_SETS_MIN;
    ex.setsMax = DEFAULT_SETS_MAX;
    ex.repLow = DEFAULT_REP_LOW;
    ex.repHigh = DEFAULT_REP_HIGH;
    ex._repDefaultApplied = true;
  }
}));

// ---------- STORAGE ----------
const STORE_KEY = 'liftlog_v1';
const TEST_STORE_KEY = 'liftlog_v1_test';
const TEST_MODE_FLAG = 'liftlog_test_mode_active';
const THEME_KEY = 'liftlog_theme';

function isTestMode() { return localStorage.getItem(TEST_MODE_FLAG) === '1'; }
function activeStoreKey() { return isTestMode() ? TEST_STORE_KEY : STORE_KEY; }

// ---------- APPEARANCE (dark default, light opt-in) ----------
function getTheme() { return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; }
function applyTheme(t) {
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.setAttribute('content', t === 'light' ? '#ffffff' : '#111827');
}
function setTheme(t) {
  localStorage.setItem(THEME_KEY, t);
  applyTheme(t);
  render();
}

const STATE_VERSION = 1; // bump when the state shape changes, so a restored backup from an older version can be detected/migrated safely

function loadState() {
  try {
    const parsed = JSON.parse(localStorage.getItem(activeStoreKey()));
    if (parsed) { if (parsed.version == null) parsed.version = STATE_VERSION; return parsed; }
    return { exercises:{}, history:[], version: STATE_VERSION };
  }
  catch(e){ return { exercises:{}, history:[], version: STATE_VERSION }; }
}
function saveState() {
  try {
    localStorage.setItem(activeStoreKey(), JSON.stringify(state));
  } catch (e) {
    // Storage can throw if it's full or unavailable — surface it instead of silently
    // losing the tap (e.g. "Finish Exercise" looking like it worked but not persisting).
    alert('⚠️ Could not save — your device storage may be full. This change was NOT saved. Try freeing up space or exporting/clearing old data.');
  }
}
let state = loadState();

async function enableTestMode() {
  if (isTestMode()) return;
  const ok = await showConfirmModal('Enable Test Mode?\n\nThis switches to a separate copy of your data (starting from what you have now) so you can try anything — logging sets, editing exercises, resetting data — without touching your real progress. Exit anytime to go back.', { confirmLabel: 'Enable' });
  if (!ok) return;
  if (!localStorage.getItem(TEST_STORE_KEY)) {
    // First time entering test mode: seed it with a copy of real data, not a blank slate
    localStorage.setItem(TEST_STORE_KEY, localStorage.getItem(STORE_KEY) || JSON.stringify({ exercises:{}, history:[], prs:[], meta:{}, sessionStarts:{}, version: STATE_VERSION }));
  }

function getSetsMin(ex) { return ex.setsMin ?? ex.sets; }

const DEFAULT_FAIL_THRESHOLD = 3; // misses before a deload, unless overridden per-exercise in Manage

function getExState(ex) {
  if (!state.exercises[ex.id]) {
    if (ex.mode === 'weighted') {

    } else if (ex.mode === 'bodyweight') {

    } else if (ex.mode === 'weighted_bw') {

  }

function dateStr(d) {
  const date = new Date(d);
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Session starts are scoped per (calendar date + workout day label + session number),
// so doing two different workouts on the same date - or the SAME workout twice in one
// day - each get their own independent start time. Session 1 keeps the plain old key
// format for backward compatibility with existing saved data.
function sessionKey(dateKey, dayLabel, sessionNum = 1) {
  return sessionNum > 1 ? `${dateKey}__${dayLabel}__s${sessionNum}` : `${dateKey}__${dayLabel}`;
}

// How many times a given (date, workout) has been started. Used to know which
// session is "current" when the same workout is done more than once in a day.
function getSessionCount(dateKey, dayLabel) {
  state.sessionCount = state.sessionCount || {};
  return state.sessionCount[`${dateKey}__${dayLabel}`] || 0;
}

// If a workout starts shortly before midnight and continues past it, sets logged
// after midnight should still belong to the session that was already in progress,
// not silently start counting toward a brand-new "day" for streaks/duration/completion.
const SESSION_CARRYOVER_HOURS = 6;

function getActiveSessionDateKey(dayLabel) {
  const now = new Date();
  const todayKey = dateStr(now);
  state.sessionStarts = state.sessionStarts || {};
  const todayNum = getSessionCount(todayKey, dayLabel) || 1;
  if (state.sessionStarts[sessionKey(todayKey, dayLabel, todayNum)]) return todayKey;

  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayKey = dateStr(yesterday);
  const yesterdayNum = getSessionCount(yesterdayKey, dayLabel) || 1;
  const yesterdayStart = state.sessionStarts[sessionKey(yesterdayKey, dayLabel, yesterdayNum)];
  if (yesterdayStart && (now - new Date(yesterdayStart)) < SESSION_CARRYOVER_HOURS * 3600000) {
    return yesterdayKey; // still within the same overnight session
  }
  return todayKey;
}

// Full identity of the session currently relevant to this workout day: which calendar
// date it's anchored to, and which session-of-the-day it is (1 unless done again already).
function getActiveSession(dayLabel) {
  const anchorDate = getActiveSessionDateKey(dayLabel);
  const sessionNum = getSessionCount(anchorDate, dayLabel) || 1;
  return { anchorDate, sessionNum, key: sessionKey(anchorDate, dayLabel, sessionNum) };
}

// History entries store the real timestamp (for accurate ordering/history display) plus
// a separate sessionDate/sessionNum marking which session they were logged under. Older
// entries (from before this existed) fall back to their raw calendar date and session 1.
function getEntryDateKey(h) {
  return h.sessionDate || dateStr(h.date);
}
function getEntrySessionNum(h) {
  return h.sessionNum || 1;
}

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay()); // back to Sunday
  return dateStr(d);
}

const WEEKLY_MIN_DAYS = 3;

function getWeekWorkoutDayCount(weekKey) {
  const daysInWeek = new Set(
    state.history.filter(h => getWeekKey(h.date) === weekKey).map(h => getEntryDateKey(h))
  );
  return daysInWeek.size;
}

function computeStreak() {
  let cursorWeek = getWeekKey(new Date());
  if (getWeekWorkoutDayCount(cursorWeek) < WEEKLY_MIN_DAYS) {
    const d = new Date(cursorWeek);
    d.setDate(d.getDate() - 7);
    cursorWeek = getWeekKey(d); // grace: this week isn't over yet, don't count it as a break
  }
  let count = 0;
  while (getWeekWorkoutDayCount(cursorWeek) >= WEEKLY_MIN_DAYS) {
    count++;
    const d = new Date(cursorWeek);
    d.setDate(d.getDate() - 7);
    cursorWeek = getWeekKey(d);
  }
  return count;
}

function getHistoricalMax(exName, mode) {
  const entries = state.history.filter(h => h.exercise === exName);
  if (entries.length === 0) return null;
  if (mode === 'weighted' || mode === 'weighted_bw') {
    return Math.max(...entries.map(h => h.weight ?? 0));
  }
  return Math.max(...entries.map(h => Math.max(...h.sets)));
}

// Epley estimated 1-rep-max: folds the weight actually used together with the best
// reps hit that session, so progress still shows up between equipment weight increases
// (reps climb for a while before the weight tier does). For weighted_bw exercises this
// is based on the added belt weight only — bodyweight itself isn't tracked, so it's a
// relative-progress number rather than a true 1RM.
function estimate1RM(weight, reps) {
  if (!weight || !reps) return 0;
  return Math.round(weight * (1 + reps / 30));
}

// How long ago the current all-time best for this exercise was last hit (not
// necessarily the first time — the most recent time you touched that ceiling).
function getDaysSinceLastPR(exName, mode) {
  const entries = state.history.filter(h => h.exercise === exName && !h.skipped);
  if (!entries.length) return null;
  const valueOf = h => (mode === 'weighted' || mode === 'weighted_bw') ? (h.weight ?? 0) : Math.max(...h.sets);
  const best = Math.max(...entries.map(valueOf));
  const bestTimes = entries.filter(h => valueOf(h) === best).map(h => new Date(h.date).getTime());
  return Math.floor((Date.now() - Math.max(...bestTimes)) / 86400000);
}

function formatDaysAgo(days) {
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  return `${days}d ago`;
}

function formatDuration(mins) {
  if (!mins) return '0 min';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}

// Every distinct workout session ever logged (date + day-type + session-of-day number),
// deduplicated the same way the History tab does.
function getAllUniqueSessions() {
  const seen = new Map();
  state.history.forEach(h => {
    const dk = getEntryDateKey(h);
    const num = getEntrySessionNum(h);
    const key = sessionKey(dk, h.day, num);
    if (!seen.has(key)) seen.set(key, { dateKey: dk, dayLabel: h.day, sessionNum: num });
  });
  return [...seen.values()];
}

function getMonthlySessionCounts(monthsBack = 6) {
  const counts = {};
  getAllUniqueSessions().forEach(({ dateKey }) => {
    const monthKey = dateKey.slice(0, 7);
    counts[monthKey] = (counts[monthKey] || 0) + 1;
  });
  const result = [];
  const now = new Date();
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    result.push({ key, label: d.toLocaleString('default', { month: 'short' }), count: counts[key] || 0 });
  }
  return result;
}

// Sessions per workout day-type in the last N days — flags a day/muscle-group that's
// quietly been skipped while a rotation keeps moving forward.
function getRecentDayFrequency(daysBack = 30) {
  const cutoff = Date.now() - daysBack * 86400000;
  const sessions = getAllUniqueSessions().filter(s => new Date(s.dateKey).getTime() >= cutoff);
  return DAYS.map(d => ({
    label: d.label,
    icon: d.icon,
    color: d.color,
    count: sessions.filter(s => s.dayLabel === d.label).length
  }));
}

function recordPR(exName, value, unit) {
  state.prs = state.prs || [];
  state.prs.unshift({ date: new Date().toISOString(), exercise: exName, value, unit });
  state.prs = state.prs.slice(0, 20);
}

function getSessionDuration(dateKey, dayLabel, sessionNum = 1) {
  const entries = state.history.filter(h => getEntryDateKey(h) === dateKey && h.day === dayLabel && getEntrySessionNum(h) === sessionNum);
  const sessionStart = state.sessionStarts && state.sessionStarts[sessionKey(dateKey, dayLabel, sessionNum)];

  if (entries.length === 0) return null;
  if (entries.length < 2 && !sessionStart) return null; // not enough data to estimate at all

  const times = entries.map(h => new Date(h.date).getTime());
  let startTime = Math.min(...times);
  const endTime = Math.max(...times);

  if (sessionStart) {
    const capturedStart = new Date(sessionStart).getTime();
    startTime = Math.min(startTime, capturedStart); // use whichever is earlier
  }

  const mins = Math.round((endTime - startTime) / 60000);
  return mins > 0 ? mins : null;
}

function getTodayCompletionPct(day) {
  if (!day.exercises.length) return 0;
  const { anchorDate, sessionNum } = getActiveSession(day.label);
  const doneToday = new Set(
    state.history.filter(h => getEntryDateKey(h) === anchorDate && h.day === day.label && getEntrySessionNum(h) === sessionNum).map(h => h.exercise)
  );
  return Math.round((doneToday.size / day.exercises.length) * 100);
}

  if (dateStr(last.date) === dateStr(new Date())) return lastDayIdx; // continue today's in-progress session
  return (lastDayIdx + 1) % DAYS.length; // move to next day in the rotation
}

// Content-anchored scroll preservation: instead of remembering a raw pixel
// offset (which breaks when switching to a day with more/fewer exercises and
// therefore a different page length), we remember WHICH card was at the top
// of the viewport and how far scrolled into it we were, then restore relative
// to that same card after the switch. This keeps you looking at the same
// section (e.g. the chart) even if everything above it changed height.
const PROGRESS_SCROLL_ANCHORS = ['pcard-overview','pcard-prs','pcard-balance','pcard-bests','pcard-duration','pcard-progression'];

function captureScrollAnchor() {
  const HEADER_BUFFER = 90; // roughly the height of the sticky header/tab bar
  let best = null;
  for (const id of PROGRESS_SCROLL_ANCHORS) {
    const el = document.getElementById(id);
    if (!el) continue;
    const top = el.getBoundingClientRect().top;
    if (top <= HEADER_BUFFER) {
      best = { id, offsetFromTop: top }; // keep overwriting; last match = closest to top
    } else if (best === null) {
      // Nothing has scrolled past the header yet — anchor to the first card we can find
      best = { id, offsetFromTop: top };
      break;
    }
  }
  return best;
}

function restoreScrollAnchor(anchor) {
  if (!anchor) return;
  const el = document.getElementById(anchor.id);
  if (!el) return;
  const newTop = el.getBoundingClientRect().top;
  const delta = newTop - anchor.offsetFromTop;
  window.scrollTo(0, window.scrollY + delta);
}

function renderPreservingScroll() {
  const anchor = captureScrollAnchor();
  render();
  restoreScrollAnchor(anchor);
}

function setChartMetric(m) {

// ---------- ESCAPING ----------
// Names/notes come from prompt()/inputs and get interpolated straight into
// rendered HTML strings — escape them so stray < > & " ' can't break layout
// (or, for a shared/imported backup file, inject markup).
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ---------- IN-APP MODAL (replaces browser confirm()/prompt() for key flows) ----------
// A single themed overlay used for confirmations and the "type to confirm" reset flow,
// so these moments look like the rest of the app instead of a jarring native dialog.
let modalResolver = null;

function showConfirmModal(message, { danger = false, confirmLabel = 'Confirm' } = {}) {
  return new Promise(resolve => {
    modalResolver = resolve;
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this) resolveModal(false)">
        <div class="modal-box">
          <div class="modal-msg">${escapeHtml(message)}</div>
          <div class="modal-actions">
            <button class="btn secondary" onclick="resolveModal(false)">Cancel</button>
            <button class="btn ${danger ? 'danger' : ''}" onclick="resolveModal(true)">${escapeHtml(confirmLabel)}</button>
          </div>
        </div>
      </div>`;
  });
}

function showTypedConfirmModal(message, requiredText, { confirmLabel = 'Confirm' } = {}) {
  return new Promise(resolve => {
    modalResolver = resolve;
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this) resolveModal(false)">
        <div class="modal-box">
          <div class="modal-msg">${escapeHtml(message)}</div>
          <input id="modalTypedInput" type="text" placeholder="Type ${escapeHtml(requiredText)}" style="width:100%; margin-top:10px;" autocapitalize="off" autocorrect="off">
          <div class="modal-actions">
            <button class="btn secondary" onclick="resolveModal(false)">Cancel</button>
            <button class="btn danger" onclick="resolveModal(document.getElementById('modalTypedInput').value === '${requiredText}')">${escapeHtml(confirmLabel)}</button>
          </div>
        </div>

    setTimeout(() => { const el = document.getElementById('modalTypedInput'); if (el) el.focus(); }, 50);

function resolveModal(result) {

}

// ---------- SWIPE NAVIGATION (switch day/group by swiping left/right) ----------
let swipeStartX = null, swipeStartY = null, swipeStartTime = 0;
const SWIPE_MIN_DX = 45;       // minimum horizontal travel to count as a deliberate swipe
const SWIPE_MAX_DY = 70;       // more vertical travel than this means it's a scroll, not a swipe
const SWIPE_TIME_LIMIT = 700;  // ms — ignore slow drags

function handleSwipeStart(e) {
  if (e.touches.length !== 1) { swipeStartX = null; return; }
  // Don't hijack swipes that start on the horizontally-scrollable tab strip itself,
  // or inside a form field / the expanded exercise editor / the always-visible
  // Add Exercise form — accidentally swiping mid-type would otherwise wipe out
  // whatever you'd entered, since switching days re-renders the whole screen.
  if (e.target.closest('.tabs, input, select, textarea, [data-no-swipe]')) { swipeStartX = null; return; }
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swipeStartTime = Date.now();
}

function handleSwipeEnd(e) {
  if (swipeStartX === null) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStartX;
  const dy = t.clientY - swipeStartY;
  const dt = Date.now() - swipeStartTime;
  swipeStartX = null;
  if (dt > SWIPE_TIME_LIMIT) return;
  if (Math.abs(dx) < SWIPE_MIN_DX) return;
  if (Math.abs(dy) > SWIPE_MAX_DY) return;
  if (Math.abs(dx) < Math.abs(dy)) return; // predominantly vertical -> treat as scroll

  const direction = dx < 0 ? 1 : -1; // swipe left = next day, swipe right = previous day
  if (view === 'workout') {
    const next = (currentDayIdx + direction + DAYS.length) % DAYS.length; // wrap around at both ends
    selectDay(next);
  } else if (view === 'progress') {
    const next = (progressDayIdx + direction + DAYS.length) % DAYS.length; // wrap around at both ends
    selectProgressDay(next);
  } else if (view === 'manage') {
    const next = (currentDayIdx + direction + DAYS.length) % DAYS.length; // wrap around at both ends
    expandedExerciseId = null; // collapse any open edit card so the new day starts tidy
    selectDay(next);
  }
}

// Attach once to the stable #app container (its innerHTML is replaced on render,
// but the element itself persists, so the listeners keep working).
document.getElementById('app').addEventListener('touchstart', handleSwipeStart, { passive: true });

  const ex = getExerciseById(exId);
  const exName = ex ? ex.name : 'this exercise';
  const ok = await showConfirmModal(`Skip ${exName} for today? No progress or history will be recorded.`, { confirmLabel: 'Skip' });
  if (!ok) return;
  delete liveSets[exId];
  render();
  setTimeout(scrollToNextIncomplete, 100);
}

function adjustWeightLive(exId, direction) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const s = getExState(ex);
  if (ex.mode === 'weighted') {
    const newTier = Math.min(Math.max(s.tier + direction, 0), WEIGHTS.length - 1);
    if (newTier === s.tier) { alert(direction > 0 ? 'Already at your heaviest dumbbell.' : 'Already at your lightest dumbbell.'); return; }
    s.tier = newTier;
  } else if (ex.mode === 'weighted_bw') {
    const newWeight = Math.max(0, s.addedWeight + direction * BELT_INCREMENT);
    if (newWeight === s.addedWeight) { alert('Already at bodyweight (0 lb belt).'); return; }
    s.addedWeight = newWeight;
  } else return;
  saveState();
  if (navigator.vibrate) navigator.vibrate(15);
  render();
}

function adjustSetsLive(exId, direction) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  const s = getExState(ex);
  const arr = liveSets[exId];

  if (ex.mode === 'weighted' || ex.mode === 'weighted_bw') {
    const min = getSetsMin(ex), max = getSetsMax(ex);
    const newSets = Math.min(Math.max(s.sets + direction, min), max);
    if (newSets === s.sets) { alert(direction > 0 ? `Sets ceiling is ${max} (change it in Manage → Sets/Reps if you want higher).` : `Sets floor is ${min}.`); return; }
    s.sets = newSets;
  } else {
    const newSets = Math.max(1, ex.sets + direction);
    if (newSets === ex.sets) { alert('Minimum is 1 set.'); return; }
    ex.sets = newSets;
    persistDays();
  }

  if (arr) {
    const target = getTargetValue(ex);
    if (direction > 0) arr.push({ value: target, doneMark: false });
    else if (direction < 0 && arr.length > 1) arr.pop();
  }
  saveState();
  if (navigator.vibrate) navigator.vibrate(15);
  render();
}

function startWorkoutNow() {
  const today = dateStr(new Date());
  const dayLabel = DAYS[currentDayIdx].label;
  const countKey = `${today}__${dayLabel}`;
  state.sessionCount = state.sessionCount || {};
  state.sessionCount[countKey] = (state.sessionCount[countKey] || 0) + 1;
  state.sessionStarts = state.sessionStarts || {};
  state.sessionStarts[sessionKey(today, dayLabel, state.sessionCount[countKey])] = new Date().toISOString();
  saveState();
  if (navigator.vibrate) navigator.vibrate(20);
  render();
}

function markSessionStartIfNeeded() {
  const dayLabel = DAYS[currentDayIdx].label;
  const { anchorDate, sessionNum, key } = getActiveSession(dayLabel);
  state.sessionStarts = state.sessionStarts || {};
  if (!state.sessionStarts[key]) {
    // Subtract 2 minutes to account for the time spent actually performing this first set,
    // which happened before this "done" tap and would otherwise go uncounted.
    state.sessionStarts[key] = new Date(Date.now() - 2 * 60000).toISOString();
    // If this is the very first set of a brand-new (not-yet-started) session, also
    // register the session count so later lookups agree on which session this is.
    const countKey = `${anchorDate}__${dayLabel}`;
    state.sessionCount = state.sessionCount || {};
    if (!state.sessionCount[countKey]) state.sessionCount[countKey] = sessionNum;
    saveState();
  }
}

function markSetDone(exId, setIdx) {
  const arr = liveSets[exId];
  const set = arr[setIdx];
  set.doneMark = !set.doneMark;
  if (set.doneMark) {
    startTimerFor(exId);
    markSessionStartIfNeeded();
    if (navigator.vibrate) navigator.vibrate(15);
  } else {
    clearInterval(timerInterval);
    const fab = document.getElementById('timerFab');
    fab.style.display = 'none';
    fab.classList.remove('urgent');
  }
  render();

  const allDone = arr.every(x => x.doneMark);
  if (allDone) {
    const ex = getExerciseById(exId);
    setTimeout(() => { if (ex) finishExercise(ex); }, 250); // brief pause so the green "done" state is visible first
  }
}

let holdZeroTimer = null;
let holdZeroFired = false;

function startHoldZero(exId, setIdx) {
  holdZeroFired = false;
  holdZeroTimer = setTimeout(() => {
    holdZeroFired = true;
    const arr = liveSets[exId];
    arr[setIdx].value = 0;
    if (navigator.vibrate) navigator.vibrate([20,30,20]);
    render();
  }, 450);
}

function endHoldZero(exId, setIdx, delta) {
  clearTimeout(holdZeroTimer);
  if (!holdZeroFired) adjustSet(exId, setIdx, delta); // was a normal quick tap
}

function cancelHoldZero() {
  clearTimeout(holdZeroTimer);
}

function adjustSet(exId, setIdx, delta) {
  const arr = liveSets[exId];
  arr[setIdx].value = Math.max(0, arr[setIdx].value + delta);
  if (navigator.vibrate) navigator.vibrate(15);
  render();
}

function typeSet(exId, setIdx) {
  const arr = liveSets[exId];
  const current = arr[setIdx].value;
  const input = prompt('Enter actual value:', current);
  if (input === null) return;
  const n = parseInt(input);
  if (!isNaN(n)) arr[setIdx].value = Math.max(0, n);
  render();
}

function targetLabel(ex) {
  const s = getExState(ex);
  if (ex.mode === 'weighted') return `${WEIGHTS[s.tier]} lb x ${s.targetReps} reps x ${s.sets} sets`;
  if (ex.mode === 'weighted_bw') return (s.addedWeight > 0 ? `Bodyweight +${s.addedWeight} lb` : `Bodyweight`) + ` x ${s.targetReps} reps x ${s.sets} sets`;
  if (ex.mode === 'bodyweight') return `Bodyweight x ${s.targetReps} reps`;
  if (ex.mode === 'timed') return `Hold ${s.targetSeconds}s`;
}

function finishExercise(ex) {
  const arr = liveSets[ex.id];
  if (!arr) { alert('Nothing to log yet.'); return; }
  const s = getExState(ex);
  // Snapshot for undo: everything finishExercise is about to mutate.
  const undoSnapshot = {
    exState: JSON.parse(JSON.stringify(s)),
    historyLen: state.history.length,
    prsLen: (state.prs || []).length,
    liveArr: JSON.parse(JSON.stringify(arr))
  };
  const hasSkippedSet = arr.some(x => x.value === 0);
  let success;
  if (ex.mode === 'timed') {
    success = arr.every(x => x.value >= s.targetSeconds);
  } else {
    success = arr.every(x => x.value >= s.targetReps);
  }

  let statusMsg = '';
  let leveledUp = false;

  if (hasSkippedSet) {
    statusMsg = 'Set(s) logged as 0 (skipped) — progression left unchanged this session.';
  } else if (ex.mode === 'weighted') {
    const setsMax = getSetsMax(ex), setsMin = getSetsMin(ex);
    const repInc = getRepIncrement(ex);
    const failThresh = getFailThreshold(ex);
    if (success) {
      s.failStreak = 0;
      if (s.targetReps < ex.repHigh) { s.targetReps = Math.min(s.targetReps + repInc, ex.repHigh); statusMsg = `Progress: +${repInc} rep(s) next time`; }
      else if (s.sets < setsMax) { s.sets++; s.targetReps = ex.repLow; statusMsg = `Added a set! Now ${s.sets} sets next time`; }
      else if (s.tier < WEIGHTS.length - 1) { s.tier++; s.sets = setsMin; s.targetReps = ex.repLow; statusMsg = `Weight up! Next: ${WEIGHTS[s.tier]} lb, back to ${setsMin} sets`; leveledUp = true; }
      else { statusMsg = 'Maxed out dumbbells and sets — try slower tempo instead.'; }
    } else {
      s.failStreak++;
      if (s.failStreak >= failThresh) {
        s.failStreak = 0;
        if (s.targetReps > ex.repLow) { s.targetReps = Math.max(ex.repLow, s.targetReps - repInc); statusMsg = `Deload: -${repInc} rep(s)`; }
        else if (s.sets > setsMin) { s.sets--; s.targetReps = ex.repLow; statusMsg = 'Deload: removed a set'; }
        else if (s.tier > 0) { s.tier--; s.sets = setsMin; s.targetReps = ex.repLow; statusMsg = 'Deload: dropped a weight tier'; }
      } else {
        statusMsg = `Missed target (${s.failStreak}/${failThresh} before deload)`;
      }
    }
  } else if (ex.mode === 'weighted_bw') {
    const setsMax = getSetsMax(ex), setsMin = getSetsMin(ex);
    const repInc = getRepIncrement(ex);
    const failThresh = getFailThreshold(ex);
    if (success) {
      s.failStreak = 0;
      if (s.targetReps < ex.repHigh) { s.targetReps = Math.min(s.targetReps + repInc, ex.repHigh); statusMsg = `Progress: +${repInc} rep(s) next time`; }
      else if (s.sets < setsMax) { s.sets++; s.targetReps = ex.repLow; statusMsg = `Added a set! Now ${s.sets} sets next time`; }
      else { s.addedWeight += BELT_INCREMENT; s.sets = setsMin; s.targetReps = ex.repLow; statusMsg = `Belt up! Add ${s.addedWeight} lb next time, back to ${setsMin} sets`; leveledUp = true; }
    } else {
      s.failStreak++;
      if (s.failStreak >= failThresh) {
        s.failStreak = 0;
        if (s.targetReps > ex.repLow) { s.targetReps = Math.max(ex.repLow, s.targetReps - repInc); statusMsg = `Deload: -${repInc} rep(s)`; }
        else if (s.sets > setsMin) { s.sets--; s.targetReps = ex.repLow; statusMsg = 'Deload: removed a set'; }
        else if (s.addedWeight > 0) { s.addedWeight = Math.max(0, s.addedWeight - BELT_INCREMENT); s.sets = setsMin; s.targetReps = ex.repLow; statusMsg = 'Deload: removed belt weight'; }
      } else {
        statusMsg = `Missed target (${s.failStreak}/${failThresh} before deload)`;
      }
    }
  } else if (ex.mode === 'bodyweight') {
    const failThresh = getFailThreshold(ex);
    if (success) { s.failStreak = 0; s.targetReps++; statusMsg = 'Progress: +1 rep next time'; }
    else {
      s.failStreak++;
      if (s.failStreak >= failThresh) { s.failStreak = 0; s.targetReps = Math.max(1, s.targetReps - 2); statusMsg = 'Deload: -2 reps'; }
      else statusMsg = `Missed target (${s.failStreak}/${failThresh} before deload)`;
    }
  } else if (ex.mode === 'timed') {
    const failThresh = getFailThreshold(ex);
    if (success) { s.failStreak = 0; s.targetSeconds += 10; statusMsg = 'Progress: +10 sec next time'; }
    else {
      s.failStreak++;
      if (s.failStreak >= failThresh) { s.failStreak = 0; s.targetSeconds = Math.max(15, s.targetSeconds - 10); statusMsg = 'Deload: -10 sec'; }
      else statusMsg = `Missed target (${s.failStreak}/${failThresh} before deload)`;
    }
  }

  const prevMax = getHistoricalMax(ex.name, ex.mode);
  const sessionBest = ex.mode === 'weighted' ? WEIGHTS[s.tier]
    : ex.mode === 'weighted_bw' ? s.addedWeight
    : Math.max(...arr.map(x => x.value));
  const isPR = !hasSkippedSet && prevMax !== null && sessionBest > prevMax;

  const activeSession = getActiveSession(DAYS[currentDayIdx].label);
  state.history.push({
    date: new Date().toISOString(),
    sessionDate: activeSession.anchorDate,
    sessionNum: activeSession.sessionNum,
    day: DAYS[currentDayIdx].label,
    exercise: ex.name,
    mode: ex.mode,
    sets: arr.map(x => x.value),
    weight: ex.mode === 'weighted' ? WEIGHTS[s.tier] : (ex.mode === 'weighted_bw' ? s.addedWeight : null),
    success,
    skipped: hasSkippedSet
  });
  if (isPR) {
    const unit = (ex.mode === 'weighted' || ex.mode === 'weighted_bw') ? 'lb' : (ex.mode === 'timed' ? 'sec' : 'reps');
    recordPR(ex.name, sessionBest, unit);
  }
  saveState();
  delete liveSets[ex.id];
  maybePromptBackup();
  render();
  showToast(`${ex.name}: ${statusMsg}${isPR ? ' · 🏆 New PR!' : ''}`, {
    actionLabel: 'Undo',
    onAction: () => undoFinishExercise(ex.id, undoSnapshot),
    duration: 6000
  });
  const dayHasMoreToday = DAYS[currentDayIdx].exercises.some(e => !isDoneToday(e.name, DAYS[currentDayIdx].label));
  if (dayHasMoreToday) {
    startRestTimer(ex.transitionRest ?? TRANSITION_REST_SECONDS); // rest before moving to the next exercise
  }
  setTimeout(scrollToNextIncomplete, 100);
  if (leveledUp) {
    const el = document.getElementById(`card-${ex.id}`);
    if (el) {
      el.classList.add('levelup');
      setTimeout(() => el.classList.remove('levelup'), 1000);
    }
  }
}

// Reverts everything finishExercise() changed for this one exercise: progression
// state, the history/PR entries it appended, and puts the in-progress sets back
// on screen so you can re-log them. Available for ~6s via the toast's Undo button.
// Note: if Drive auto-sync fires during that window, it could sync the pre-undo
// version — harmless, since the next sync corrects it, but not instantaneous.
function undoFinishExercise(exId, snapshot) {
  const ex = getExerciseById(exId);
  if (!ex) return;
  state.exercises[exId] = snapshot.exState;
  state.history.length = snapshot.historyLen;
  if (state.prs) state.prs.length = snapshot.prsLen;
  liveSets[exId] = snapshot.liveArr;
  saveState();
  clearInterval(timerInterval);
  const fab = document.getElementById('timerFab');
  if (fab) fab.style.display = 'none';
  render();
  showToast(`Undid "${ex.name}" — sets restored.`);
}

// ---------- REST TIMER ----------
let restRemaining = 0;
function startRestTimer(seconds) {
  clearInterval(timerInterval);
  restRemaining = seconds;
  const fab = document.getElementById('timerFab');
  fab.style.display = 'flex';
  fab.classList.remove('urgent');
  updateFab();
  timerInterval = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      clearInterval(timerInterval);
      fab.style.display = 'none';
      fab.classList.remove('urgent');
      finalAlarm();
    } else {
      updateFab();
      if (restRemaining <= 5) {
        fab.classList.add('urgent');
        countdownTick();
      }
    }
  }, 1000);
}
function updateFab() {
  const fab = document.getElementById('timerFab');
  const m = Math.floor(restRemaining/60), s = restRemaining%60;
  fab.innerHTML = `<span class="fablabel">REST</span>${m}:${s.toString().padStart(2,'0')}`;
}
function skipTimer() {
  clearInterval(timerInterval);
  const fab = document.getElementById('timerFab');
  fab.style.display = 'none';
  fab.classList.remove('urgent');
}
function beep(freq, gain, durationMs, type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type || 'square';
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq; g.gain.value = gain;
    o.start(); setTimeout(() => { o.stop(); ctx.close(); }, durationMs);
  } catch(e) {}
}
function countdownTick() {
  // Sharp, loud tick each second for the final 5-second countdown
  beep(1046, 0.55, 150, 'square');
  if (navigator.vibrate) navigator.vibrate(180);
}
function finalAlarm() {
  // Loud, long, repeated alarm signaling rest is fully over
  const pattern = [500,150,500,150,500,150,500,150,700];
  if (navigator.vibrate) navigator.vibrate(pattern);
  let i = 0;
  const alarmInterval = setInterval(() => {
    beep(i % 2 === 0 ? 1318 : 988, 0.85, 350, 'square');
    i++;
    if (i >= 5) clearInterval(alarmInterval);
  }, 400);
}

// ---------- RENDER ----------
function render() {
  const app = document.getElementById('app');
  if (view === 'workout') app.innerHTML = renderWorkout();
  else if (view === 'progress') app.innerHTML = renderProgress();
  else if (view === 'manage') app.innerHTML = renderManage();
  else app.innerHTML = renderHistory();

  if (view === 'progress') setTimeout(renderCharts, 0);
  requestAnimationFrame(scrollActiveTabsIntoView);
}

// Keeps the currently-selected pill scrolled into view within its (horizontally
// scrollable) tab strip — e.g. after a swipe moves the selection off-screen.
function scrollTabIntoView(containerId, idx) {
  const container = document.getElementById(containerId);
  if (!container || idx < 0) return;
  const child = container.children[idx];
  if (child) child.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
}

function scrollActiveTabsIntoView() {
  if (view === 'workout') {
    scrollTabIntoView('workoutDayTabs', currentDayIdx);
  } else if (view === 'progress') {
    scrollTabIntoView('progressDayTabs', progressDayIdx);
    const progDay = DAYS[progressDayIdx];
    const exIdx = progDay ? progDay.exercises.findIndex(e => e.id === progressExerciseId) : -1;
    scrollTabIntoView('progressExerciseTabs', exIdx);
  }
}

function renderWorkout() {
  const tabs = DAYS.map((d,i) => {
    const pct = getTodayCompletionPct(d);
    const active = i === currentDayIdx;
    const tabStyle = active ? `background:${d.color}; color:#fff;` : '';
    const todayKey = dateStr(new Date());
    const sessionsToday = getSessionCount(todayKey, d.label);
    const sessionTag = sessionsToday > 1 ? `<span class="badge" style="padding:1px 6px; font-size:9.5px;">×${sessionsToday}</span>` : '';
    return `<div class="tab" style="${tabStyle}" onclick="selectDay(${i})">
      ${d.icon} ${escapeHtml(d.label)} ${sessionTag}
      <span class="ring" style="background: conic-gradient(${d.color} ${pct*3.6}deg, var(--ring-track) 0deg)"><span class="ring-inner">${pct === 100 ? '✓' : ''}</span></span>
    </div>`;
  }).join('');

  const streakEl = document.getElementById('streakBadge');
  if (streakEl) {
    const streak = computeStreak();
    const thisWeek = getWeekWorkoutDayCount(getWeekKey(new Date()));
    const weekPart = `${thisWeek}/${DAYS.length} days this week`;
    streakEl.textContent = streak > 0 ? `🔥 ${streak} week streak · ${weekPart}` : weekPart;
  }

  const day = DAYS[currentDayIdx];
  const activeSessionInfo = getActiveSession(day.label);
  const sessionStart = state.sessionStarts && state.sessionStarts[activeSessionInfo.key];
  const sessionComplete = sessionStart && getTodayCompletionPct(day) === 100;
  const startedLabel = sessionStart
    ? `✅ Started at ${new Date(sessionStart).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}${activeSessionInfo.sessionNum > 1 ? ` (session ${activeSessionInfo.sessionNum})` : ''}`
    : '';
  const startBar = !sessionStart
    ? `<div class="card" style="text-align:center; padding:10px;">
        <button class="btn" onclick="startWorkoutNow()" style="width:100%;">▶ Begin Workout</button>
        <div class="meta" style="margin-top:6px; margin-bottom:0;">Tap when you walk in for the most accurate session time</div>
      </div>`
    : sessionComplete
      ? `<div class="card" style="text-align:center; padding:10px;">
          <span class="badge up">${startedLabel}</span>
          <div style="margin-top:8px;"><button class="btn small secondary" onclick="startWorkoutNow()">↻ Start Another Session Today</button></div>
        </div>`
      : `<div class="card" style="text-align:center; padding:10px;"><span class="badge up">${startedLabel}</span></div>`;

  const cards = day.exercises.map(ex => {
    const s = getExState(ex);
    const arr = ensureLive(ex);
    const step = ex.mode === 'timed' ? 5 : 1;
    const setsHtml = arr.map((set, i) => {
      return `<div class="setbox ${set.doneMark?'done':''}">
        <button class="stepbtn"
          onpointerdown="startHoldZero('${ex.id}', ${i})"
          onpointerup="endHoldZero('${ex.id}', ${i}, -${step})"
          onpointerleave="cancelHoldZero()"
          onpointercancel="cancelHoldZero()">−</button>
        <span class="setval" onclick="typeSet('${ex.id}', ${i})">${set.value}</span>
        <button class="stepbtn" onclick="adjustSet('${ex.id}', ${i}, ${step})">+</button>
        <button class="donebtn" onclick="markSetDone('${ex.id}', ${i})">${set.doneMark?'✓':'Done'}</button>
      </div>`;
    }).join('');

    const failThresh = getFailThreshold(ex);
    const badge = s.failStreak > 0 ? `<span class="badge deload">${s.failStreak}/${failThresh} missed</span>` : `<span class="badge up">on track</span>`;
    const doneToday = isDoneToday(ex.name, day.label);

    const weightControl = (ex.mode === 'weighted' || ex.mode === 'weighted_bw')
      ? `<div class="livectrl">
          <span class="livectrl-label">Weight</span>
          <button class="stepbtn" onclick="adjustWeightLive('${ex.id}', -1)">−</button>
          <span class="livectrl-val">${ex.mode === 'weighted' ? WEIGHTS[s.tier] + ' lb' : (s.addedWeight > 0 ? '+' + s.addedWeight + ' lb' : 'BW')}</span>
          <button class="stepbtn" onclick="adjustWeightLive('${ex.id}', 1)">+</button>
        </div>` : '';

    const setsControl = `<div class="livectrl">
          <span class="livectrl-label">Sets</span>
          <button class="stepbtn" onclick="adjustSetsLive('${ex.id}', -1)">−</button>
          <span class="livectrl-val">${(ex.mode === 'weighted' || ex.mode === 'weighted_bw') ? s.sets : ex.sets}</span>
          <button class="stepbtn" onclick="adjustSetsLive('${ex.id}', 1)">+</button>
        </div>`;

    return `<div class="card ${doneToday?'done-today':''}" style="border-left:3px solid ${day.color};" id="card-${ex.id}">
      <div class="row"><h3>${doneToday?'✅ ':''}${escapeHtml(ex.name)}</h3>${badge}</div>
      <div class="meta">Target: ${targetLabel(ex)}</div>
      <div class="row" style="margin-bottom:10px; gap:16px;">${weightControl}${setsControl}</div>
      <div class="sets">${setsHtml}</div>
      <div class="row" style="margin-top:10px;">
        <button class="btn small secondary" onclick="matchSet1('${ex.id}')">Match set 1</button>
        <button class="btn small secondary" onclick="skipExercise('${ex.id}')">Skip</button>
        <button class="btn small" onclick="finishExercise(DAYS[${currentDayIdx}].exercises.find(e=>e.id==='${ex.id}'))">Finish</button>
      </div>
    </div>`;
  }).join('');

  const pct = getTodayCompletionPct(day);
  const completeBanner = pct === 100
    ? `<div class="card complete-banner">🎉 ${escapeHtml(day.label)} workout completed!</div>`
    : '';

  return `<div class="tabs" id="workoutDayTabs">${tabs}</div><main>${startBar}${completeBanner}${cards}</main>`;
}

function getMuscleGroupDurationStats(dayLabel) {
  const seen = new Map();
  state.history.filter(h => h.day === dayLabel).forEach(h => {
    const dk = getEntryDateKey(h);
    const num = getEntrySessionNum(h);
    const key = dk + '__s' + num;
    if (!seen.has(key)) seen.set(key, { dateKey: dk, sessionNum: num });
  });
  const sessions = [...seen.values()].sort((a,b) => a.dateKey.localeCompare(b.dateKey) || a.sessionNum - b.sessionNum);
  const durationsWithDate = sessions.map(({dateKey, sessionNum}) => {
    const entries = state.history.filter(h => getEntryDateKey(h) === dateKey && h.day === dayLabel && getEntrySessionNum(h) === sessionNum);
    if (entries.length < 2) return null;
    const times = entries.map(h => new Date(h.date).getTime());
    return { date: dateKey, mins: Math.round((Math.max(...times) - Math.min(...times)) / 60000) };
  }).filter(d => d != null);
  if (durationsWithDate.length === 0) return null;
  const durations = durationsWithDate.map(d => d.mins);
  const mean = Math.round(durations.reduce((a,b) => a+b, 0) / durations.length);
  const last = durationsWithDate[durationsWithDate.length - 1];
  return { mean, min: Math.min(...durations), max: Math.max(...durations), count: durations.length, last: last.mins, lastDate: last.date };
}

function getOverviewStats() {
  const totalSessions = new Set(state.history.map(h => `${h.sessionDate || dateStr(h.date)}::${h.day}::${h.sessionNum || 1}`)).size;
  const totalVolume = state.history.reduce((sum, h) => {
    if (h.weight && !h.skipped) return sum + h.weight * h.sets.reduce((a,b) => a+b, 0);
    return sum;
  }, 0);
  const exercisesTracked = new Set(state.history.map(h => h.exercise)).size;
  const thisMonthKey = dateStr(new Date()).slice(0,7);
  const thisMonthSessions = new Set(
    state.history.filter(h => (h.sessionDate || dateStr(h.date)).startsWith(thisMonthKey))
      .map(h => `${h.sessionDate || dateStr(h.date)}::${h.day}::${h.sessionNum || 1}`)
  ).size;

  let totalTimeMinutes = 0, timedSessionCount = 0;
  getAllUniqueSessions().forEach(({dateKey, dayLabel, sessionNum}) => {
    const mins = getSessionDuration(dateKey, dayLabel, sessionNum);
    if (mins != null) { totalTimeMinutes += mins; timedSessionCount++; }
  });
  const avgSessionMinutes = timedSessionCount ? Math.round(totalTimeMinutes / timedSessionCount) : null;

  return { totalSessions, totalVolume: Math.round(totalVolume), exercisesTracked, thisMonthSessions, totalTimeMinutes, avgSessionMinutes };
}

function getAllTimeBests(day) {
  return day.exercises.map(ex => {
    const best = getHistoricalMax(ex.name, ex.mode);
    if (best === null) return null;
    const unit = (ex.mode === 'weighted' || ex.mode === 'weighted_bw') ? 'lb' : (ex.mode === 'timed' ? 'sec' : 'reps');
    const daysSince = getDaysSinceLastPR(ex.name, ex.mode);
    return { name: ex.name, best, unit, daysSince };
  }).filter(Boolean);
}

let chartRef = null;
function renderCharts() {
  const ex = getExerciseById(progressExerciseId);
  const predEl = document.getElementById('predictionText');
  const canvas = document.getElementById('progressChart');
  if (!ex) {
    if (predEl) predEl.textContent = 'Add an exercise to this day to see progression.';
    if (chartRef) { chartRef.destroy(); chartRef = null; }
    return;
  }
  if (typeof Chart === 'undefined') {
    if (predEl) predEl.textContent = 'Charts need internet the first time to load (they\u2019re cached offline after that).';
    if (canvas) canvas.style.display = 'none';
    return;
  }

  const supportsWeight = ex.mode === 'weighted' || ex.mode === 'weighted_bw';
  const isVolumeMode = chartMetric === 'volume' && supportsWeight;
  const isE1rmMode = chartMetric === 'e1rm' && supportsWeight;

  const rangeDays = chartRange === '30' ? 30 : chartRange === '90' ? 90 : null;
  let points = state.history.filter(h => ex.name === h.exercise && !h.skipped);
  if (rangeDays != null) {
    const cutoff = Date.now() - rangeDays * 86400000;
    points = points.filter(p => new Date(p.date).getTime() >= cutoff);
  }

  if (points.length === 0) {
    if (chartRef) { chartRef.destroy(); chartRef = null; }
    if (canvas) canvas.style.display = 'none';
    if (predEl) predEl.textContent = 'No sessions logged in this time range.';
    return;
  }
  if (canvas) canvas.style.display = '';

  const labels = points.map(p => new Date(p.date).toLocaleDateString());
  const data = isVolumeMode
    ? points.map(p => (p.weight || 0) * p.sets.reduce((a,b) => a+b, 0))
    : isE1rmMode
      ? points.map(p => estimate1RM(p.weight || 0, Math.max(...p.sets)))
      : points.map(p => p.weight ?? Math.max(...p.sets));

  // Simple linear regression on index vs value for trend/prediction
  let predictionMsg = '';
  if (isVolumeMode) {
    if (data.length >= 3) {
      const last = data[data.length - 1];
      const first = data[0];
      const pctChange = first > 0 ? Math.round(((last - first) / first) * 100) : 0;
      predictionMsg = `Total volume per session is ${pctChange >= 0 ? 'up' : 'down'} ${Math.abs(pctChange)}% over this range.`;
    } else {
      predictionMsg = 'Log a few more sessions to see a volume trend.';
    }
  } else if (data.length >= 3) {
    const n = data.length;
    const xs = data.map((_, i) => i);
    const xMean = xs.reduce((a,b)=>a+b,0) / n;
    const yMean = data.reduce((a,b)=>a+b,0) / n;
    let num = 0, den = 0;
    for (let i = 0; i < n; i++) { num += (xs[i]-xMean)*(data[i]-yMean); den += (xs[i]-xMean)**2; }
    const slope = den !== 0 ? num/den : 0;
    const intercept = yMean - slope * xMean;
    const futureIndex = n + 9; // project ~10 sessions ahead
    let predicted = Math.round(intercept + slope * futureIndex);

    if (isE1rmMode) {
      predictionMsg = slope > 0
        ? `At current pace, ~${predicted} lb estimated 1RM projected in ~10 more sessions.`
        : `Trend is flat/declining — keep logging for a better estimate.`;
    } else if (ex.mode === 'weighted') {
      const capped = Math.min(predicted, WEIGHTS[WEIGHTS.length-1]);
      if (data[data.length-1] >= WEIGHTS[WEIGHTS.length-1]) {
        predictionMsg = `Already at your equipment ceiling (${WEIGHTS[WEIGHTS.length-1]} lb) — further gains need higher reps/tempo, not heavier dumbbells.`;
      } else if (slope <= 0) {
        predictionMsg = `Trend is flat/declining — no clear projection yet. Keep logging for a better estimate.`;
      } else {
        predictionMsg = `At current pace, ~${capped} lb projected in ~10 more sessions.`;
      }
    } else if (ex.mode === 'weighted_bw') {
      predictionMsg = slope > 0
        ? `At current pace, ~+${Math.max(0,predicted)} lb belt weight projected in ~10 more sessions.`
        : `Trend is flat/declining — keep logging for a better estimate.`;
    } else if (ex.mode === 'timed') {
      predictionMsg = slope > 0 ? `At current pace, ~${predicted}s hold projected in ~10 more sessions.` : `Trend is flat — keep logging.`;
    } else {
      predictionMsg = slope > 0 ? `At current pace, ~${predicted} reps projected in ~10 more sessions.` : `Trend is flat — keep logging.`;
    }
  } else {
    predictionMsg = 'Log a few more sessions to unlock a trend projection.';
  }
  if (ex.mode === 'weighted_bw' && isE1rmMode) {
    predictionMsg += ' (Based on added belt weight only — bodyweight itself isn\u2019t tracked.)';
  }
  if (predEl) predEl.textContent = predictionMsg;

  if (chartRef) chartRef.destroy();
  const chartLabel = isVolumeMode ? 'Total Volume (lb)' : isE1rmMode ? 'Estimated 1RM (lb)' : 'Weight / Best reps';
  const chartColor = isVolumeMode ? '#ff6b4a' : isE1rmMode ? '#3ecf6e' : '#4f7cff';
  const cssVars = getComputedStyle(document.documentElement);
  const textColor = cssVars.getPropertyValue('--text').trim() || '#e8e8ec';
  const textDimColor = cssVars.getPropertyValue('--text-dim').trim() || '#9aa0ac';
  chartRef = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets: [{ label: chartLabel, data, borderColor: chartColor, backgroundColor: chartColor + '26', fill:true, tension:0.3 }] },
    options: {
      plugins: { legend: { labels: { color: textColor } } },
      scales: { x:{ ticks:{ color: textDimColor } }, y:{ ticks:{ color: textDimColor }, beginAtZero:false } }
    }
  });
}

let calendarOffset = 0;

function changeMonth(delta) {
  calendarOffset += delta;
  render();
}

function renderCalendar() {
  const workoutDates = new Set(state.history.map(h => getEntryDateKey(h)));
  const base = new Date();
  base.setMonth(base.getMonth() + calendarOffset);
  const year = base.getFullYear();
  const month = base.getMonth();
  const monthLabel = base.toLocaleString('default', { month: 'long', year: 'numeric' });

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay(); // 0 = Sunday
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = dateStr(new Date());

  const dowHeaders = ['S','M','T','W','T','F','S'].map(d => `<div class="cal-dow">${d}</div>`).join('');

  let cells = '';
  for (let i = 0; i < startWeekday; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let day = 1; day <= daysInMonth; day++) {
    const cellDate = new Date(year, month, day);
    const key = dateStr(cellDate);
    const worked = workoutDates.has(key);
    const isToday = key === todayStr;
    cells += `<div class="cal-cell ${worked?'worked':''} ${isToday?'today':''}">${day}</div>`;
  }

  return `<div class="card">
    <div class="row">
      <button class="btn small secondary" onclick="changeMonth(-1)">‹</button>
      <h3>${monthLabel}</h3>
      <button class="btn small secondary" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">${dowHeaders}${cells}</div>
    <div class="meta" style="margin-top:8px;">🟢 worked out · ⬜ rest / no log</div>
  </div>`;
}

async function resetAllData() {
  const confirmed = await showTypedConfirmModal('This will permanently delete ALL workout history, progression, PRs, and streaks (your exercise list and Google Drive connection stay intact). Type RESET to confirm:', 'RESET', { confirmLabel: 'Delete Everything' });
  if (!confirmed) return;
  const keepDays = DAYS;
  const keepDriveSync = state.driveSync;
  state = { exercises: {}, history: [], prs: [], meta: {}, sessionStarts: {}, customDays: keepDays, driveSync: keepDriveSync, version: STATE_VERSION };
  saveState();
  liveSets = {};
  currentDayIdx = 0;
  showToast('All data reset. Exercise list and Drive connection were kept.');
  setView('workout');
}

function renameDay(dayIdx) {
  const day = DAYS[dayIdx];
  const newName = prompt(`Rename "${day.label}" to:`, day.label);
  if (!newName || !newName.trim() || newName.trim() === day.label) return;
  const oldLabel = day.label;
  const cleanName = newName.trim();
  day.label = cleanName;
  // Cascade: update all history entries and PRs that reference the old day label
  state.history.forEach(h => { if (h.day === oldLabel) h.day = cleanName; });
  // Cascade: session start keys are scoped by date+day label(+session number), so rekey any that used the old label
  const rekeyKnownFormat = (obj) => {
    if (!obj) return;
    Object.keys(obj).forEach(key => {
      // matches "<date>__<oldLabel>" or "<date>__<oldLabel>__s<N>"
      const suffixMatch = key.endsWith(`__${oldLabel}`) ? '' :
        (key.match(/__s\d+$/) && key.slice(0, key.lastIndexOf('__s')).endsWith(`__${oldLabel}`)) ? key.slice(key.lastIndexOf('__s')) : null;
      if (suffixMatch === null) return;
      const base = suffixMatch ? key.slice(0, -(`__${oldLabel}${suffixMatch}`.length)) : key.slice(0, -(`__${oldLabel}`.length));
      const newKey = `${base}__${cleanName}${suffixMatch || ''}`;
      obj[newKey] = obj[key];
      delete obj[key];
    });
  };
  rekeyKnownFormat(state.sessionStarts);
  rekeyKnownFormat(state.sessionCount);
  persistDays();
  saveState();
  render();
}

function moveDay(dayIdx, direction) {
  const target = dayIdx + direction;
  if (target < 0 || target >= DAYS.length) return;
  [DAYS[dayIdx], DAYS[target]] = [DAYS[target], DAYS[dayIdx]];
  // Keep the same day visually selected after reorder, on both workout and progress tabs
  if (currentDayIdx === dayIdx) currentDayIdx = target;
  else if (currentDayIdx === target) currentDayIdx = dayIdx;
  if (progressDayIdx === dayIdx) progressDayIdx = target;
  else if (progressDayIdx === target) progressDayIdx = dayIdx;
  persistDays();
  render();
}

function toggleExerciseExpand(exId) {
  expandedExerciseId = (expandedExerciseId === exId) ? null : exId;
  renderPreservingScroll();
}

function moveExercise(dayIdx, exIdx, direction) {
  const list = DAYS[dayIdx].exercises;
  const target = exIdx + direction;
  if (target < 0 || target >= list.length) return;
  [list[exIdx], list[target]] = [list[target], list[exIdx]];
  persistDays();
  render();
}

async function removeDay(dayIdx) {
  const day = DAYS[dayIdx];
  if (DAYS.length <= 1) { alert('You need at least one day.'); return; }
  const ok = await showConfirmModal(`Delete the entire "${day.label}" day and ALL its exercises + history? This cannot be undone.`, { danger: true, confirmLabel: 'Delete Day' });
  if (!ok) return;
  const exNames = day.exercises.map(e => e.name);
  const exIds = day.exercises.map(e => e.id);
  state.history = state.history.filter(h => !exNames.includes(h.exercise));
  if (state.prs) state.prs = state.prs.filter(p => !exNames.includes(p.exercise));
  exIds.forEach(id => { if (state.exercises) delete state.exercises[id]; });
  DAYS.splice(dayIdx, 1);
  persistDays();
  saveState();
  if (currentDayIdx >= DAYS.length) currentDayIdx = DAYS.length - 1;
  render();
}

function addDay() {
  const label = prompt('New muscle group / day name (e.g. "Arms", "Calves"):');
  if (!label || !label.trim()) return;
  const icon = prompt('Pick an emoji icon for this day (or leave blank for default):', '⭐') || '⭐';
  const id = label.toLowerCase().trim().replace(/[^a-z0-9]+/g, '_') + '_' + Date.now().toString(36).slice(-4);
  const color = DAY_PALETTE[DAYS.length % DAY_PALETTE.length];
  DAYS.push({ id, label: label.trim(), icon, color, exercises: [] });
  persistDays();
  currentDayIdx = DAYS.length - 1;
  render();
  showToast(`Added "${label.trim()}". Now add exercises to it below.`);
}

async function removeExercise(dayIdx, exId) {
  const day = DAYS[dayIdx];
  const ex = day.exercises.find(e => e.id === exId);
  if (!ex) return;
  const ok = await showConfirmModal(`Remove "${ex.name}" and delete all its history? This cannot be undone.`, { danger: true, confirmLabel: 'Remove' });
  if (!ok) return;
  day.exercises = day.exercises.filter(e => e.id !== exId);
  state.history = state.history.filter(h => h.exercise !== ex.name);
  if (state.prs) state.prs = state.prs.filter(p => p.exercise !== ex.name);
  if (state.exercises) delete state.exercises[ex.id];
  if (expandedExerciseId === exId) expandedExerciseId = null;
  persistDays();
  saveState();
  render();
}
